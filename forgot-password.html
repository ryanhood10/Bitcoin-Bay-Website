<!DOCTYPE html>
<html lang="en">
<head>

  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-KTQNMNQ5');</script>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password | Bitcoin Bay</title>
  <meta name="description" content="Reset your Bitcoin Bay password. Enter your email or Login ID and we'll send a reset link."/>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="canonical" href="https://www.bitcoinbay.com/forgot-password"/>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F7941D;
      --gold-light: #FDCB6E;
      --gold-dark: #D47812;
      --orange: #F26522;
      --bg-dark: #0A1628;
      --bg-card: #0D2240;
      --bg-card2: #112A4F;
      --text-primary: #FFFFFF;
      --text-secondary: #B0C4DE;
      --text-muted: #6B8DB5;
      --accent-blue: #56CCF2;
      --accent-green: #22C55E;
      --accent-red: #EF4444;
      --border: rgba(86,204,242,0.1);
      --font-main: 'Inter', -apple-system, sans-serif;
      --font-display: 'Space Grotesk', 'Inter', sans-serif;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg-dark);
      font-family: var(--font-main);
      color: var(--text-primary);
      line-height: 1.6;
    }

    body {
      background: radial-gradient(ellipse at 50% 0%, #0E2245 0%, #091830 45%, #071225 100%);
    }

    a { text-decoration: none; color: inherit; }

    .fp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,22,40,0.95);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .fp-logo { display: inline-flex; align-items: center; gap: 12px; }
    .fp-logo img { width: 44px; height: 44px; border-radius: 50%; }
    .fp-logo-text { font-family: var(--font-display); font-weight: 900; font-size: 20px; }
    .fp-logo-text span:first-child { color: var(--gold); }
    .fp-logo-text span:last-child { color: #fff; }

    .fp-back {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9999px;
      padding: 9px 20px;
      color: var(--text-secondary);
      font-size: 13px; font-weight: 600; transition: 0.2s;
    }
    .fp-back:hover { background: rgba(255,255,255,0.09); color: #fff; }

    .fp-hero { text-align: center; padding: 48px 24px 20px; position: relative; overflow: hidden; }
    .fp-hero::before {
      content: ''; position: absolute; top: 0; left: 50%;
      transform: translateX(-50%); width: 600px; height: 300px;
      background: radial-gradient(ellipse, rgba(247,148,29,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .fp-title {
      font-family: var(--font-display); font-size: clamp(28px, 5vw, 40px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--orange) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .fp-subtitle { color: var(--text-secondary); font-size: 15px; max-width: 460px; margin: 0 auto; }

    .fp-container { max-width: 450px; margin: 0 auto 60px; padding: 0 24px; }
    .fp-card {
      background: var(--bg-card);
      border: 1px solid rgba(247,148,29,0.18);
      border-radius: 20px;
      padding: 32px 28px;
    }

    /* Tabs */
    .fp-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.25);
      border-radius: 12px; padding: 4px; margin-bottom: 24px;
    }
    .fp-tab {
      border: 0; background: transparent; color: var(--text-muted);
      font-family: var(--font-main); font-weight: 600; font-size: 13px;
      padding: 10px 8px; border-radius: 9px; cursor: pointer;
      transition: 0.2s;
    }
    .fp-tab.active {
      background: var(--bg-surface, #163060);
      color: var(--gold);
      box-shadow: inset 0 0 0 1px rgba(247,148,29,0.25);
    }

    .fp-field { margin-bottom: 18px; }
    .fp-label {
      display: block; color: var(--text-secondary);
      font-size: 13px; font-weight: 600;
      margin-bottom: 8px; letter-spacing: 0.01em;
    }
    .fp-input {
      width: 100%; padding: 13px 16px;
      background: var(--bg-card2);
      border: 1px solid rgba(86,204,242,0.15);
      border-radius: 10px; color: #fff;
      font-family: var(--font-main); font-size: 15px;
      transition: 0.2s;
    }
    .fp-input::placeholder { color: var(--text-muted); }
    .fp-input:focus { outline: 0; border-color: var(--gold); background: rgba(247,148,29,0.05); }
    .fp-input.error { border-color: var(--accent-red); background: rgba(239,68,68,0.05); }
    .fp-hint { color: var(--text-muted); font-size: 12px; margin-top: 6px; }

    .fp-captcha-wrap { display: flex; justify-content: center; margin: 12px 0 14px; }

    .fp-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 100%);
      color: #0A1628; font-family: var(--font-display); font-weight: 800;
      font-size: 15px; letter-spacing: 0.02em;
      padding: 14px 24px; border: 0; border-radius: 9999px;
      cursor: pointer; transition: 0.2s;
    }
    .fp-submit:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .fp-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .fp-alert {
      display: none;
      padding: 14px 16px; border-radius: 10px;
      margin: 16px 0 0; font-size: 14px; line-height: 1.5;
    }
    .fp-alert.success {
      display: block;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.35);
      color: #A7F3D0;
    }
    .fp-alert.error {
      display: block;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.35);
      color: #FCA5A5;
    }

    .fp-altlink {
      text-align: center; margin-top: 18px;
      color: var(--text-muted); font-size: 13px;
    }
    .fp-altlink a { color: var(--gold); font-weight: 600; }
    .fp-altlink a:hover { color: var(--gold-light); }

    @media (max-width: 520px) {
      .fp-header { padding: 16px 20px; }
      .fp-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <!-- GTM noscript -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KTQNMNQ5" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <!-- Header -->
  <header class="fp-header">
    <a href="/" class="fp-logo">
      <img src="bb-logo.png" alt="Bitcoin Bay"/>
      <span class="fp-logo-text"><span>BITCOIN</span> <span>BAY</span></span>
    </a>
    <a href="/" class="fp-back">← Back to Sign In</a>
  </header>

  <!-- Hero -->
  <section class="fp-hero">
    <h1 class="fp-title">Reset your password</h1>
    <p class="fp-subtitle">Enter your email or Login ID — we'll send a reset link to the email on file.</p>
  </section>

  <!-- Form -->
  <div class="fp-container">
    <div class="fp-card">

      <!-- Tabs -->
      <div class="fp-tabs" role="tablist">
        <button type="button" id="tab-email"   class="fp-tab active" role="tab" aria-selected="true">I have my email</button>
        <button type="button" id="tab-loginid" class="fp-tab"        role="tab" aria-selected="false">I only have my Login ID</button>
      </div>

      <!-- Email panel -->
      <div id="panel-email">
        <div class="fp-field">
          <label class="fp-label" for="fp-email">Email Address</label>
          <input id="fp-email" class="fp-input" type="email" placeholder="you@email.com" autocomplete="email">
          <div class="fp-hint">The email you used when you signed up.</div>
        </div>
      </div>

      <!-- Login ID panel -->
      <div id="panel-loginid" style="display:none;">
        <div class="fp-field">
          <label class="fp-label" for="fp-loginid">Login ID</label>
          <input id="fp-loginid" class="fp-input" type="text" placeholder="BTCB1234" autocomplete="off" style="text-transform:uppercase;letter-spacing:1px;">
          <div class="fp-hint">We'll send the reset link to whatever email is on file for this account.</div>
        </div>
      </div>

      <!-- reCAPTCHA — same site key as /register -->
      <div class="fp-captcha-wrap">
        <div class="g-recaptcha" data-sitekey="6Le1ChsqAAAAAPJuGAYK6q3aE4xjrmEs-yneywTm"></div>
      </div>

      <button type="button" id="fp-submit-btn" class="fp-submit">Send Reset Link →</button>

      <div id="fp-alert" class="fp-alert"></div>

      <div class="fp-altlink">
        Remember your password? <a href="/">Sign in</a>
      </div>

    </div>
  </div>

  <script>
    (function () {
      function $(id) { return document.getElementById(id); }

      var tabEmail   = $('tab-email');
      var tabLoginId = $('tab-loginid');
      var panelEmail = $('panel-email');
      var panelLogin = $('panel-loginid');
      var submitBtn  = $('fp-submit-btn');
      var alertBox   = $('fp-alert');

      var mode = 'email';

      function activate(which) {
        mode = which;
        if (which === 'email') {
          tabEmail.classList.add('active');
          tabEmail.setAttribute('aria-selected', 'true');
          tabLoginId.classList.remove('active');
          tabLoginId.setAttribute('aria-selected', 'false');
          panelEmail.style.display = '';
          panelLogin.style.display = 'none';
        } else {
          tabLoginId.classList.add('active');
          tabLoginId.setAttribute('aria-selected', 'true');
          tabEmail.classList.remove('active');
          tabEmail.setAttribute('aria-selected', 'false');
          panelLogin.style.display = '';
          panelEmail.style.display = 'none';
        }
        alertBox.className = 'fp-alert';
        alertBox.textContent = '';
      }

      tabEmail.addEventListener('click', function () { activate('email'); });
      tabLoginId.addEventListener('click', function () { activate('loginid'); });

      function showAlert(kind, msg) {
        alertBox.className = 'fp-alert ' + kind;
        alertBox.textContent = msg;
      }

      function validEmail(v) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
      }

      submitBtn.addEventListener('click', function () {
        var captchaToken = '';
        try { captchaToken = (typeof grecaptcha !== 'undefined' && grecaptcha.getResponse) ? grecaptcha.getResponse() : ''; } catch (e) {}
        if (!captchaToken) {
          showAlert('error', 'Please verify you are not a robot.');
          return;
        }

        var body = { captchaToken: captchaToken };
        if (mode === 'email') {
          var email = $('fp-email').value.trim().toLowerCase();
          if (!validEmail(email)) {
            showAlert('error', 'Please enter a valid email address.');
            return;
          }
          body.email = email;
        } else {
          var loginId = $('fp-loginid').value.trim().toUpperCase().replace(/\s+/g, '');
          if (!loginId) {
            showAlert('error', 'Please enter your Login ID.');
            return;
          }
          body.loginId = loginId;
        }

        submitBtn.disabled = true;
        var originalLabel = submitBtn.textContent;
        submitBtn.textContent = 'Sending…';

        fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(function (r) {
          return r.json().then(function (data) { return { status: r.status, data: data }; });
        }).then(function (result) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalLabel;
          try { grecaptcha.reset(); } catch (e) {}
          if (result.data && result.data.success) {
            showAlert('success', result.data.message || 'If an account matches, a reset link is on its way.');
            // Clear inputs so the page is ready for a new attempt if needed.
            var ie = $('fp-email'); if (ie) ie.value = '';
            var il = $('fp-loginid'); if (il) il.value = '';
          } else {
            showAlert('error', (result.data && result.data.error) || 'Something went wrong. Please try again.');
          }
        }).catch(function () {
          submitBtn.disabled = false;
          submitBtn.textContent = originalLabel;
          try { grecaptcha.reset(); } catch (e) {}
          showAlert('error', 'Network error. Please check your connection and try again.');
        });
      });
    })();
  </script>
</body>
</html>
