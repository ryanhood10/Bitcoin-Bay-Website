<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BC Bay — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0c10;
  --surface:  #131318;
  --surface2: #1a1a22;
  --surface3: #21212c;
  --border:   #2a2a38;
  --border2:  #353548;
  --text:     #e8e6f0;
  --sub:      #9895aa;
  --dim:      #5a5870;
  --blurple:  #EE8034;
  --blurple2: #9d6ef5;
  --mint:     #34d399;
  --red:      #f87171;
  --amber:    #f59e0b;
  --blue:     #F8932F;
  --r:        10px;
  --r-sm:     7px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 54px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.topbar-left  { display: flex; align-items: center; gap: 20px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.brand { display: flex; align-items: center; gap: 9px; }
.brand-name { font-family: 'Inter Tight', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }

/* separator */
.sep { width: 1px; height: 22px; background: var(--border2); }

/* ── VIEW TOGGLE (Day / Week / Month — segmented control) ── */
.view-toggle {
  display: inline-flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
  gap: 1px;
}
.vt-btn {
  background: transparent; border: none; color: var(--sub);
  font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  padding: 6px 16px; border-radius: 6px;
  cursor: pointer; transition: color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  font-family: inherit;
  line-height: 1.3;
}
.vt-btn:hover { color: var(--text); background: var(--surface3); }
.vt-btn.active {
  background: linear-gradient(180deg, #EE8034 0%, #d4691c 100%);
  color: #fff;
  box-shadow: 0 1px 2px rgba(238,128,52,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
}

/* ── PERIOD NAV ── */
.period-nav { display: flex; align-items: center; gap: 6px; }
.pnav-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--sub); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s;
}
.pnav-btn:hover { background: var(--surface2); color: var(--text); }
.period-text { font-size: 13px; font-weight: 500; color: var(--text); min-width: 200px; text-align: center; }

/* status pills */
.pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; border: 1px solid; }
.pill.ok   { color: var(--mint);  border-color: rgba(52,211,153,0.3);  background: rgba(52,211,153,0.07); }
.pill.warn { color: var(--amber); border-color: rgba(245,158,11,0.3);  background: rgba(245,158,11,0.07); }
.pill.err  { color: var(--red);   border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.07); }

/* ── PAGE LAYOUT ── */
.page { max-width: 1360px; margin: 0 auto; padding: 28px 32px 80px; }

/* ── SECTION BLOCK ── */
.section-block { margin-bottom: 36px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.section-title-row { display: flex; align-items: center; gap: 8px; }
.section-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--text); letter-spacing: -0.02em;
}
.section-badge {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 4px;
  background: var(--surface2); color: var(--dim);
  border: 1px solid var(--border); letter-spacing: 0.04em; text-transform: uppercase;
}
.section-badge.period { background: rgba(124,58,237,0.12); color: var(--blurple2); border-color: rgba(124,58,237,0.2); }
.section-badge.snap   { background: rgba(52,211,153,0.08); color: var(--mint);     border-color: rgba(52,211,153,0.18); }
.section-note { font-size: 11px; color: var(--dim); }

/* ── HERO STRIP ── */
.hero-strip {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border); border-radius: var(--r); overflow: hidden;
  margin-bottom: 20px;
}
.hero-card { background: var(--surface); padding: 18px 20px; }
.hero-card-label { font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.hero-card-value { font-family: 'Inter Tight', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; color: var(--text); margin-bottom: 4px; }
.hero-card-sub   { font-size: 11px; color: var(--dim); }

/* ── CARD GRID ── */
.card-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.card-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.card-grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }

/* ── PANEL ── */
.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px 20px;
}
.panel-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.panel-icon {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ── STAT TILE ── */
.stat-tile {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 14px;
}
.stat-label { font-size: 10px; font-weight: 500; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; line-height: 1.3; }
.stat-value { font-family: 'Inter Tight', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); }
.stat-value.pos { color: var(--mint); }
.stat-value.neg { color: var(--red); }
.stat-value.hi  { color: var(--blurple2); }

/* ── CONVERSION BAR ── */
.conv-bar-wrap { margin-bottom: 14px; }
.conv-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-bottom: 5px; }
.conv-bar-track { height: 5px; border-radius: 3px; background: var(--surface3); overflow: hidden; }
.conv-bar-fill  { height: 100%; border-radius: 3px; background: var(--blurple); }

/* ── BAR LIST ── */
.bar-list-item { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
.bli-label { font-size: 11px; color: var(--sub); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bli-track { flex: 1; height: 3px; background: var(--surface3); border-radius: 2px; }
.bli-fill  { height: 100%; border-radius: 2px; }
.bli-val   { width: 40px; text-align: right; font-size: 11px; font-weight: 600; color: var(--text); flex-shrink: 0; }

/* ── SOCIAL GROUP LABEL ── */
.social-group-label {
  font-size: 10px; font-weight: 600; color: var(--dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin: 16px 0 8px; display: flex; align-items: center; gap: 8px;
}
.social-group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.social-group-label:first-child { margin-top: 0; }


/* ── SOCIAL GRID 2-COL ── */
.social-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── SOCIAL GRID MINOR (smaller cards) ── */
.social-grid-minor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.social-card.minor { opacity: 0.6; }
.social-card.minor .social-followers { font-size: 18px; }


.social-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px;
}
.social-card.skipped { opacity: 0.3; pointer-events: none; }
.social-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.social-platform { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--text); }
.social-followers { font-family: 'Inter Tight', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; margin-bottom: 2px; }
.social-fol-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.social-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ss { background: var(--surface2); border-radius: 6px; padding: 7px 9px; }
.ss-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.ss-value { font-family: 'Inter Tight', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }

/* ── SCOPE TAGS ── */
.stag {
  display: inline-block; font-size: 9px; font-weight: 600;
  padding: 1px 5px; border-radius: 3px; vertical-align: middle;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.stag.p { background: rgba(124,58,237,0.12); color: var(--blurple2); }
.stag.s { background: rgba(52,211,153,0.08); color: var(--mint); }

/* ── COMING SOON PANEL ── */
.coming-soon {
  background: var(--surface); border: 1px dashed var(--border2);
  border-radius: var(--r); padding: 28px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  color: var(--dim); font-size: 13px;
}

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 32px 0; }

/* ── EMPTY / LOADING ── */
.empty { padding: 24px 0; color: var(--dim); font-size: 12px; text-align: center; }
.loading-page { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 12px; }
.spinner { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--blurple); animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── AGG NOTE ── */
.agg-note {
  font-size: 11px; color: var(--dim);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 8px 14px;
  margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}

@media (max-width: 1100px) {
  .social-grid { grid-template-columns: repeat(3, 1fr); }
  .hero-strip  { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 740px) {
  .card-grid-2 { grid-template-columns: 1fr; }
  .card-grid-3 { grid-template-columns: 1fr 1fr; }
  .social-grid { grid-template-columns: repeat(2, 1fr); }
  .topbar { padding: 0 16px; }
  .page { padding: 20px 16px 60px; }
}

/* ── MOBILE POLISH (≤ 600px) ── */
@media (max-width: 600px) {
  /* Topbar: allow wrap so nothing gets squeezed */
  .topbar {
    height: auto; min-height: 54px;
    padding: 10px 14px;
    flex-wrap: wrap; gap: 8px;
  }
  .topbar-left { flex-wrap: wrap; gap: 10px; row-gap: 8px; }
  .topbar-right { width: 100%; justify-content: flex-end; }
  .brand-name { font-size: 14px; }
  .sep { display: none; }
  .view-toggle { padding: 2px; }
  .vt-btn { padding: 5px 10px; font-size: 11px; }
  .period-nav { gap: 4px; }
  .period-text { font-size: 11px; }
  .pnav-btn { width: 26px; height: 26px; }

  /* Page gets a tiny bit more breathing room */
  .page { padding: 16px 12px 48px; }

  /* Hero cards stack to one column */
  .hero-strip { grid-template-columns: 1fr !important; }
  .hero-card-value { font-size: 26px; }

  /* Section headers wrap */
  .section-header { flex-direction: column; align-items: flex-start; gap: 4px; }
  .section-note { font-size: 10px; }

  /* GA4 stat tiles + signup columns stack */
  .card-grid-3 { grid-template-columns: 1fr; }
  .card-grid-auto { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }

  /* Modal: shrink padding so content breathes on tiny viewports */
  .modal-overlay { padding: 8px; }
  .modal-head { padding: 12px 16px; }
  .modal-title { font-size: 14px; gap: 8px; flex-wrap: wrap; }
  .modal-title .handle { font-size: 11px; }
  .modal-body { padding: 14px 14px; }
  .modal-tabs { padding: 0 14px; overflow-x: auto; white-space: nowrap; }
  .modal-tab { padding: 10px 12px; font-size: 11px; }

  /* Kmetric row on mobile: smaller min-width so 2 fit per row */
  .kmetric-row { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 6px; }
  .kmetric { padding: 10px 12px; }
  .kmetric-value { font-size: 18px; }
  .kmetric-label { font-size: 9px; }

  /* Chart container on mobile */
  .chart-wrap { padding: 12px; }
  .chart-head { flex-wrap: wrap; gap: 8px; }
  .scale-picker { padding: 2px; }
  .scale-btn { padding: 4px 8px; font-size: 9px; }

  /* Draft cards: actions row wraps below the handle */
  .draft-head { flex-direction: column; align-items: flex-start; gap: 10px; }
  .draft-actions { width: 100%; justify-content: flex-start; }
  .draft-btn { font-size: 10px; padding: 5px 8px; }
  .draft-target-tweet { margin-left: 8px; }

  /* Stats bar on mobile — pills wrap cleanly */
  .stats-bar { flex-wrap: wrap; gap: 6px; }
  .stat-pill { min-width: 72px; padding: 5px 10px; }
  .sp-value { font-size: 12px; }

  /* Top tweets list — stack stats under text rather than alongside */
  .tweet-row { grid-template-columns: 1fr; gap: 8px; }
  .tweet-stats { flex-wrap: wrap; }

  /* Hour-bars stay readable */
  .hour-bars { height: 60px; }

  /* Footer stacks to two lines */
  .dash-footer { padding: 14px 16px; font-size: 10px; flex-direction: column; align-items: flex-start; }
  .dash-footer .footer-right { flex-wrap: wrap; }
}

/* ── DETAIL MODAL ── */
.clickable { cursor: pointer; transition: transform 0.12s ease, box-shadow 0.12s ease; }
.clickable:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

/* Section-level clickable (header shows "details →" pill, cursor changes over title row only) */
.section-clickable .section-title-row { cursor: pointer; }
.section-clickable .section-details-pill {
  font-size: 9px; padding: 2px 7px;
  background: rgba(238,128,52,0.10); color: var(--blurple);
  border: 1px solid rgba(238,128,52,0.2);
  opacity: 0.7; transition: opacity 0.12s ease;
}
.section-clickable:hover .section-details-pill { opacity: 1; }

/* ── FOOTER ── */
.dash-footer {
  margin-top: 24px; padding: 18px 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 10px;
  font-size: 11px; color: var(--dim);
}
.dash-footer .footer-brand { font-weight: 700; color: var(--sub); letter-spacing: 0.02em; }
.dash-footer .footer-left, .dash-footer .footer-right {
  display: flex; align-items: center; gap: 8px;
}
.dash-footer b { color: var(--text); font-weight: 600; }
.dash-footer .footer-sep { color: var(--border2); }
.dash-footer a { color: var(--sub); text-decoration: none; transition: color 0.12s; }
.dash-footer a:hover { color: var(--blurple); }

/* ── SOCIAL LAYOUT ── */
.social-row {
  display: grid;
  gap: 10px;
  margin-bottom: 18px;
}
.social-row.communities { grid-template-columns: 2fr 1fr; }    /* Twitter wider, Instagram narrower */
.social-row.video       { grid-template-columns: 1fr 1fr; }    /* YT + TT equal small */

@media (max-width: 900px) {
  .social-row.communities, .social-row.video { grid-template-columns: 1fr; }
}

/* Compact social cards (YT/TT placeholders) */
.social-card.compact { padding: 10px 14px; opacity: 0.75; }
.social-card.compact .social-followers { font-size: 18px; margin-top: 2px; }
.social-card.compact .social-fol-label { margin-bottom: 8px; }
.social-card.compact .social-stats { gap: 6px; }
.social-card.compact .ss-label { font-size: 8px; }
.social-card.compact .ss-value { font-size: 11px; }

/* ── ENGAGED-TODAY BADGE ── */
.engaged-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  padding: 3px 9px; border-radius: 6px;
  background: rgba(52,211,153,0.14);
  color: var(--mint);
  border: 1px solid rgba(52,211,153,0.3);
  letter-spacing: 0.02em;
  line-height: 1.3;
}

/* ── SIGNUPS TABLE (Users modal) ── */
.signup-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.signup-row {
  display: grid; grid-template-columns: 100px 1fr 110px 80px;
  gap: 12px; align-items: center;
  padding: 8px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 12px;
}
.signup-row.failed { background: rgba(248,113,113,0.04); border-color: rgba(248,113,113,0.2); }
.signup-row.success { background: rgba(52,211,153,0.04); border-color: rgba(52,211,153,0.2); }
.signup-row .su-date { color: var(--dim); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
.signup-row .su-name { color: var(--text); font-weight: 500; }
.signup-row .su-email { color: var(--sub); font-size: 11px; }
.signup-row .su-login { color: var(--mint); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; font-weight: 600; }
.signup-row .su-login.failed { color: var(--red); font-weight: 500; }
.signup-row .su-status { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 4px; }
.signup-row .su-status.ok   { background: rgba(52,211,153,0.14); color: var(--mint); }
.signup-row .su-status.fail { background: rgba(248,113,113,0.14); color: var(--red); }
@media (max-width: 680px) {
  .signup-row { grid-template-columns: 1fr; gap: 4px; }
}
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(4,4,8,0.85); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; width: min(1100px, 100%);
  max-height: calc(100vh - 48px); display: flex; flex-direction: column;
  overflow: hidden;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px; border-bottom: 1px solid var(--border);
}
.modal-title { display: flex; align-items: center; gap: 12px; font-size: 16px; font-weight: 700; }
.modal-title .handle { color: var(--sub); font-weight: 500; font-size: 13px; }
.modal-close {
  background: transparent; border: 1px solid var(--border2); color: var(--sub);
  width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--text); border-color: var(--sub); }
.modal-tabs { display: flex; gap: 2px; padding: 0 24px; border-bottom: 1px solid var(--border); }
.modal-tab {
  padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--sub);
  background: transparent; border: none; cursor: pointer;
  border-bottom: 2px solid transparent; letter-spacing: 0.04em;
}
.modal-tab.active { color: var(--text); border-bottom-color: var(--blurple); }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-panel { display: none; }
.modal-panel.active { display: block; }
.kmetric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 18px; }
.kmetric {
  padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm);
}
.kmetric-clickable { cursor: pointer; transition: border-color 0.12s ease, background 0.12s ease; }
.kmetric-clickable:hover { border-color: var(--border2); background: var(--surface3); }
.kmetric-clickable.active { border-color: var(--blurple); background: rgba(238,128,52,0.06); }
.kmetric-clickable.active .kmetric-value { color: var(--blurple); }
.kmetric-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.kmetric-value { font-size: 22px; font-weight: 700; color: var(--text); }
.kmetric-sub { font-size: 11px; margin-top: 3px; color: var(--sub); }
.chart-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.chart-head .chart-title { margin: 0; }
.scale-picker { display: flex; gap: 2px; background: var(--surface3); padding: 2px; border-radius: 7px; }
.scale-btn {
  background: transparent; border: none; color: var(--sub);
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  padding: 5px 10px; border-radius: 5px; cursor: pointer;
}
.scale-btn:hover { color: var(--text); }
.scale-btn.active { background: var(--blurple); color: #fff; }
.kind-pill {
  display: inline-block; font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 1px 6px; border-radius: 4px;
  margin-right: 6px; vertical-align: middle;
}
.kind-pill.quote { background: rgba(157,110,245,0.14); color: var(--blurple2); }
.kind-pill.reply { background: rgba(52,211,153,0.12); color: var(--mint); }

/* ── ENGAGEMENT DRAFT CARDS ── */
.draft-header-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.draft-list { display: flex; flex-direction: column; gap: 14px; }
.draft-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 14px 16px;
}
.draft-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 10px; flex-wrap: wrap;
}
.draft-target { display: flex; flex-direction: column; gap: 2px; }
.draft-handle { font-weight: 700; color: var(--text); font-size: 14px; }
.draft-meta { font-size: 11px; color: var(--dim); }
.draft-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.draft-btn {
  background: transparent; border: 1px solid var(--border2); color: var(--sub);
  font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 6px;
  cursor: pointer; text-decoration: none; line-height: 1.4;
  transition: all 0.1s ease;
}
.draft-btn:hover { color: var(--text); border-color: var(--sub); }
.draft-btn.copy { background: var(--blurple); color: #fff; border-color: var(--blurple); }
.draft-btn.copy:hover { background: #d4691c; border-color: #d4691c; color: #fff; }
.draft-btn.copy.copied { background: var(--mint); border-color: var(--mint); }
.draft-btn.open:hover { color: var(--blurple); border-color: var(--blurple); }
.draft-btn.dismiss:hover { color: var(--red); border-color: var(--red); }

.draft-thread { display: flex; flex-direction: column; gap: 8px; }
.draft-context, .draft-target-tweet {
  background: var(--surface3); border-radius: 6px;
  padding: 8px 10px; font-size: 12px;
}
.draft-context-label {
  font-size: 10px; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 3px; font-weight: 600;
}
.draft-context-text, .draft-target-text { color: var(--sub); line-height: 1.45; }
.draft-target-tweet { margin-left: 14px; border-left: 2px solid var(--border2); }

.draft-reply {
  background: rgba(238,128,52,0.06); border: 1px solid rgba(238,128,52,0.25);
  border-radius: 6px; padding: 10px 12px; margin-top: 4px;
}
.draft-reply-label {
  font-size: 10px; color: var(--blurple); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 700;
}
.draft-reply-text { color: var(--text); font-size: 14px; line-height: 1.5; }
.draft-why {
  font-size: 11px; color: var(--dim); margin-top: 8px;
  padding-top: 8px; border-top: 1px dashed var(--border);
}
.draft-why span { color: var(--sub); font-weight: 600; }

.stats-bar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-bottom: 6px;
}
.stat-pill {
  display: flex; flex-direction: column; gap: 1px;
  padding: 6px 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--r-sm);
  min-width: 80px;
}
.sp-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.sp-value { font-size: 14px; font-weight: 700; color: var(--text); }
.draft-btn.primary { background: var(--blurple); color: #fff; border-color: var(--blurple); }
.draft-btn.primary:hover { background: #d4691c; border-color: #d4691c; color: #fff; }
.draft-btn.primary:disabled { opacity: 0.6; cursor: wait; }
.draft-btn.icon-only {
  width: 32px; height: 28px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 16px; line-height: 1;
}
.draft-btn.icon-only:hover { transform: rotate(90deg); transition: transform 0.3s ease; }
.draft-btn.posted:hover { color: var(--mint); border-color: var(--mint); }

.quality-badge {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  padding: 2px 7px; border-radius: 4px; line-height: 1.4;
}
.quality-badge.q-high { background: rgba(52,211,153,0.14); color: var(--mint); }
.quality-badge.q-med  { background: rgba(245,158,11,0.14); color: var(--amber); }
.quality-badge.q-low  { background: var(--surface3); color: var(--dim); }
.verified-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--blurple); color: #fff;
  font-size: 9px; font-weight: 700;
}
.kmetric-sub.pos { color: var(--mint); }
.kmetric-sub.neg { color: var(--red); }
.chart-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px 16px; margin-bottom: 16px; }
.chart-title { font-size: 11px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.tweet-list { display: flex; flex-direction: column; gap: 10px; }
.tweet-row {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 12px;
  text-decoration: none; color: inherit; transition: border-color 0.1s ease;
}
.tweet-row:hover { border-color: var(--blurple); }
.tweet-text { font-size: 13px; color: var(--text); line-height: 1.45; }
.tweet-meta { font-size: 10px; color: var(--dim); margin-top: 6px; }
.tweet-stats { display: flex; gap: 14px; align-items: flex-start; font-size: 11px; color: var(--sub); white-space: nowrap; }
.tweet-stat-val { color: var(--text); font-weight: 600; }
.hour-bars { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; align-items: end; height: 80px; }
.hour-bar { background: var(--blurple); border-radius: 2px 2px 0 0; min-height: 2px; position: relative; }
.hour-bar.zero { background: var(--surface3); }
.hour-axis { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; font-size: 8px; color: var(--dim); margin-top: 4px; text-align: center; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="brand">
      <!-- Wizard hat -->
      <svg width="30" height="30" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 18c-2 8-3 16-4 28h8c-1-12-2-20-4-28z" fill="#8B6914"/>
        <path d="M32 8c-4 2-10 6-16 4 4 4 10 6 15 8-6-1-14 0-18 4 6 0 14-1 19-2-4 2-10 8-12 14 4-4 10-10 14-14 4 4 10 10 14 14-2-6-8-12-12-14 5 1 13 2 19 2-4-4-12-5-18-4 5-2 11-4 15-8-6 2-12-2-16-4z" fill="#EE8034"/>
      </svg>
      <span class="brand-name">BC Bay</span>
    </div>

    <div class="view-toggle">
      <button class="vt-btn active" data-view="day">Day</button>
      <button class="vt-btn" data-view="week">Week</button>
      <button class="vt-btn" data-view="month">Month</button>
    </div>

    <div class="sep"></div>

    <div class="period-nav">
      <button class="pnav-btn" id="nav-prev">&#8592;</button>
      <span class="period-text" id="period-label">—</span>
      <button class="pnav-btn" id="nav-next">&#8594;</button>
    </div>
  </div>

  <div class="topbar-right">
    <div id="status-pills" style="display:flex;gap:6px;"></div>
  </div>
</div>

<!-- PAGE -->
<div class="page" id="main-page">
  <div class="loading-page">
    <div class="spinner"></div>
    <span style="font-size:12px;color:var(--dim);">Loading report...</span>
  </div>
</div>

<script>
let MODE='day', OFFSET=0, REPORT=null, ALL_DATES=[];
let ENGAGEMENT_STATS = { twitter: null, instagram: null };
// CURRENT_ADMIN populated at load time. Used to conditionally show UI that
// links into /admin/messages — only role=full admins can access that page.
let CURRENT_ADMIN = { user: null, role: null };
async function fetchCurrentAdmin(){
  try {
    const res = await fetch('/api/admin/dashboard/me', { headers: { Accept: 'application/json' }});
    if (res.ok) CURRENT_ADMIN = await res.json();
  } catch(_) { /* stay null — UI treats as no messages access */ }
}
function canAccessMessages(){ return CURRENT_ADMIN && CURRENT_ADMIN.role === 'full'; }

async function fetchEngagementStats(){
  try {
    const [tw, ig] = await Promise.all([
      fetch('/api/admin/dashboard/engagement-drafts/stats').then(r => r.json()).catch(() => null),
      fetch('/api/admin/dashboard/instagram-drafts/stats').then(r => r.json()).catch(() => null),
    ]);
    ENGAGEMENT_STATS.twitter = tw;
    ENGAGEMENT_STATS.instagram = ig;
  } catch(_) { /* ignore — badges will just hide */ }
}
const el=id=>document.getElementById(id);

function fmt(n,pre='',suf='',dec=0){
  if(n==null)return '—';
  const v=parseFloat(n); if(isNaN(v))return '—';
  return pre+v.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf;
}
function fmtK(n){
  if(n==null)return '—';
  if(n>=1e6)return (n/1e6).toFixed(1)+'M';
  if(n>=1000)return (n/1000).toFixed(1)+'K';
  return Number(n).toLocaleString();
}
function stag(label,snap=false){
  return `<span class="stag ${snap?'s':'p'}">${label}</span>`;
}

// ── DATE UTILS ──
function getTargetDates(){
  const today=new Date(); today.setHours(0,0,0,0);
  if(MODE==='day'){
    const d=new Date(today); d.setDate(d.getDate()+OFFSET);
    return [d.toISOString().slice(0,10)];
  }
  if(MODE==='week'){
    const d=new Date(today);
    const dow=d.getDay()||7; d.setDate(d.getDate()-dow+1+OFFSET*7);
    return Array.from({length:7},(_,i)=>{ const dd=new Date(d); dd.setDate(dd.getDate()+i); return dd.toISOString().slice(0,10); });
  }
  const d=new Date(today.getFullYear(),today.getMonth()+OFFSET,1);
  const yr=d.getFullYear(),mo=d.getMonth();
  const days=new Date(yr,mo+1,0).getDate();
  return Array.from({length:days},(_,i)=>`${yr}-${String(mo+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`);
}

function getPeriodLabel(){
  const dates=getTargetDates();
  if(MODE==='day'){
    const d=new Date(dates[0]+'T12:00:00');
    const isToday=dates[0]===new Date().toISOString().slice(0,10);
    return isToday?`Today, ${d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`:d.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
  }
  if(MODE==='week'){
    const s=new Date(dates[0]+'T12:00:00'),e=new Date(dates[6]+'T12:00:00');
    return `${s.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${e.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  }
  return new Date(dates[0]+'T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

function pw(){ return MODE==='day'?'today':MODE==='week'?'this week':'this month'; }

// ── FETCH ──
async function fetchDates(){
  try{ const r=await fetch('/api/admin/dashboard/dates'); ALL_DATES=await r.json(); }catch{ ALL_DATES=[]; }
}

async function fetchReport(){
  const dates=getTargetDates();
  if(MODE==='day'){
    const r=await fetch(`/api/admin/dashboard/report?date=${dates[0]}`);
    if(!r.ok)throw new Error(`Server returned ${r.status}`);
    return await r.json();
  }
  const avail=dates.filter(d=>ALL_DATES.includes(d));
  if(!avail.length)return null;
  const docs=(await Promise.all(avail.map(async d=>{
    try{ const r=await fetch(`/api/admin/dashboard/report?date=${d}`); return r.ok?await r.json():null; }catch{return null;}
  }))).filter(Boolean);
  return aggDocs(docs);
}

// ── AGGREGATION ──
function sumF(docs,path){ const p=path.split('.'); return docs.reduce((a,d)=>{ let v=d; p.forEach(k=>v=v?.[k]); return a+(parseFloat(v)||0); },0); }
function lastF(docs,path){ const p=path.split('.'); for(let i=docs.length-1;i>=0;i--){ let v=docs[i]; p.forEach(k=>v=v?.[k]); if(v!=null)return v; } return null; }
function avgF(docs,path){ const vals=docs.map(d=>{ let v=d; path.split('.').forEach(k=>v=v?.[k]); return parseFloat(v)||0; }).filter(x=>x>0); return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0; }

function aggDocs(docs){
  if(!docs.length)return null;
  const has=key=>docs.some(d=>d[key]!=null);
  return {
    _agg:true, _days:docs.length, date:docs[docs.length-1]?.date,
    meta:{ success:[...new Set(docs.flatMap(d=>d.meta?.success||[]))], skipped:[...new Set(docs.flatMap(d=>d.meta?.skipped||[]))].filter(s=>![...new Set(docs.flatMap(d=>d.meta?.success||[]))].includes(s)), failed:[] },
    mongodb_users:has('mongodb_users')?{successful_signups_today:sumF(docs,'mongodb_users.successful_signups_today'),successful_signups_total:lastF(docs,'mongodb_users.successful_signups_total'),attempts_today:sumF(docs,'mongodb_users.attempts_today'),failed_attempts_today:sumF(docs,'mongodb_users.failed_attempts_today'),signup_success_rate:avgF(docs,'mongodb_users.signup_success_rate')}:null,
    ga4:has('ga4')?{sessions:sumF(docs,'ga4.sessions'),page_views:sumF(docs,'ga4.page_views'),new_users:sumF(docs,'ga4.new_users'),total_users:lastF(docs,'ga4.total_users'),bounce_rate:avgF(docs,'ga4.bounce_rate'),avg_session_duration_seconds:avgF(docs,'ga4.avg_session_duration_seconds'),engagement_rate:avgF(docs,'ga4.engagement_rate'),top_traffic_sources:lastF(docs,'ga4.top_traffic_sources')||[],top_pages:lastF(docs,'ga4.top_pages')||[],top_countries:lastF(docs,'ga4.top_countries')||[]}:null,
    twitter:has('twitter')?{followers_count:lastF(docs,'twitter.followers_count'),tweets_today:sumF(docs,'twitter.tweets_today'),impressions_today:sumF(docs,'twitter.impressions_today'),likes_today:sumF(docs,'twitter.likes_today'),retweets_today:sumF(docs,'twitter.retweets_today'),replies_today:sumF(docs,'twitter.replies_today')}:null,
    instagram:has('instagram')?{followers_count:lastF(docs,'instagram.followers_count'),impressions_today:sumF(docs,'instagram.impressions_today'),reach_today:sumF(docs,'instagram.reach_today'),profile_views_today:sumF(docs,'instagram.profile_views_today'),media_count:lastF(docs,'instagram.media_count')}:null,
    facebook:has('facebook')?{followers_count:lastF(docs,'facebook.followers_count'),impressions_today:sumF(docs,'facebook.impressions_today'),reach_today:sumF(docs,'facebook.reach_today'),engaged_users_today:sumF(docs,'facebook.engaged_users_today'),page_likes:lastF(docs,'facebook.page_likes')}:null,
    tiktok:has('tiktok')?{followers_count:lastF(docs,'tiktok.followers_count'),total_likes:lastF(docs,'tiktok.total_likes'),video_count:lastF(docs,'tiktok.video_count'),following_count:lastF(docs,'tiktok.following_count')}:null,
    youtube:has('youtube')?{subscribers_count:lastF(docs,'youtube.subscribers_count'),total_views:lastF(docs,'youtube.total_views'),total_videos:lastF(docs,'youtube.total_videos'),views_today:sumF(docs,'youtube.views_today'),watch_minutes_today:sumF(docs,'youtube.watch_minutes_today'),subscribers_gained_today:sumF(docs,'youtube.subscribers_gained_today'),subscribers_lost_today:sumF(docs,'youtube.subscribers_lost_today')}:null,
  };
}

// ── RENDER ──
function renderAll(){
  el('period-label').textContent=getPeriodLabel();

  if(!REPORT){
    el('main-page').innerHTML=`<div class="loading-page"><span style="font-size:13px;color:var(--dim);">No data available for this period.</span></div>`;
    return;
  }

  const pills=el('status-pills'); pills.innerHTML='';
  const {success,skipped,failed}=REPORT.meta;
  if(success.length) pills.innerHTML+=`<span class="pill ok">${success.length} sources ok</span>`;
  if(skipped.length) pills.innerHTML+=`<span class="pill warn">${skipped.length} skipped</span>`;
  if(failed.length)  pills.innerHTML+=`<span class="pill err">${failed.length} failed</span>`;

  const agg=REPORT._agg;
  const p=pw();
  const u=REPORT.mongodb_users, g=REPORT.ga4, yt=REPORT.youtube;

  let html='';

  // ── AGG NOTE ──
  if(agg) html+=`<div class="agg-note">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Aggregated from ${REPORT._days} daily report${REPORT._days>1?'s':''}. Activity metrics show period totals; follower and subscriber counts reflect the most recent snapshot.
  </div>`;

  // ── USERS ──
  html+=`<div class="section-block section-clickable" data-modal="users">
    <div class="section-header">
      <div class="section-title-row">
        <span class="section-title">Users</span>
        <span class="pill section-details-pill">details →</span>
      </div>
      <span class="section-note">${stag('snapshot','true')}</span>
    </div>

    <div class="hero-strip" style="grid-template-columns:1fr 1fr;">
      <div class="hero-card">
        <div class="hero-card-label">Total Signups ${stag('snapshot',true)}</div>
        <div class="hero-card-value">${u?fmtK(u.successful_signups_total):'—'}</div>
        <div class="hero-card-sub">+${u?u.successful_signups_today:0} new ${p}</div>
      </div>
      <div class="hero-card">
        <div class="hero-card-label">Signup Success Rate ${p}</div>
        <div class="hero-card-value">${u?fmt(u.signup_success_rate,'','%',1):'—'}</div>
        <div class="hero-card-sub">${u?fmtK(u.successful_signups_today)+' ok / '+fmtK(u.failed_attempts_today)+' failed':'—'}</div>
      </div>
    </div>

    <div style="max-width:100%;">
      <div class="panel">
        <div class="panel-title">
          <div class="panel-icon" style="background:rgba(124,58,237,0.1);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F8932F" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          Signup Attempts
        </div>
        ${u?`<div class="conv-bar-wrap">
          <div class="conv-bar-labels">
            <span>Failed — ${fmtK(u.failed_attempts_today)}</span>
            <span style="color:var(--blurple2);">Successful — ${fmtK(u.successful_signups_today)}</span>
          </div>
          <div class="conv-bar-track"><div class="conv-bar-fill" style="width:${Math.min(u.signup_success_rate,100).toFixed(1)}%;"></div></div>
        </div>
        <div class="card-grid-auto">
          <div class="stat-tile"><div class="stat-label">Successful ${stag(p)}</div><div class="stat-value pos">+${u.successful_signups_today}</div></div>
          <div class="stat-tile"><div class="stat-label">Attempts ${stag(p)}</div><div class="stat-value">${fmtK(u.attempts_today)}</div></div>
          <div class="stat-tile"><div class="stat-label">Failed ${stag(p)}</div><div class="stat-value">${fmtK(u.failed_attempts_today)}</div></div>
          <div class="stat-tile"><div class="stat-label">Total All-Time ${stag('snapshot',true)}</div><div class="stat-value">${fmtK(u.successful_signups_total)}</div></div>
        </div>`:`<div class="empty">No data collected</div>`}
      </div>
    </div>
  </div>`;

  // ── SOCIAL MEDIA ──
  const CLICKABLE_PLATFORMS = new Set(['twitter', 'instagram']);
  // ENGAGEMENT_STATS is populated by load() before renderAll() runs
  const engagedToday = key => {
    if (key === 'twitter')   return (ENGAGEMENT_STATS?.twitter?.posted_today   ?? 0) > 0;
    if (key === 'instagram') return (ENGAGEMENT_STATS?.instagram?.posted_today ?? 0) > 0;
    return false;
  };

  function socialCard(key, name, color, icon, statsArr, minor=false, compact=false) {
    const d = REPORT[key], sk = !d;
    const clickable = d && CLICKABLE_PLATFORMS.has(key);
    const engaged = engagedToday(key);
    const headerRight = sk
      ? `<span class="pill warn" style="font-size:9px;padding:2px 7px;">skipped</span>`
      : engaged
        ? `<span class="engaged-badge" title="You've marked at least one draft posted today">✓ Engaged today</span>`
        : clickable
          ? `<span class="pill" style="font-size:9px;padding:2px 7px;background:rgba(238,128,52,0.12);color:var(--blurple);border-color:rgba(238,128,52,0.2);">details →</span>`
          : '';
    return `<div class="social-card${sk?' skipped':''}${minor?' minor':''}${compact?' compact':''}${clickable?' clickable':''}" ${clickable?`data-platform="${key}"`:''}>
      <div class="social-card-header">
        <div class="social-platform">${icon} ${name}</div>
        ${headerRight}
      </div>
      <div class="social-followers" style="color:${color};">${d?fmtK(d.followers_count):'—'}</div>
      <div class="social-fol-label">followers</div>
      <div class="social-stats">
        ${(d?statsArr(d):[{l:'—',v:'—'},{l:'—',v:'—'},{l:'—',v:'—'},{l:'—',v:'—'}]).map(st=>`
          <div class="ss"><div class="ss-label">${st.l}</div><div class="ss-value">${st.v}</div></div>`).join('')}
      </div>
    </div>`;
  }

function openModal(){ document.getElementById('detail-modal').classList.add('open'); }

function wireModal(){
  const closeBtn = document.getElementById('modal-close');
  const overlay  = document.getElementById('detail-modal');
  if (!closeBtn || !overlay) return;
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', e=>{
    if (e.target.id === 'detail-modal') closeModal();
  });
  document.addEventListener('keydown', e=>{ if (e.key === 'Escape') closeModal(); });
  document.addEventListener('click', e=>{
    // Twitter (platform) card click
    const platCard = e.target.closest('[data-platform]');
    if (platCard) {
      const p = platCard.dataset.platform;
      if (p === 'twitter')   { openTwitterModal(); return; }
      if (p === 'instagram') { openInstagramModal(); return; }
    }
    // Section-level click (Users, Website Analytics) — only fire if the click target
    // isn't an interactive element inside the section (links, buttons, etc.)
    const sec = e.target.closest('[data-modal]');
    if (sec) {
      if (e.target.closest('a, button, [role="button"], input, textarea, select')) return;
      const m = sec.dataset.modal;
      if (m === 'users')   { openUsersModal();   return; }
      if (m === 'website') { openWebsiteModal(); return; }
      if (m === 'tickets') { openTicketsModal(); return; }
    }
  });
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', wireModal);
} else {
  wireModal();
}

// ── Generic modal system ──
// Opens the shared modal with a configurable title + tabs. Each tab has an id,
// a label, and a render function. First tab auto-renders; others render on click.
function configureModal({ title, handle, tabs }) {
  document.getElementById('modal-title-main').textContent = title;
  document.getElementById('modal-handle').textContent = handle || '';
  const tabsEl = document.querySelector('.modal-tabs');
  const bodyEl = document.querySelector('.modal-body');
  if (tabs.length <= 1) {
    tabsEl.innerHTML = '';
    tabsEl.style.display = 'none';
  } else {
    tabsEl.style.display = '';
    tabsEl.innerHTML = tabs.map((t,i) =>
      `<button class="modal-tab ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>`
    ).join('');
  }
  bodyEl.innerHTML = tabs.map((t,i) =>
    `<div class="modal-panel ${i===0?'active':''}" data-panel="${t.id}"></div>`
  ).join('');

  const rendered = new Set();
  const renderTab = (idx) => {
    if (rendered.has(idx)) return;
    rendered.add(idx);
    try { tabs[idx].render(); } catch(e){ console.error('render error', e); }
  };

  tabsEl.querySelectorAll('.modal-tab').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      tabsEl.querySelectorAll('.modal-tab').forEach(b => b.classList.toggle('active', b===btn));
      bodyEl.querySelectorAll('.modal-panel').forEach(p => p.classList.toggle('active', p.dataset.panel===btn.dataset.tab));
      renderTab(i);
    });
  });

  openModal();
  renderTab(0);
}

function niceChart(series, opts={}){
  // series: [{ date: 'YYYY-MM-DD', value: number }, ...] sorted oldest->newest
  const width = 720, height = 220;
  const color = opts.color || '#EE8034';
  const label = opts.label || '';
  const fmtV  = opts.fmt || (v => v);
  const pad = { t: 16, r: 16, b: 28, l: 48 };

  if (!series.length) {
    return `<div class="empty" style="padding:30px 0;">No data for this range.</div>`;
  }
  if (series.length === 1) {
    return `<div style="padding:18px 12px;text-align:center;">
      <div style="font-size:12px;color:var(--sub);margin-bottom:6px;">Single snapshot — ${series[0].date}</div>
      <div style="font-size:32px;font-weight:700;color:${color};">${fmtV(series[0].value)}</div>
      <div style="font-size:11px;color:var(--dim);margin-top:8px;">Chart will populate as more daily reports accumulate.</div>
    </div>`;
  }

  const vals = series.map(s => s.value);
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const range = (max - min) || Math.max(max, 1);
  const yMin = Math.max(0, min - range * 0.1);
  const yMax = max + range * 0.1;
  const yRange = yMax - yMin || 1;

  const innerW = width  - pad.l - pad.r;
  const innerH = height - pad.t - pad.b;
  const dx = innerW / Math.max(series.length - 1, 1);
  const pts = series.map((s, i) => [
    pad.l + i * dx,
    pad.t + innerH * (1 - (s.value - yMin) / yRange)
  ]);

  const path = pts.map((p, i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = path + ` L${pts[pts.length-1][0].toFixed(1)},${pad.t+innerH} L${pts[0][0].toFixed(1)},${pad.t+innerH} Z`;

  const yTicks = 4;
  const yLines = Array.from({length: yTicks+1}, (_, i) => {
    const v = yMin + (yRange * i / yTicks);
    const y = pad.t + innerH * (1 - i / yTicks);
    return { v, y };
  });

  const nXLabels = Math.min(series.length, 6);
  const xLabelIdx = Array.from({length: nXLabels}, (_, i) =>
    Math.round(i * (series.length - 1) / Math.max(nXLabels - 1, 1))
  );
  const xLabels = xLabelIdx.map(i => ({ x: pts[i][0], date: series[i].date }));
  const gradId = 'ncg_' + Math.random().toString(36).slice(2,8);

  return `<svg viewBox="0 0 ${width} ${height}" width="100%" style="display:block;">
    <defs><linearGradient id="${gradId}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${yLines.map(l => `<line x1="${pad.l}" x2="${width-pad.r}" y1="${l.y.toFixed(1)}" y2="${l.y.toFixed(1)}" stroke="#2a2a38" stroke-width="1"/>`).join('')}
    ${yLines.map(l => `<text x="${pad.l - 8}" y="${(l.y + 3).toFixed(1)}" fill="#5a5870" font-size="10" text-anchor="end" font-family="Inter,sans-serif">${fmtV(l.v)}</text>`).join('')}
    <path d="${area}" fill="url(#${gradId})"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i) => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${color}" stroke="${opts.bgForDot||'#131318'}" stroke-width="1.5"><title>${series[i].date}: ${fmtV(series[i].value)}</title></circle>`).join('')}
    ${xLabels.map(x => `<text x="${x.x.toFixed(1)}" y="${height - 8}" fill="#5a5870" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">${x.date.slice(5)}</text>`).join('')}
    <text x="${pad.l}" y="${pad.t - 4}" fill="#9895aa" font-size="10" font-weight="600" font-family="Inter,sans-serif">${label}</text>
  </svg>`;
}

// Cap a date-sorted history list to the last N days, or all
function filterByScale(history, scale){
  if (scale === 'all') return history;
  const n = { '7d': 7, '30d': 30, '90d': 90 }[scale] || 30;
  return history.slice(-n);
}

// ── Reusable metric/chart renderer ──
// Drops a clickable-metric-boxes row + scale picker + chart into `panel`.
// state: { metric, scale } — mutated in place so the user's selection sticks.
// metricDefs: { key: { label, pick(h), color, fmt(v) } }
// boxes: [{ key, label, value, sub }] — display config per box
async function renderMetricPanel({
  panel, state, metricDefs, boxes, history,
  scales = ['7d','30d','90d','all'],
}) {
  const kBox = (key, label, value, sub, isActive) => `
    <div class="kmetric kmetric-clickable ${isActive?'active':''}" data-metric="${key}">
      <div class="kmetric-label">${label}</div>
      <div class="kmetric-value">${value}</div>
      <div class="kmetric-sub">${sub}</div>
    </div>`;

  const controlsHtml = `
    <div class="kmetric-row">${boxes.map(b => kBox(b.key, b.label, b.value, b.sub, state.metric===b.key)).join('')}</div>
    <div class="chart-wrap">
      <div class="chart-head">
        <div class="chart-title" id="chart-title-${panel.dataset.panel}"></div>
        <div class="scale-picker">
          ${scales.map(s => `<button class="scale-btn ${s===state.scale?'active':''}" data-scale="${s}">${s.toUpperCase()}</button>`).join('')}
        </div>
      </div>
      <div id="chart-body-${panel.dataset.panel}"></div>
    </div>
  `;

  // Insert controls at top; caller appends supplementary panels after
  panel.insertAdjacentHTML('afterbegin', controlsHtml);

  const pick = (metricKey) =>
    history.map(h => ({ date: h.date, value: metricDefs[metricKey].pick(h) }))
           .filter(p => p.value != null && !Number.isNaN(p.value));

  function drawChart(){
    const def = metricDefs[state.metric];
    const all = pick(state.metric);
    const series = filterByScale(all, state.scale);
    const title = document.getElementById('chart-title-' + panel.dataset.panel);
    const body  = document.getElementById('chart-body-'  + panel.dataset.panel);
    if (!title || !body) return;
    const rangeLabel = state.scale.toUpperCase();
    const firstDate = series[0]?.date || '—';
    const lastDate  = series[series.length-1]?.date || '—';
    const deltaText = (series.length >= 2) ? (series[series.length-1].value - series[0].value) : null;
    const deltaStr = (deltaText == null) ? ''
      : ` · ${deltaText >= 0 ? '+' : ''}${def.fmt(deltaText)} since ${firstDate}`;
    title.textContent = `${def.label} · ${rangeLabel} (${firstDate} → ${lastDate}${deltaStr})`;
    body.innerHTML = niceChart(series, { label: def.label, color: def.color, fmt: def.fmt });
  }
  drawChart();

  panel.querySelectorAll('.kmetric-clickable').forEach(box => {
    box.addEventListener('click', () => {
      state.metric = box.dataset.metric;
      panel.querySelectorAll('.kmetric-clickable').forEach(b => b.classList.toggle('active', b === box));
      drawChart();
    });
  });
  panel.querySelectorAll('.scale-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.scale = btn.dataset.scale;
      panel.querySelectorAll('.scale-btn').forEach(b => b.classList.toggle('active', b === btn));
      drawChart();
    });
  });
}

      <div class="kmetric"><div class="kmetric-label">Rolling success rate · 7d</div><div class="kmetric-value">${(function(){ const s=sum(last7,'successful_signups_today'), a=sum(last7,'attempts_today'); return a ? (s/a*100).toFixed(1)+'%' : '—'; })()}</div><div class="kmetric-sub">s/a</div></div>

  `);

  panel.insertAdjacentHTML('beforeend', `
    <div class="chart-wrap" style="padding:0;">
      <div class="chart-head" style="padding:14px 16px 0;">
        <div class="chart-title">Recent signup attempts</div>
        <div class="scale-picker" id="signup-filter">

          <button class="scale-btn" data-su-filter="success">Success</button>
          <button class="scale-btn" data-su-filter="failed">Failed</button>
        </div>
      </div>
      <div id="signup-list-body" style="padding:10px 16px 16px;">
        <div class="empty" style="padding:20px 0;">Loading…</div>
      </div>
    </div>
  `);

  async function loadSignups(filter){
    const body = document.getElementById('signup-list-body');
    if (!body) return;
    body.innerHTML = '<div class="empty" style="padding:20px 0;">Loading…</div>';
    try {
      const res = await fetch('/api/admin/dashboard/signups?status=' + filter + '&limit=50');
      const rows = await res.json();
      if (!Array.isArray(rows) || rows.length === 0){
        body.innerHTML = '<div class="empty" style="padding:20px 0;">No signup records for this filter.</div>';
        return;
      }
      body.innerHTML = `<div class="signup-list">
        ${rows.map(r => {
          const when = r.created_at ? new Date(r.created_at) : null;
          const dateLabel = when ? when.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' ' + when.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : '—';
          const name = escapeHtml(((r.firstname || '') + ' ' + (r.lastname || '')).trim() || '(no name)');

          const loginId = r.login_id ? `<span class="su-login">${escapeHtml(r.login_id)}</span>` : `<span class="su-login failed">${escapeHtml(r.error || 'failed')}</span>`;
          const status = r.success ? '<span class="su-status ok">OK</span>' : '<span class="su-status fail">✗</span>';
          return `<div class="signup-row ${r.success ? 'success' : 'failed'}">
            <div class="su-date">${dateLabel}</div>
            <div><div class="su-name">${name}</div><div class="su-email">${email}</div></div>
            <div>${loginId}</div>
            <div>${status}</div>
          </div>`;
        }).join('')}
      </div>`;
    } catch(e){
      body.innerHTML = `<div class="empty" style="padding:20px 0;color:var(--red);">Failed to load: ${escapeHtml(String(e))}</div>`;
    }
  }

  // Wire filter buttons + initial load
  const filterEl = document.getElementById('signup-filter');
  if (filterEl) {
    filterEl.querySelectorAll('.scale-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filterEl.querySelectorAll('.scale-btn').forEach(b => b.classList.toggle('active', b === btn));
        loadSignups(btn.dataset.suFilter);
      });
    });
  }
  loadSignups('all');
}

function relativeTime(iso){
  if (!iso) return '';
  const t = new Date(iso).getTime();
  if (Number.isNaN(t)) return '';
  const diffMin = Math.round((Date.now() - t) / 60000);
  if (diffMin < 1)    return 'just now';
  if (diffMin < 60)   return `${diffMin}m ago`;
  if (diffMin < 1440) return `${Math.round(diffMin/60)}h ago`;
  return `${Math.round(diffMin/1440)}d ago`;
}

async function patchDraft(id, status){
  return fetch(`/api/admin/dashboard/engagement-drafts/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},

  });
}

    targetMeta.push(`${d.target_likes ?? 0} likes on their reply`);
    if (age) targetMeta.push(age);
    const hotMeta = [];
    if (d.context_hot_likes != null) hotMeta.push(`${fmtK(d.context_hot_likes)} ♥`);
    if (d.context_hot_replies != null) hotMeta.push(`${fmtK(d.context_hot_replies)} replies`);
    if (d.context_hot_retweets != null) hotMeta.push(`${fmtK(d.context_hot_retweets)} RT`);
    if (d.context_hot_impressions) hotMeta.push(`${fmtK(d.context_hot_impressions)} imp`);

    const tier = d.quality_tier || 'med';
    const tierLabel = { high: 'High', med: 'Medium', low: 'Low' }[tier] || 'Medium';
    const score = d.quality_score != null ? ` (${d.quality_score})` : '';
    const qualityReasons = (d.quality_reasons || []).join(' · ');
    return `<div class="draft-card" data-draft-id="${d._id}">
      <div class="draft-head">
        <div class="draft-target">
          <div style="display:flex;align-items:center;gap:8px;">

        </div>

          <a class="draft-btn open" href="${d.reply_to_url}" target="_blank" rel="noopener">Open tweet ↗</a>
          <button class="draft-btn posted" data-action="posted">Mark posted</button>
          <button class="draft-btn dismiss" data-action="dismiss">Dismiss</button>

      </div>
      <div class="draft-thread">
        <div class="draft-context">
          <div class="draft-context-label">
            Hot thread by @${escapeHtml(d.context_author||'?')}
            ${hotMeta.length ? `· <span style="color:var(--sub);">${hotMeta.join(' · ')}</span>` : ''}
            ${d.context_url?`· <a href="${d.context_url}" target="_blank" rel="noopener" style="color:var(--sub);">view ↗</a>`:''}
          </div>
          <div class="draft-context-text">${escapeHtml(d.context_tweet||'')}</div>
        </div>
        <div class="draft-target-tweet">
          <div class="draft-context-label">↳ Replying to @${escapeHtml(d.target_handle||'?')}</div>
          <div class="draft-target-text">${escapeHtml(d.target_tweet_text||'')}</div>

  panel.innerHTML = statsBar + `<div class="draft-list">${drafts.map(draftCard).join('')}</div>`;

  wireEngagementControls();

  panel.querySelectorAll('.draft-card').forEach(card => {
    const id = card.dataset.draftId;
    card.querySelector('[data-action="copy"]').addEventListener('click', async () => {
      const text = card.querySelector('[data-reply-text]').textContent;
      try {
        await navigator.clipboard.writeText(text);
        const btn = card.querySelector('[data-action="copy"]');
        const orig = btn.textContent;
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
      } catch(e){ alert('Copy failed: ' + e.message); }
    });
    card.querySelector('[data-action="posted"]').addEventListener('click', async () => {
      try {
        await patchDraft(id, 'posted');
        card.style.transition = 'opacity 0.2s';
        card.style.opacity = '0';
        setTimeout(renderTwitterEngagement, 220);
      } catch(e){ alert('Mark posted failed: ' + e.message); }
    });
    card.querySelector('[data-action="dismiss"]').addEventListener('click', async () => {
      if (!confirm('Dismiss this draft?')) return;
      try {
        await patchDraft(id, 'dismissed');
        card.style.transition = 'opacity 0.2s';
        card.style.opacity = '0';
        setTimeout(renderTwitterEngagement, 220);
      } catch(e){ alert('Dismiss failed: ' + e.message); }
    });
  });
}

      <div class="draft-head">
        <div class="draft-target">
          <span class="draft-handle">@${escapeHtml(d.target_handle||'?')}</span>
          <span class="draft-meta">${metaParts.join(' · ')}</span>
        </div>
        <div class="draft-actions">
          <button class="draft-btn copy" data-action="copy">Copy comment</button>
          <a class="draft-btn open" href="${d.post_url}" target="_blank" rel="noopener">Open post ↗</a>
          <button class="draft-btn posted" data-action="posted">Mark posted</button>
          <button class="draft-btn dismiss" data-action="dismiss">Dismiss</button>
        </div>
      </div>
      <div class="draft-thread">
        <div class="draft-context">
          <div class="draft-context-label">Instagram post by @${escapeHtml(d.target_handle||'?')}
            · <a href="${d.post_url}" target="_blank" rel="noopener" style="color:var(--sub);">${d.post_url.replace('https://www.','')}</a>
          </div>
          <div class="draft-context-text">${escapeHtml(d.post_caption||'(no caption excerpt)')}</div>
        </div>
        <div class="draft-reply">
          <div class="draft-reply-label">Draft comment</div>
          <div class="draft-reply-text" data-reply-text>${escapeHtml(d.draft_comment||'')}</div>
          ${d.why_this_comment ? `<div class="draft-why"><span>Why:</span> ${escapeHtml(d.why_this_comment)}</div>` : ''}
        </div>
      </div>
    </div>`;
  };

  panel.innerHTML = statsBar + `<div class="draft-list">${drafts.map(card).join('')}</div>`;
  wireInstagramEngagementControls();

  panel.querySelectorAll('.draft-card').forEach(c => {
    const id = c.dataset.draftId;
    c.querySelector('[data-action="copy"]').addEventListener('click', async () => {
      const text = c.querySelector('[data-reply-text]').textContent;
      try {
        await navigator.clipboard.writeText(text);
        const b = c.querySelector('[data-action="copy"]');
        const o = b.textContent; b.textContent = 'Copied ✓'; b.classList.add('copied');
        setTimeout(() => { b.textContent = o; b.classList.remove('copied'); }, 1500);
      } catch(e){ alert('Copy failed: ' + e.message); }
    });
    c.querySelector('[data-action="posted"]').addEventListener('click', async () => {
      try {
        await fetch(`/api/admin/dashboard/instagram-drafts/${id}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({status:'posted'})});
        c.style.transition = 'opacity 0.2s'; c.style.opacity = '0';
        setTimeout(renderInstagramEngagement, 220);
      } catch(e){ alert('Mark posted failed: ' + e.message); }
    });
    c.querySelector('[data-action="dismiss"]').addEventListener('click', async () => {
      if (!confirm('Dismiss this draft?')) return;
      try {
        await fetch(`/api/admin/dashboard/instagram-drafts/${id}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({status:'dismissed'})});
        c.style.transition = 'opacity 0.2s'; c.style.opacity = '0';
        setTimeout(renderInstagramEngagement, 220);
      } catch(e){ alert('Dismiss failed: ' + e.message); }
    });
  });
}

function wireInstagramEngagementControls(){
  const refresh = document.getElementById('refresh-ig-drafts');
  if (refresh) refresh.addEventListener('click', renderInstagramEngagement);
  const run = document.getElementById('run-ig-engagement');
  if (!run) return;
  run.addEventListener('click', async () => {
    if (INSTAGRAM_POLL) return;
    const orig = run.textContent;
    run.disabled = true;
    run.textContent = 'Discovering…';
    try {
      const res = await fetch('/api/admin/dashboard/instagram-drafts/run', {method:'POST'});
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch(e){
      alert('Run failed: ' + e.message);
      run.disabled = false; run.textContent = orig; return;
    }
    let baseline = 0;
    try {
      const s = await fetch('/api/admin/dashboard/instagram-drafts/stats').then(r => r.json());
      baseline = s.pending ?? 0;
    } catch(_){}
    let elapsed = 0; const STEP = 8; const TIMEOUT = 180;
    INSTAGRAM_POLL = setInterval(async () => {
      elapsed += STEP;
      run.textContent = `Discovering… ${Math.min(elapsed, TIMEOUT)}s`;
      try {
        const s = await fetch('/api/admin/dashboard/instagram-drafts/stats').then(r => r.json());
        if ((s.pending ?? 0) > baseline) {
          clearInterval(INSTAGRAM_POLL); INSTAGRAM_POLL = null;
          run.disabled = false; run.textContent = orig;
          renderInstagramEngagement();
          return;
        }
      } catch(_){}
      if (elapsed >= TIMEOUT) {
        clearInterval(INSTAGRAM_POLL); INSTAGRAM_POLL = null;
        run.disabled = false; run.textContent = orig;
        renderInstagramEngagement();
      }
    }, STEP * 1000);
  });
}

function wireEngagementControls(){
  const refresh = document.getElementById('refresh-drafts');
  if (refresh) refresh.addEventListener('click', renderTwitterEngagement);

  const run = document.getElementById('run-engagement');
  if (!run) return;

  run.addEventListener('click', async () => {
    // Don't double-fire while a poll is already running
    if (ENGAGEMENT_POLL) return;

    const origText = run.textContent;
    run.disabled = true;
    run.textContent = 'Discovering…';

    try {
      const res = await fetch('/api/admin/dashboard/engagement-drafts/run', {method:'POST'});
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch(e){
      alert('Run failed: ' + e.message);
      run.disabled = false;
      run.textContent = origText;
      return;
    }

    // Snapshot the pending count BEFORE polling so we can detect the increase
    let baseline = 0;
    try {
      const s = await fetch('/api/admin/dashboard/engagement-drafts/stats').then(r => r.json());
      baseline = s.pending ?? 0;
    } catch(_){}

    // Poll /stats silently — no full re-render until we detect new drafts
    let elapsed = 0;
    const STEP = 6;       // seconds between polls
    const TIMEOUT = 120;  // give up after 2 minutes

    ENGAGEMENT_POLL = setInterval(async () => {
      elapsed += STEP;
      run.textContent = `Discovering… ${Math.min(elapsed, TIMEOUT)}s`;
      try {
        const s = await fetch('/api/admin/dashboard/engagement-drafts/stats').then(r => r.json());
        if ((s.pending ?? 0) > baseline) {
          // New drafts landed — stop polling, re-render once, re-enable button
          clearInterval(ENGAGEMENT_POLL); ENGAGEMENT_POLL = null;
          run.disabled = false;
          run.textContent = origText;
          renderTwitterEngagement();
          return;
        }
      } catch(_){ /* ignore transient errors, keep polling */ }

      if (elapsed >= TIMEOUT) {
        clearInterval(ENGAGEMENT_POLL); ENGAGEMENT_POLL = null;
        run.disabled = false;
        run.textContent = origText;
        // Final re-render in case count didn't change (no new hot tweets found)
        renderTwitterEngagement();
      }
    }, STEP * 1000);
  });
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

(async()=>{ await fetchDates(); await load(); })();
