}

// Hashtag row — renders as colored pills by default; click to switch to comma input.
// Saves on blur via the existing PATCH path (data-field="hashtags").
function renderHashtagRow(d, isLocked) {
  const tags = Array.isArray(d.hashtags) ? d.hashtags : [];
  const pills = tags.length
    ? tags.map((t) => `<span class="hashtag-pill">#${safeText(String(t).replace(/^#/, ''))}</span>`).join('')
    : `<span class="hashtag-pill empty">no hashtags — click to add</span>`;
  return `<div class="hashtag-row" data-hashtag-row ${isLocked ? 'data-locked' : ''}>
    ${pills}
    <input class="field-input hashtag-edit-input" data-field="hashtags" value="${safeText(tags.join(', '))}" ${isLocked ? 'disabled' : ''} placeholder="comma-separated, no #" />
  </div>`;
}

// Advanced expander — collapses the manual image-URL override out of the
// default editing surface. Operator clicks "Advanced" to reveal it.
function renderAdvanced(d, isLocked) {
  return `<details class="advanced">
    <summary>Advanced — manual image URL override</summary>
    <input class="field-input" data-field="image_url" placeholder="paste a public image URL" value="${escapeHtml(d.image_url_override || '')}" ${isLocked ? 'disabled' : ''} style="margin-top:6px;" />
  </details>`;
}

// Variant chip — Twitter only, shows whether the active variant is the
// meme reaction or the professional news take.
function renderVariantChip(d) {
  if (d.platform !== 'twitter' || !Array.isArray(d.variants) || d.variants.length < 2) return '';
  const idx = Number.isInteger(d.active_variant_index) ? d.active_variant_index : 0;
  const kind = d.variants[idx]?.variant_kind || 'meme';
  const label = kind === 'professional' ? 'NEWS' : 'MEME';
  return `<span class="variant-chip ${kind}">${label}</span>`;
}

// ─── Today's games panel (Phase 8) ─────────────────────────────────────
// BRIEF.todays_games is populated by Pi nightly. Render as a horizontal
// strip; each card has Live state + Draft tweet buttons. Operator-pull
// only, no auto-polling. ESPN is free; Claude only fires on Draft click.
function renderGamesPanel() {
  const games = (BRIEF && BRIEF.todays_games) || [];
  const panel = document.getElementById('games-panel');
  const strip = document.getElementById('games-strip');
  const countEl = document.getElementById('games-count');
  if (!panel || !strip || !countEl) return;
  if (games.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = '';
  countEl.textContent = String(games.length);
  strip.innerHTML = games.map((g, i) => renderGameCard(g, i)).join('');
  strip.querySelectorAll('.game-card [data-action]').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const card = btn.closest('.game-card');
      const eventId = card.dataset.eventId;
      const leaguePath = card.dataset.leaguePath;
      const action = btn.dataset.action;
      try {
        btn.disabled = true;
        if (action === 'game-state') await actionGameState(card, eventId, leaguePath);
        else if (action === 'game-draft') await actionDraftFromGame(eventId, leaguePath);
      } catch (err) {
        toast(err.message || 'Game action failed', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  });
}

function renderGameCard(g, i) {
  const state = g.state || 'pre';  // pre | in | post
  const score = (g.away_score != null && g.home_score != null)
    ? `<span class="score">${g.away_abbr} ${g.away_score} · ${g.home_abbr} ${g.home_score}</span>`
    : `${g.away_abbr} @ ${g.home_abbr}`;
  const liveDot = state === 'in' ? '<span class="live-dot"></span>' : '';
  const broadcast = g.broadcast ? `<div class="game-broadcast">${escapeHtml(g.broadcast)}</div>` : '';
  return `<div class="game-card ${state}" data-event-id="${escapeHtml(String(g.espn_event_id || ''))}" data-league-path="${escapeHtml(g.league_path || '')}">
    <div class="game-league">${escapeHtml(g.league || '')}</div>
    <div class="game-teams">${score}</div>
    <div class="game-status">${liveDot}${escapeHtml(g.status_short || '')}</div>
    ${broadcast}
    <div class="game-actions">
      <button class="btn small" data-action="game-state" title="Pull live ESPN state (score + recent plays)">📡 Live state</button>
      <button class="btn small primary" data-action="game-draft" title="Draft a tweet from this game state (~$0.04, 2 variants)">✍️ Draft</button>
    </div>
    <div class="game-state-expand" data-game-expand></div>
  </div>`;
}

async function actionGameState(card, eventId, leaguePath) {
  const expand = card.querySelector('[data-game-expand]');
  if (!expand) return;
  if (expand.classList.contains('show')) {
    expand.classList.remove('show');
    expand.innerHTML = '';
    return;
  }
  expand.innerHTML = '<div style="padding:6px;">Fetching ESPN…</div>';
  expand.classList.add('show');
  const res = await fetch(`/api/admin/dashboard/game-state?event_id=${encodeURIComponent(eventId)}&league_path=${encodeURIComponent(leaguePath)}`);
  const json = await res.json();
  if (!res.ok || !json.success) {
    expand.innerHTML = `<div style="color:var(--red);">${escapeHtml(json.error || 'failed')}</div>`;
    return;
  }
  const wp = json.win_probability;
  const wpHtml = wp
    ? `<div class="winprob"><span><b>${json.away.abbr}</b> ${wp.away_pct}%</span> · <span><b>${json.home.abbr}</b> ${wp.home_pct}%</span></div>`
    : '';
  const playsHtml = (json.plays || []).slice(-5).reverse().map((p) =>
    `<div class="play">Q${p.period || '?'} ${escapeHtml(p.clock || '')} — ${escapeHtml(p.text || '')}</div>`
  ).join('');
  expand.innerHTML = `
    <div style="margin-bottom:4px;"><b>${escapeHtml(json.status || '')}</b></div>
    ${wpHtml}
    <div style="margin-top:4px; font-weight:600; color:var(--muted2); font-size:10px; text-transform:uppercase;">Last plays</div>
    ${playsHtml || '<div class="play" style="color:var(--muted);">no plays yet</div>'}
  `;
}

async function actionDraftFromGame(eventId, leaguePath) {
  if (!confirm('Draft a tweet about this game right now? (~$0.04 — generates meme + professional variants from the live state)')) return;
  toast('Drafting from live game — 5-10s…', '');
  const res = await fetch('/api/admin/dashboard/draft-from-game', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ event_id: eventId, league_path: leaguePath }),
  });
  const json = await res.json();
  if (!res.ok || !json.success) throw new Error(json.error || 'draft-from-game failed');
  toast(`Live-game draft created (${json.variants_count} variants)`, 'success');
  await loadDrafts();
}


// Decode HTML entities back to characters. Defensive — Claude (or some
// intermediate layer) occasionally emits text with `&#39;` for apostrophes,
// `&amp;` for &, etc. Without this, escapeHtml below would re-escape
// `&#39;` → `&amp;#39;` which renders as the literal text `&#39;` on screen.
// Was the source of "the players&#39; unions" showing literally in the IG
// caption preview.
function decodeHtmlEntities(s) {
  if (!s) return '';
  // Loop until the decode is idempotent — handles double-encoded text like
  // `&amp;#39;` (where the `&` itself got entity-escaped). One pass would
  // only strip the outer `&amp;`, leaving `&#39;` to be re-escaped on the
  // next render and showing literally on screen. Cap at 5 passes so a
  // pathological input can't spin forever.
  let prev = String(s);
  for (let i = 0; i < 5; i++) {
    const t = document.createElement('textarea');
    t.innerHTML = prev;
    const next = t.value;
    if (next === prev) break;
    prev = next;
  }
  return prev;
}

// Safe-render any user-content string: first decode any HTML entities that
// snuck into the stored value (Claude / paste-in occasionally emits `&#39;`
// for apostrophes etc.), then re-escape so it renders as that character on
// screen. Use this instead of bare escapeHtml() everywhere we render text
// that originated from a draft field (headline, caption, body_text, etc.).
function safeText(s) {
  return escapeHtml(decodeHtmlEntities(s || ''));
}

// Render plain text with inline-blue hashtags and @mentions, line breaks
// preserved. The single biggest "feels native" lever per UI research.
function renderInlineText(text) {
  // The hashtag/mention regexes must NOT match inside a numeric character
  // entity like `&#39;` (apostrophe). Without the lookbehind, `#39` inside
  // `&#39;` matched the hashtag pattern and wrapped to `&<span>#39</span>;`,
  // which the browser then rendered as the literal entity sequence on screen.
  // Lookbehind requires the char before `#`/`@` to NOT be `&` or another
  // word char (so we still match `#tag` at start-of-line or after a space).
  return escapeHtml(decodeHtmlEntities(text))
    .replace(/(^|[^&\w])(#[\w]+)/g, '$1<span class="ht">$2</span>')
    .replace(/(^|[^&\w])(@[\w_]+)/g, '$1<span class="mt">$2</span>')
    .replace(/\n/g, '<br>');
}

// IG caption + hashtags as a single contenteditable. Operator types caption
// and hashtags inline (with #tag syntax); on blur we extract trailing
// hashtags into the d.hashtags array and store the bare caption in d.caption.
// The username sits next to (not inside) the editable region so it can't
// be accidentally edited.
function renderIgCaptionPreview(d, isLocked) {
  const caption = d.caption || '';
  const tags = (d.hashtags || []).map((t) => '#' + String(t).replace(/^#/, '')).join(' ');
  const combined = caption + (tags ? '\n\n' + tags : '');
  return `<div class="ig-caption-preview">
    <span class="ig-username">bitcoin_bay</span>
    <span class="post-text ig" ${isLocked ? '' : 'contenteditable="true"'} data-field="caption_with_tags" data-placeholder="Write a caption…" spellcheck="true">${renderInlineText(combined)}</span>
  </div>`;
}

// Build a context-aware scene-prompt suggestion when Claude didn't produce one.
// Operator can edit before submitting; this is just a sensible starting point.
function suggestScenePrompt(d, slideIndex) {
  const slide = Number.isInteger(slideIndex) ? d.slides?.[slideIndex] : null;
  const target = slide || d;
  if (target.image_scene_prompt) return target.image_scene_prompt;
  const subject = (target.image_subject || 'an athlete').trim();
  const headline = (target.headline || target.image_overlay_text || '').trim();
  const angle = (d.angle || '').trim();
  const ctx = headline || angle || (d.topic || '').trim();
  const sceneClause = ctx ? `reacting to "${ctx}"` : 'in a dynamic moment';
  return `${subject} ${sceneClause}, photorealistic editorial sports photo, dramatic stadium lighting, dynamic composition, high detail`;
}

// Scene-prompt panel for operator-triggered AI image generation.
// `slideIndex` is null for single-image cards (Twitter, IG single), or the
// slide index for carousel slides. The panel is hidden until the operator
// clicks 🎨 Generate scene; submit calls /generate-art and replaces the image.
function renderScenePanel(d, slideIndex) {
  const isSlide = Number.isInteger(slideIndex);
  const slide = isSlide ? (d.slides || [])[slideIndex] : null;
  const prefilled = suggestScenePrompt(d, isSlide ? slideIndex : null);
  const refUrl = isSlide ? (slide?.image_url || '') : (d.image_url || '');
  const sIdxAttr = isSlide ? `data-slide-index="${slideIndex}"` : '';
  const panelKey = isSlide ? slideIndex : '';
  return `<div class="scene-panel" data-scene-panel="${panelKey}">
    <div class="tool-modal-head"><span class="title">🎨 Generate AI scene</span><button data-action="generate-art-cancel" ${sIdxAttr} aria-label="Close">✕</button></div>
    <div class="field-label">🎨 Generate AI scene with athlete's face (Replicate InstantID)</div>
    <textarea class="scene-prompt" data-scene-field="prompt" ${sIdxAttr} placeholder="">${safeText(prefilled)}</textarea>
    <div class="scene-hint">InstantID preserves the face from the reference image while restyling the surroundings to match your prompt. The textarea above is pre-filled with a suggested prompt — edit before submitting if you want a different scene.</div>
    <div class="field-label" style="margin-top:8px;">Reference image URL (face source — defaults to current image)</div>
    <input class="field-input" data-scene-field="reference" ${sIdxAttr} value="${escapeHtml(refUrl)}" placeholder="https://..." />
    <div class="scene-buttons">
      <button class="btn small primary" data-action="generate-art-submit" ${sIdxAttr}>Generate scene</button>
      <button class="btn small ghost" data-action="generate-art-cancel" ${sIdxAttr}>Cancel</button>
      <span class="scene-cost">~$0.05 · operator-triggered, audit-logged</span>
    </div>
  </div>`;
}

// Phase 9.5 — render the branded-sticker overlay if the slide / draft has
// `branded_overlay` set. Positioned in % coords, drag handlers wired in
// wireCardActions so it can be repositioned live.
function renderStickerOverlayHtml(overlay, slideIndex, isLocked) {
  if (!overlay || !overlay.key) return '';
  const x = Number.isFinite(overlay.x_pct) ? overlay.x_pct : 80;
  const y = Number.isFinite(overlay.y_pct) ? overlay.y_pct : 12;
  const scale = Number.isFinite(overlay.scale_pct) ? overlay.scale_pct : 18;
  const sIdx = Number.isInteger(slideIndex) ? slideIndex : '';
  return `<div class="sticker-overlay${isLocked ? '' : ' draggable'}"
       data-sticker-overlay
       data-slide-index="${sIdx}"
       data-x-pct="${x}"
       data-y-pct="${y}"
       data-scale-pct="${scale}"
       data-key="${escapeHtml(overlay.key)}"
       style="left:${x}%; top:${y}%; transform:translate(-50%, -50%); width:${scale}%; aspect-ratio:1/1;">
    <img src="/branded-overlays/${escapeHtml(overlay.key)}.svg" alt="" />
    ${isLocked ? '' : '<div class="resize-handle" data-resize-target="sticker" title="Drag to resize"></div>'}
  </div>`;
}

// Phase 9.5 — sticker picker panel. Lazy-loads the manifest on first open.
function renderStickerPanel(d, slideIndex) {
  const isSlide = Number.isInteger(slideIndex);
  const sIdxAttr = isSlide ? `data-slide-index="${slideIndex}"` : '';
  const panelKey = isSlide ? slideIndex : '';
  const current = isSlide
    ? (d.slides || [])[slideIndex]?.branded_overlay
    : d.branded_overlay;
  const activeRow = (current && current.key) ? `
    <div class="sticker-active-row">
      <img src="/branded-overlays/${escapeHtml(current.key)}.svg" alt="" />
      <div style="font-size:11px; color:var(--muted); flex:0 0 auto;">Active: <b style="color:var(--text);">${escapeHtml(current.key)}</b></div>
      <input type="range" min="8" max="40" step="1" value="${Number.isFinite(current.scale_pct) ? current.scale_pct : 18}"
             class="scale-slider" data-sticker-scale ${sIdxAttr} title="Scale (% of image width)" />
      <button class="btn small ghost" data-action="remove-sticker" ${sIdxAttr} title="Remove sticker">🗑</button>
      <button class="btn small primary" data-action="save-sticker-layout" ${sIdxAttr} title="Bake sticker into composite">💾 Save</button>
    </div>` : '';
  return `<div class="sticker-panel" data-sticker-panel="${panelKey}">
    <div class="tool-modal-head"><span class="title">🏷️ Branded sticker</span><button data-action="add-sticker-cancel" ${sIdxAttr} aria-label="Close">✕</button></div>
    <div class="field-label">Auto-suggested logos appear at top with a gold ring</div>
    ${activeRow}
    <div class="sticker-results" data-sticker-results="${panelKey}">
      <div class="photo-loading">Loading manifest…</div>
    </div>
    <div style="display:flex; gap:6px; margin-top:10px;">
      <button class="btn small ghost" data-action="add-sticker-cancel" ${sIdxAttr}>Close</button>
    </div>
  </div>`;
}

// Phase 9.2 — empty shell for the photo-replace picker. Populated lazily on
// open via /api/admin/dashboard/photo-search. `slideIndex` is null for single
// images (Twitter/IG single) or the slide index for carousel slides.
function renderPhotoPanel(d, slideIndex) {
  const isSlide = Number.isInteger(slideIndex);
  const slide = isSlide ? (d.slides || [])[slideIndex] : null;
  const subject = isSlide ? (slide?.image_subject || '') : (d.image_subject || '');
  const sIdxAttr = isSlide ? `data-slide-index="${slideIndex}"` : '';
  const panelKey = isSlide ? slideIndex : '';
  return `<div class="photo-panel" data-photo-panel="${panelKey}">
    <div class="tool-modal-head"><span class="title">📷 Replace photo</span><button data-action="replace-photo-cancel" ${sIdxAttr} aria-label="Close">✕</button></div>
    <div class="field-label">Searching Wikimedia · Pexels · Unsplash · Brave for "${safeText(subject || 'this subject')}"</div>
    <div class="photo-results" data-photo-results="${panelKey}">
      <div class="photo-loading">Click below to load candidates…</div>
    </div>
    <div class="photo-paste-row">
      <input class="field-input" data-photo-paste-url ${sIdxAttr} placeholder="…or paste a public image URL to override" />
      <button class="btn small primary" data-action="replace-photo-paste" ${sIdxAttr}>Use URL</button>
      <button class="btn small ghost" data-action="replace-photo-cancel" ${sIdxAttr}>Close</button>
    </div>
  </div>`;
}

function renderActions(d, isLocked) {
  if (isLocked) {
    return `<div class="card-actions">
      <span style="color:var(--muted2); font-size:11px;">${d.status === 'posted' ? '✓ Posted' : '⛔ Skipped'} · ${formatTimestamp(d.updated_at)}</span>
    </div>`;
  }
  // Phase 9.7: collapse the cluttered 5-6 button row into 3 visible
  // buttons (Save · ⋯ More · Approve). The "More" button opens a popover
  // menu containing the less-frequent / destructive actions.
  const isTwitter = d.platform === 'twitter';
  const isCarousel = d.platform === 'instagram_carousel';
  const variantItem = (isTwitter && Array.isArray(d.variants) && d.variants.length >= 2)
    ? `<button class="menu-item" data-action="swap-variant"><span>⇄ Switch variant</span><span class="menu-hint">meme ↔ news</span></button>`
    : '';
  const carouselItems = isCarousel
    ? `<button class="menu-item" data-action="regen-all-images"><span>🔁 Re-render all images</span><span class="menu-hint">bake new composites (~30s)</span></button>
       <button class="menu-item" data-action="download-zip"><span>📦 Download ZIP</span><span class="menu-hint">all slide JPEGs</span></button>`
    : '';
  return `<div class="card-actions">
    <button class="btn small primary" data-action="save">💾 Save</button>
    <div class="more-wrap">
      <button class="btn small" data-action="open-more-menu" data-menu-target="${d._id}" aria-haspopup="menu" aria-expanded="false" title="More actions">⋯ More</button>
      <div class="more-menu" data-more-menu="${d._id}" role="menu">
        <button class="menu-item" data-action="regen"><span>🆕 New draft text</span><span class="menu-hint">re-prompt Claude</span></button>
        ${variantItem}
        ${carouselItems}
        <div class="menu-divider"></div>
        <button class="menu-item destructive" data-action="skip"><span>⛔ Skip post</span><span class="menu-hint">don't publish</span></button>
      </div>
    </div>
    <button class="btn small success" data-action="approve" style="margin-left:auto;">✓ Approve</button>
  </div>`;
}

function formatTimestamp(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString();
  } catch (_) { return iso; }
}

// ─── Card actions wiring ────────────────────────────────────────────────
function wireCardActions(cardEl) {
  const id = cardEl.dataset.id;

  // Char counters live as you type
  cardEl.querySelectorAll('.editor[data-field=text], .editor[data-field=caption]').forEach((ed) => {
    ed.addEventListener('input', () => {
      const counter = cardEl.querySelector('[data-counter]');
      if (!counter) return;
      const len = ed.value.length;
      const limit = ed.dataset.field === 'text' ? TWITTER_LIMIT : IG_CAPTION_LIMIT;
      counter.querySelector('.len').textContent = len;
      counter.classList.toggle('over', len > limit);
    });
  });

  // Slide switching via the native-style dot row under the carousel image.
  // Re-renders the whole card so the active-slide editor + hero image swap.
  // Special case: data-slide="cta_slot" → opens the CTA editor in the slide
  // panel (not a real slide; "+" tile in the dot row).
  cardEl.querySelectorAll('.ig-dots .dot[data-slide]').forEach((dot) => {
    dot.addEventListener('click', () => {
      const raw = dot.dataset.slide;
      CURRENT_SLIDE[id] = (raw === 'cta_slot') ? 'cta_slot' : Number(raw);
      const draft = DRAFTS.find((x) => x._id === id);
      if (!draft) return;
      const newHtml = renderInstagramCarouselCard(draft);
      const wrapper = document.createElement('div');
      wrapper.innerHTML = newHtml;
      const newCard = wrapper.firstElementChild;
      cardEl.replaceWith(newCard);
      wireCardActions(newCard);
    });
  });

  // Unified contenteditable .post-text: display IS the editor. No toggle.
  // On input, update the char counter live (no re-render — that would jump
  // the cursor). On blur, extract plain text + re-render styled spans + save.
  cardEl.querySelectorAll('.post-text[contenteditable="true"]').forEach((el) => {
    // Live char counter (twitter only — has data-field="text")
    el.addEventListener('input', () => {
      const counter = el.parentElement.querySelector('[data-counter]')
                   || el.closest('.card-body')?.querySelector('[data-counter]')
                   || cardEl.querySelector('[data-counter]');
      if (counter) {
        const len = (el.innerText || '').length;
        const limit = el.dataset.field === 'text' ? TWITTER_LIMIT : IG_CAPTION_LIMIT;
        counter.querySelector('.len').textContent = len;
        counter.classList.toggle('over', len > limit);
      }
    });
    el.addEventListener('blur', async () => {
      const field = el.dataset.field;
      // Defensive: decodeHtmlEntities below catches any text that came in
      // already-encoded (e.g. "you&#39;ve" pasted from another tool). On
      // save we want the literal character so the next render is clean.
      const text = decodeHtmlEntities((el.innerText || '').replace(/ /g, ' ')).trim();
      const draft = DRAFTS.find((x) => x._id === id);
      if (!draft) return;
      let savePayload = {};
      if (field === 'text') {
        if (draft.text === text) return;  // no change, skip
        draft.text = text;
        savePayload = { text };
      } else if (field === 'caption_with_tags') {
        // Auto-extract trailing hashtag block. Pattern: split on last \n\n;
        // if the chunk after is all #words, treat it as the hashtags array.
        // Otherwise keep everything in caption.
        const parts = text.split(/\n\n+/);
        const tail = parts[parts.length - 1] || '';
        const tailIsTags = parts.length > 1 && /^[#\w\s]+$/.test(tail) && /#/.test(tail);
        let captionStr, tagsArr;
        if (tailIsTags) {
          captionStr = parts.slice(0, -1).join('\n\n').trim();
          tagsArr = (tail.match(/#[\w]+/g) || []).map((t) => t.replace(/^#/, '').toLowerCase());
        } else {
          captionStr = text;
          tagsArr = [];
        }
        if (draft.caption === captionStr && JSON.stringify(draft.hashtags || []) === JSON.stringify(tagsArr)) {
          return;
        }
        draft.caption = captionStr;
        draft.hashtags = tagsArr;
        savePayload = { caption: captionStr, hashtags: tagsArr };
      }
      // Re-render the contenteditable to clean up any messy span structure
      // typing introduced (operator may have typed inside an .ht span etc.)
      el.innerHTML = renderInlineText(field === 'caption_with_tags'
        ? `${draft.caption || ''}${(draft.hashtags || []).length ? '\n\n' + (draft.hashtags || []).map((t) => '#' + t).join(' ') : ''}`
        : (draft.text || ''));
      // PATCH backend
      try {
        const res = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(savePayload),
        });
        if (!res.ok) throw new Error('save failed');
      } catch (e) {
        toast('Auto-save failed: ' + e.message, 'error');
      }
    });
    // Paste as plain text only — prevents weird HTML from Word/etc. ending up
    // in the contenteditable
    el.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  });

  // Hashtag row edit-on-click — keep edit mode while focused, save on blur
  cardEl.querySelectorAll('[data-hashtag-row]').forEach((row) => {
    if (row.hasAttribute('data-locked')) return;
    const input = row.querySelector('.hashtag-edit-input');
    if (!input) return;
    row.addEventListener('click', (e) => {
      if (row.classList.contains('editing')) return;
      row.classList.add('editing');
      input.focus();
      input.select();
    });
    input.addEventListener('blur', async () => {
      row.classList.remove('editing');
      // Auto-save the hashtag change so operator doesn't need to hit Save explicitly
      try { await actionSave(id, cardEl); } catch (_) {}
    });
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
  });

  // Collapsed-card click-to-expand (posted/skipped cards default to collapsed)
  if (cardEl.classList.contains('collapsed')) {
    const head = cardEl.querySelector('.card-head');
    const preview = cardEl.querySelector('.collapsed-preview');
    [head, preview].filter(Boolean).forEach((el) => {
      el.addEventListener('click', () => cardEl.classList.remove('collapsed'));
    });
  }

  // Action buttons. Delegated on cardEl so dynamically-added buttons (sticker
  // thumbs, photo-search thumbs — both injected after panel open) get wired
  // automatically without us having to re-call wireCardActions on every panel
  // load. Walk up from the click target to the closest [data-action] inside
  // this card. Skip if the click hit a disabled element. Re-entry guard via
  // `_wired` flag so we don't double-attach when wireCardActions runs again.
  if (!cardEl._wiredClick) {
    cardEl._wiredClick = true;
    cardEl.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn || !cardEl.contains(btn)) return;
      if (btn.disabled) return;
      const action = btn.dataset.action;
      const slideIdx = btn.dataset.slideIndex !== undefined && btn.dataset.slideIndex !== ''
        ? Number(btn.dataset.slideIndex) : null;
      // Auto-close the More menu when an item inside it is picked.
      if (btn.classList.contains('menu-item')) closeAllMoreMenus();
      try {
        // disable=true only applies to <button>; div/span thumbs ignore it
        btn.disabled = true;
        if (action === 'save') await actionSave(id, cardEl);
        else if (action === 'regen') await actionRegenerate(id, { humor_pass: false });
        else if (action === 'regen-slide') await actionRegenerate(id, { slide_index: slideIdx });
        else if (action === 'swap-variant') await actionSwapVariant(id);
        else if (action === 'skip') await actionSkip(id);
        else if (action === 'approve') await actionApprove(id, cardEl);
        else if (action === 'generate-art') toggleScenePanel(cardEl, slideIdx);
        else if (action === 'generate-art-submit') await actionGenerateArt(id, cardEl, slideIdx);
        else if (action === 'generate-art-cancel') closeScenePanel(cardEl, slideIdx);
        else if (action === 'regen-all-images') await actionRegenAllImages(id);
        else if (action === 'download-zip') downloadZip(id);
        else if (action === 'apply-layout') await actionApplyLayout(id, cardEl, slideIdx);
        else if (action === 'run-drafter-from-empty') await runDrafter();
        else if (action === 'add-cta-slide-confirm') await actionAddCtaSlide(id, cardEl);
        else if (action === 'delete-slide') await actionDeleteSlide(id, slideIdx);
        else if (action === 'replace-photo') await togglePhotoPanel(cardEl, slideIdx, id);
        else if (action === 'replace-photo-cancel') closePhotoPanel(cardEl, slideIdx);
        else if (action === 'replace-photo-paste') await actionReplacePhotoFromUrl(id, cardEl, slideIdx);
        else if (action === 'replace-photo-pick') await actionReplacePhotoPick(id, cardEl, slideIdx, btn);
        else if (action === 'add-sticker') await toggleStickerPanel(cardEl, slideIdx, id);
        else if (action === 'add-sticker-cancel') closeStickerPanel(cardEl, slideIdx);
        else if (action === 'sticker-pick') await actionStickerPick(id, cardEl, slideIdx, btn);
        else if (action === 'remove-sticker') await actionRemoveSticker(id, slideIdx);
        else if (action === 'save-sticker-layout') await actionSaveStickerLayout(id, cardEl, slideIdx);
        else if (action === 'open-more-menu') toggleMoreMenu(btn.dataset.menuTarget, btn);
        else if (action === 'add-cta-slide-cancel') {
          // Switch back to the first real slide
          CURRENT_SLIDE[id] = 0;
          const draft = DRAFTS.find((x) => x._id === id);
          if (draft) {
            const newHtml = renderInstagramCarouselCard(draft);
            const wrapper = document.createElement('div');
            wrapper.innerHTML = newHtml;
            const newCard = wrapper.firstElementChild;
            cardEl.replaceWith(newCard);
            wireCardActions(newCard);
          }
        }
      } catch (err) {
        toast(err.message || 'Action failed', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  }

  // Live headline-input → HTML overlay text. As operator types in the
  // "Headline" field, the on-image overlay text updates instantly + the
  // font size re-fits to whatever fits the canvas. No need to hit Save
  // layout to see the change.
  cardEl.querySelectorAll('input[data-slide-field="headline"]').forEach((input) => {
    input.addEventListener('input', () => {
      const slideIdx = Number(input.dataset.slideIndex);
      const overlay = cardEl.querySelector(`.overlay-canvas[data-slide-index="${slideIdx}"] .overlay-headline`);
      if (overlay) {
        overlay.textContent = input.value;
        fitOverlayHeadline(overlay);
      }
    });
  });

  // Font toggle (BRAND ↔ ESPN). Click → swaps the .overlay-headline class
  // immediately + re-fits font size. Persisted on Save layout.
  cardEl.querySelectorAll('.font-toggle button[data-font]').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const slideIdx = Number(btn.dataset.slideIndex);
      const font = btn.dataset.font;       // 'brand' | 'espn'
      const panel = cardEl.querySelector(`.slide-panel[data-slide="${slideIdx}"]`);
      if (!panel) return;
      // Update toggle active state
      panel.querySelectorAll('.font-toggle button').forEach((b) => b.classList.toggle('active', b === btn));
      // Update the visible overlay
      const overlay = cardEl.querySelector(`.overlay-canvas[data-slide-index="${slideIdx}"] .overlay-headline`);
      if (overlay) {
        overlay.classList.toggle('font-espn', font === 'espn');
        overlay.dataset.overlayFont = font;
        fitOverlayHeadline(overlay);
      }
    });
  });

  // Color swatches — click to set the color picker + the live overlay preview
  cardEl.querySelectorAll('.color-swatch').forEach((sw) => {
    sw.addEventListener('click', (e) => {
      e.preventDefault();
      const color = sw.dataset.color;
      const slideIdx = Number(sw.dataset.slideIndex);
      const panel = cardEl.querySelector(`.slide-panel[data-slide="${slideIdx}"]`);
      if (!panel) return;
      const colorInput = panel.querySelector('input[data-overlay-color]');
      if (colorInput) colorInput.value = color;
      const headline = panel.querySelector('.overlay-headline');
      if (headline) headline.style.color = color;
      panel.querySelectorAll('.color-swatch').forEach((s) => s.classList.toggle('active', s === sw));
    });
  });
  cardEl.querySelectorAll('input[data-overlay-color]').forEach((picker) => {
    picker.addEventListener('input', () => {
      const slideIdx = Number(picker.dataset.slideIndex);
      const panel = cardEl.querySelector(`.slide-panel[data-slide="${slideIdx}"]`);
      const headline = panel?.querySelector('.overlay-headline');
      if (headline) headline.style.color = picker.value;
      panel?.querySelectorAll('.color-swatch').forEach((s) => s.classList.remove('active'));
    });
  });

  // Drag overlay editor — make .overlay-headline draggable within its canvas.
  // Also: fit the overlay font-size to match the canvas dimensions (mirrors
  // the server-side adaptive sizing). ResizeObserver re-fits on canvas
  // dimension changes; img.onload fits once the photo loads (canvas may
  // change size when the image's aspect locks in).
  cardEl.querySelectorAll('.overlay-canvas').forEach((canvas) => {
    initOverlayDrag(canvas);
    const overlay = canvas.querySelector('.overlay-headline');
    if (overlay) {
      // Initial fit (will retry on resize/img-load if canvas isn't laid out yet)
      fitOverlayHeadline(overlay);
      if (_overlayFitObserver) _overlayFitObserver.observe(canvas);
      const img = canvas.querySelector('img');
      if (img) {
        if (img.complete) fitOverlayHeadline(overlay);
        else img.addEventListener('load', () => fitOverlayHeadline(overlay), { once: true });
      }
    }
  });
}

// Adaptive font sizing for the overlay headline. Mirrors the server-side
// SVG renderer's character-budget tiers (imageRenderer.overlaySVG):
//   ≤22 chars → big impact (canvas / 12)
//   ≤50 chars → medium (canvas / 17)
//   else      → small wrap (canvas / 22)
// So a 3-word headline gets ESPN-card-massive type and a 12-word headline
// shrinks to fit. Browser preview ↔ published JPEG stay visually aligned.
function fitOverlayHeadline(overlayEl) {
  if (!overlayEl) return;
  // Prefer firstChild text (skip the resize-handle div) so its empty content
  // doesn't throw off length calc.
  const text = String(overlayEl.firstChild?.nodeType === 3 ? overlayEl.firstChild.nodeValue : overlayEl.textContent || '').trim();
  if (!text) return;
  const canvas = overlayEl.closest('.overlay-canvas');
  if (!canvas) return;
  const w = canvas.offsetWidth;
  if (!w) return;  // not laid out yet
  // Manual override (set via the corner resize handle drag) wins. Stored
  // as a percentage of canvas width so it survives canvas resizes.
  const manualPct = parseFloat(overlayEl.dataset.overlayFontSizePct);
  if (Number.isFinite(manualPct) && manualPct > 0) {
    overlayEl.style.fontSize = Math.max(12, (manualPct / 100) * w) + 'px';
    return;
  }
  const len = text.length;
  let divisor;
  if (len <= 22)      divisor = 12;
  else if (len <= 50) divisor = 17;
  else                divisor = 22;
  const size = Math.max(14, Math.round(w / divisor));
  overlayEl.style.fontSize = size + 'px';
}

// One global ResizeObserver for all overlay-canvas elements: when the canvas
// resizes (window resize, image load changes box dims, etc.) the overlay
// re-fits.
const _overlayFitObserver = (typeof ResizeObserver === 'function')
  ? new ResizeObserver((entries) => {
      for (const e of entries) {
        const overlay = e.target.querySelector('.overlay-headline');
        if (overlay) fitOverlayHeadline(overlay);
      }
    })
  : null;

// Window-resize fallback (debounced) for browsers without ResizeObserver
// AND to catch any post-load reflow we miss.
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    document.querySelectorAll('.overlay-headline').forEach(fitOverlayHeadline);
  }, 120);
});

// Initialize drag-to-position on a single overlay-canvas. Updates the live
// preview position + the dataset coords; persistence happens via apply-layout.
function initOverlayDrag(canvas) {
  // Same drag logic for both the headline overlay and the Phase 9.5
  // branded sticker overlay. Each draggable element manages its own
  // x/y dataset and clamping range. Phase 9.5.2: resize handles on both.
  const targets = [
    { el: canvas.querySelector('.overlay-headline.draggable'), xKey: 'overlayX', yKey: 'overlayY', xMin: 0, xMax: 95, yMin: 8, yMax: 98, kind: 'headline' },
    { el: canvas.querySelector('.sticker-overlay.draggable'),  xKey: 'xPct',     yKey: 'yPct',     xMin: 4, xMax: 96, yMin: 4, yMax: 96, kind: 'sticker' },
  ].filter((t) => t.el);
  if (!targets.length) return;
  for (const t of targets) {
    attachDrag(canvas, t);
    attachResize(canvas, t);
  }
}

// Phase 9.5.2 — corner-handle resize for sticker / headline overlays.
// Sticker scales width%; headline scales font-size as % of canvas width.
// stopPropagation on mousedown keeps the parent's drag handler quiet so
// the same gesture doesn't simultaneously move + resize.
function attachResize(canvas, t) {
  const handle = t.el.querySelector('.resize-handle');
  if (!handle) return;
  let resizing = false, rect, centerX, centerY;
  const start = (e) => {
    resizing = true;
    t.el.classList.add('resizing');
    rect = canvas.getBoundingClientRect();
    const tr = t.el.getBoundingClientRect();
    centerX = tr.left + tr.width / 2;
    centerY = tr.top + tr.height / 2;
    e.preventDefault();
    e.stopPropagation();
  };
  const move = (e) => {
    if (!resizing) return;
    const point = e.touches ? e.touches[0] : e;
    const dx = point.clientX - centerX;
    const dy = point.clientY - centerY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (t.kind === 'sticker') {
      // Diagonal distance from center to corner = w/√2 ⇒ w = dist · √2
      const newWidthPx = dist * Math.SQRT2;
      const pct = (newWidthPx / rect.width) * 100;
      const clamped = Math.max(6, Math.min(60, pct));
      t.el.style.width = clamped + '%';
      t.el.dataset.scalePct = clamped.toFixed(1);
    } else if (t.kind === 'headline') {
      // Headline: font-size scales with diagonal distance. Save as % of
      // canvas width so the manual size survives canvas resizes (mobile,
      // focus-modal flips, etc.).
      const newSizePx = Math.max(14, Math.min(rect.width * 0.18, dist * 1.4));
      const pctOfCanvas = (newSizePx / rect.width) * 100;
      t.el.style.fontSize = newSizePx + 'px';
      t.el.dataset.overlayFontSizePct = pctOfCanvas.toFixed(2);
    }
    e.preventDefault();
  };
  const end = () => {
    if (!resizing) return;
    resizing = false;
    t.el.classList.remove('resizing');
  };
  handle.addEventListener('mousedown', start);
  handle.addEventListener('touchstart', start, { passive: false });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', end);
  document.addEventListener('touchend', end);
}

function attachDrag(canvas, t) {
  let dragging = false, startX, startY, startLeftPx, startTopPx, rect;
  const start = (e) => {
    dragging = true;
    t.el.classList.add('dragging');
    rect = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    startX = point.clientX;
    startY = point.clientY;
    startLeftPx = (parseFloat(t.el.style.left) || 0) / 100 * rect.width;
    startTopPx = (parseFloat(t.el.style.top) || 0) / 100 * rect.height;
    e.preventDefault();
  };
  const move = (e) => {
    if (!dragging) return;
    const point = e.touches ? e.touches[0] : e;
    const newLeftPx = startLeftPx + (point.clientX - startX);
    const newTopPx = startTopPx + (point.clientY - startY);
    const xPct = Math.max(t.xMin, Math.min(t.xMax, (newLeftPx / rect.width) * 100));
    const yPct = Math.max(t.yMin, Math.min(t.yMax, (newTopPx / rect.height) * 100));
    t.el.style.left = xPct + '%';
    t.el.style.top = yPct + '%';
    t.el.dataset[t.xKey] = xPct.toFixed(1);
    t.el.dataset[t.yKey] = yPct.toFixed(1);
    e.preventDefault();
  };
  const end = () => {
    if (!dragging) return;
    dragging = false;
    t.el.classList.remove('dragging');
  };
  t.el.addEventListener('mousedown', start);
  t.el.addEventListener('touchstart', start, { passive: false });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', end);
  document.addEventListener('touchend', end);
}

// Locate the scene panel for a card (slideIndex=null) or carousel slide.
// Empty string in the dataset matches null/undefined slide index.
function findScenePanel(cardEl, slideIndex) {
  const key = Number.isInteger(slideIndex) ? String(slideIndex) : '';
  return cardEl.querySelector(`.scene-panel[data-scene-panel="${key}"]`);
}

function toggleScenePanel(cardEl, slideIndex) {
  closeAllToolModals();
  const panel = findScenePanel(cardEl, slideIndex);
  if (panel) panel.classList.add('open');
  syncToolModalBackdrop();
}

function closeScenePanel(cardEl, slideIndex) {
  const panel = findScenePanel(cardEl, slideIndex);
  if (panel) panel.classList.remove('open');
  syncToolModalBackdrop();
}

// Phase 9.2 — photo-replace panel helpers (parallel to scene-panel).
function findPhotoPanel(cardEl, slideIndex) {
  const key = Number.isInteger(slideIndex) ? String(slideIndex) : '';
  return cardEl.querySelector(`.photo-panel[data-photo-panel="${key}"]`);
}

async function togglePhotoPanel(cardEl, slideIndex, draftId) {
  const panel = findPhotoPanel(cardEl, slideIndex);
  if (!panel) return;
  const wasOpen = panel.classList.contains('open');
  closeAllToolModals();
  if (!wasOpen) {
    panel.classList.add('open');
    syncToolModalBackdrop();
    // Lazy-load candidates the first time we open. Re-open re-searches in case
    // the operator edited image_subject in the meantime.
    await loadPhotoCandidates(cardEl, slideIndex, draftId);
  }
}

function closePhotoPanel(cardEl, slideIndex) {
  const panel = findPhotoPanel(cardEl, slideIndex);
  if (panel) panel.classList.remove('open');
  syncToolModalBackdrop();
}

async function loadPhotoCandidates(cardEl, slideIndex, draftId) {
  const panel = findPhotoPanel(cardEl, slideIndex);
  if (!panel) return;
  const resultsEl = panel.querySelector('[data-photo-results]');
  if (!resultsEl) return;
  const draft = DRAFTS.find((x) => x._id === draftId);
  const subject = Number.isInteger(slideIndex)
    ? (draft?.slides?.[slideIndex]?.image_subject || '')
    : (draft?.image_subject || '');
  if (!subject) {
    resultsEl.innerHTML = '<div class="photo-empty">No image_subject set on this draft. Edit subject in Advanced and try again.</div>';
    return;
  }
  resultsEl.innerHTML = '<div class="photo-loading">Searching Wikimedia, Pexels, Unsplash…</div>';
  try {
    const url = '/api/admin/dashboard/photo-search?' + new URLSearchParams({ subject }).toString();
    const res = await fetch(url);
    const json = await res.json();
    if (!res.ok || !json.success) throw new Error(json.error || 'photo-search failed');
    resultsEl.innerHTML = renderPhotoCandidatesHtml(json.candidates, slideIndex);
  } catch (e) {
    resultsEl.innerHTML = `<div class="photo-empty">Search failed: ${escapeHtml(e.message)}</div>`;
  }
}

function renderPhotoCandidatesHtml(candidates, slideIndex) {
  const sIdxAttr = Number.isInteger(slideIndex) ? `data-slide-index="${slideIndex}"` : '';
  // Sources sorted "free + licensed first → broader web last" so operator's
  // eye lands on safer-to-publish results first. Brave is the broad-web
  // source (replaced the failed Google Custom Search integration); Google
  // is kept as a dormant slot in case the env vars ever resolve.
  const sources = [
    { key: 'wikimedia', label: 'Wikimedia Commons',   hint: 'free, attribution required' },
    { key: 'pexels',    label: 'Pexels',              hint: 'free, no attribution required' },
    { key: 'unsplash',  label: 'Unsplash',            hint: 'free, attribution appreciated' },
    { key: 'brave',     label: 'Brave Search',        hint: 'broader web — verify rights before publishing' },
    { key: 'google',    label: 'Google Image Search', hint: 'broader web — verify rights before publishing' },
  ];
  const sections = sources.map((src) => {
    const items = (candidates && candidates[src.key]) || [];
    // Hide entirely if the optional broad-web sources returned nothing —
    // don't waste vertical space on "no results" placeholders for sources
    // the operator may not have wired up.
    if (!items.length && (src.key === 'google' || src.key === 'brave')) return '';
    if (!items.length) {
      return `<div class="photo-source"><div class="photo-source-label">${src.label} <span class="photo-source-hint">${src.hint}</span></div><div class="photo-empty">no results</div></div>`;
    }
    const thumbs = items.map((c, i) => `
      <div class="photo-thumb" data-action="replace-photo-pick" data-photo-source="${src.key}" data-photo-index="${i}" ${sIdxAttr} title="${safeText(c.attribution || '')}">
        <img src="${escapeHtml(c.thumb_url || c.url)}" alt="" referrerpolicy="no-referrer" />
      </div>`).join('');
    return `<div class="photo-source"><div class="photo-source-label">${src.label} <span class="photo-source-hint">${src.hint}</span></div><div class="photo-grid">${thumbs}</div></div>`;
  }).join('');
  // Stash the raw candidates in a data attribute for the click handler.
  return `<div data-photo-candidates='${escapeHtml(JSON.stringify(candidates || {}))}'>${sections}</div>`;
}

function gatherEdits(cardEl) {
  const out = {};
  cardEl.querySelectorAll('[data-field]').forEach((el) => {
    const f = el.dataset.field;
    // contenteditable .post-text uses innerText; inputs/textareas use value.
    const isEditable = el.isContentEditable || el.classList.contains('post-text');
    const raw = isEditable ? (el.innerText || '') : el.value;
    if (f === 'text') {
      out.text = raw.trim();
    } else if (f === 'caption_with_tags') {
      // Same auto-extraction as the blur handler — split caption from
      // trailing hashtag block.
      const text = raw.trim();
      const parts = text.split(/\n\n+/);
      const tail = parts[parts.length - 1] || '';
      const tailIsTags = parts.length > 1 && /^[#\w\s]+$/.test(tail) && /#/.test(tail);
      if (tailIsTags) {
        out.caption = parts.slice(0, -1).join('\n\n').trim();
        out.hashtags = (tail.match(/#[\w]+/g) || []).map((t) => t.replace(/^#/, '').toLowerCase());
      } else {
        out.caption = text;
        out.hashtags = [];
      }
    } else if (f === 'hashtags') {
      out.hashtags = raw.split(',').map((x) => x.trim()).filter(Boolean);
    } else if (f === 'image_url' && !raw.trim()) {
      // skip empty manual override
    } else {
      out[f] = raw;
    }
  });
  // Carousel slide edits
  const slidesEdit = {};
  cardEl.querySelectorAll('[data-slide-field]').forEach((el) => {
    const idx = Number(el.dataset.slideIndex);
    const field = el.dataset.slideField;
    if (!slidesEdit[idx]) slidesEdit[idx] = {};
    slidesEdit[idx][field] = el.value;
  });
  if (Object.keys(slidesEdit).length > 0) {
    // Merge slide edits into the existing slides array
    const draft = DRAFTS.find((d) => d._id === cardEl.dataset.id);
    if (draft && draft.slides) {
      const newSlides = draft.slides.map((s, i) => ({ ...s, ...(slidesEdit[i] || {}) }));
      out.slides = newSlides;
    }
  }
  return out;
}

async function actionSave(id, cardEl) {
  const body = gatherEdits(cardEl);
  if (Object.keys(body).length === 0) {
    toast('Nothing to save', '');
    return;
  }
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json();
  if (!res.ok || !json.success) throw new Error(json.error || 'PATCH failed');
  toast('Saved', 'success');
  await loadDrafts();
}

async function actionRegenerate(id, opts) {

  const isSlide = Number.isInteger(opts?.slide_index);
  const what = isSlide ? `slide ${opts.slide_index + 1} headline + body` : 'this draft\'s text';
  if (!confirm(`Replace ${what} with a fresh Claude generation?\n\nAny edits you've made will be lost.`)) return;
  toast('Generating new text — 5-10s…', '');
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}/regenerate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(opts || {}),
  });
  const json = await res.json();
  if (!res.ok || !json.success) throw new Error(json.error || 'regen failed');
  toast('New text generated', 'success');
  await loadDrafts();
}

async function actionSkip(id) {

async function actionApplyLayout(id, cardEl, slideIndex) {
  // The headline overlay lives in the image-preview (sibling of the slide
  // panel where the Save button sits), so query from cardEl with the
  // overlay-canvas selector — not from inside the slide-panel.
  const headline = cardEl.querySelector(`.overlay-canvas[data-slide-index="${slideIndex}"] .overlay-headline`);
  const colorInput = cardEl.querySelector(`.slide-panel[data-slide="${slideIndex}"] input[data-overlay-color]`);
  if (!headline) throw new Error('headline overlay not found');
  const overlay_x = parseFloat(headline.dataset.overlayX);
  const overlay_y = parseFloat(headline.dataset.overlayY);
  const overlay_color = colorInput?.value || '#FFFFFF';
  const overlay_font = headline.dataset.overlayFont === 'espn' ? 'espn' : 'brand';
  const sizeRaw = parseFloat(headline.dataset.overlayFontSizePct);
  const overlay_font_size_pct = Number.isFinite(sizeRaw) && sizeRaw > 0 ? sizeRaw : null;

  const draft = DRAFTS.find((d) => d._id === id);
  if (!draft || !Array.isArray(draft.slides)) throw new Error('draft not found');
  const newSlides = draft.slides.map((s, i) => i === slideIndex
    ? { ...s, overlay_x, overlay_y, overlay_color, overlay_font, overlay_font_size_pct }
    : s);
  const r1 = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slides: newSlides }),
  });
  if (!r1.ok) throw new Error('save coords failed');
  toast('Layout saved — re-rendering image, refresh in ~30s', '');
  // Trigger background re-render of all slides so this slide picks up the new coords
  const r2 = await fetch(`/api/admin/dashboard/post-drafts/${id}/regenerate-all-images`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
  });
  if (!(r2.status === 202 || r2.ok)) throw new Error('re-render failed');
  setTimeout(() => loadDrafts(), 30000);
}

async function actionRegenAllImages(id) {
  if (!confirm('Re-render all carousel slide images? Takes ~30s.')) return;
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}/regenerate-all-images`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',

}

// Phase 9.2 — replace-photo handlers. Both PATCH the draft (top-level for
// single posts, per-slide for carousels) then trigger /regenerate-all-images
// so any active overlay re-bakes onto the new photo.
async function actionReplacePhotoPick(id, cardEl, slideIndex, btn) {
  const wrap = btn.closest('[data-photo-candidates]');
  if (!wrap) return;
  const source = btn.dataset.photoSource;
  const idx = Number(btn.dataset.photoIndex);
  let candidates;
  try {
    candidates = JSON.parse(wrap.getAttribute('data-photo-candidates') || '{}');
  } catch { candidates = {}; }
  const pick = candidates?.[source]?.[idx];
  if (!pick || !pick.url) {
    toast('candidate not found', 'error');
    return;
  }
  await applyPhotoReplacement(id, slideIndex, {
    image_url: pick.url,
    image_attribution: pick.attribution || '',
    image_source: pick.source || source,
  });
  closePhotoPanel(cardEl, slideIndex);
}

async function actionReplacePhotoFromUrl(id, cardEl, slideIndex) {
  const sel = Number.isInteger(slideIndex)
    ? `[data-photo-paste-url][data-slide-index="${slideIndex}"]`
    : '[data-photo-paste-url]:not([data-slide-index])';
  const input = cardEl.querySelector(sel);
  const url = (input?.value || '').trim();
  if (!url) {
    toast('paste a URL first', 'error');
    return;
  }
  if (!/^https?:\/\//i.test(url)) {
    toast('URL must start with http(s)://', 'error');
    return;
  }
  await applyPhotoReplacement(id, slideIndex, {
    image_url: url,
    image_attribution: 'Manual override',
    image_source: 'manual',
  });
  closePhotoPanel(cardEl, slideIndex);
}

async function applyPhotoReplacement(id, slideIndex, fields) {
  toast('Updating photo…', '');
  const draft = DRAFTS.find((x) => x._id === id);
  if (!draft) return;
  let body;
  if (Number.isInteger(slideIndex)) {
    const newSlides = (draft.slides || []).map((s, i) => i === slideIndex ? { ...s, ...fields } : s);
    draft.slides = newSlides;       // keep in-memory state in sync
    body = { slides: newSlides };
  } else {
    Object.assign(draft, fields);   // keep in-memory state in sync
    body = fields;
  }
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json();
  if (!res.ok || !json.success) {
    toast(json.error || 'patch failed', 'error');
    return;
  }
  // Live-swap the visible <img> right away so operator sees the change
  // before the composite re-bake catches up.
  const cardEl = document.querySelector(`.card[data-id="${id}"]`);
  if (cardEl && fields.image_url) refreshImageSrc(cardEl, slideIndex, fields.image_url);
  // Re-bake the overlay onto the new photo (server-side composite).
  fetch(`/api/admin/dashboard/post-drafts/${id}/regenerate-all-images`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
  }).catch(() => {});
  toast('Photo replaced — re-rendering overlay…', 'success');
  setTimeout(() => loadDrafts(), 4000);
}

// Phase 9.2 — swap the visible <img src> in place so a photo replacement
// shows immediately, instead of waiting for the next loadDrafts cycle.
function refreshImageSrc(cardEl, slideIndex, newUrl) {
  let img;
  if (Number.isInteger(slideIndex)) {
    const draftId = cardEl.dataset.id;
    const cur = CURRENT_SLIDE[draftId] ?? 0;
    if (cur !== slideIndex) return; // not the active slide right now
    img = cardEl.querySelector('.image-preview.large.overlay-canvas img');
  } else {
    img = cardEl.querySelector('.image-preview img');
  }
  if (img) img.src = newUrl;
}

// ── Phase 9.5: branded sticker picker + per-slide overlay ────────────────
function findStickerPanel(cardEl, slideIndex) {
  const key = Number.isInteger(slideIndex) ? String(slideIndex) : '';
  return cardEl.querySelector(`.sticker-panel[data-sticker-panel="${key}"]`);
}

async function toggleStickerPanel(cardEl, slideIndex, draftId) {
  const panel = findStickerPanel(cardEl, slideIndex);
  if (!panel) return;
  const wasOpen = panel.classList.contains('open');
  closeAllToolModals();
  if (!wasOpen) {
    panel.classList.add('open');
    syncToolModalBackdrop();
    await loadStickerCandidates(cardEl, slideIndex, draftId);
  }
}

function closeStickerPanel(cardEl, slideIndex) {
  const panel = findStickerPanel(cardEl, slideIndex);
  if (panel) panel.classList.remove('open');
  syncToolModalBackdrop();
}

async function loadStickerCandidates(cardEl, slideIndex, draftId) {
  const panel = findStickerPanel(cardEl, slideIndex);
  if (!panel) return;
  const resultsEl = panel.querySelector('[data-sticker-results]');
  if (!resultsEl) return;
  const draft = DRAFTS.find((x) => x._id === draftId);
  const subject = Number.isInteger(slideIndex)
    ? (draft?.slides?.[slideIndex]?.image_subject || draft?.topic || '')
    : (draft?.image_subject || draft?.topic || '');
  resultsEl.innerHTML = '<div class="photo-loading">Loading manifest…</div>';
  try {
    const url = '/api/admin/dashboard/branded-overlays?' + new URLSearchParams({ subject }).toString();
    const res = await fetch(url);
    const json = await res.json();
    if (!res.ok || !json.success) throw new Error(json.error || 'manifest fetch failed');
    resultsEl.innerHTML = renderStickerGridHtml(json.manifest, json.suggested, slideIndex);
  } catch (e) {
    resultsEl.innerHTML = `<div class="photo-empty">Load failed: ${escapeHtml(e.message)}</div>`;
  }
}

function renderStickerGridHtml(manifest, suggested, slideIndex) {
  const sIdxAttr = Number.isInteger(slideIndex) ? `data-slide-index="${slideIndex}"` : '';
  const sugSet = new Set(suggested || []);
  const renderThumb = (m) => `
    <div class="sticker-thumb${sugSet.has(m.key) ? ' suggested' : ''}"
         data-action="sticker-pick" data-sticker-key="${escapeHtml(m.key)}" ${sIdxAttr}
         title="${escapeHtml(m.name)}${sugSet.has(m.key) ? ' (auto-suggested)' : ''}">
      <img src="/branded-overlays/${escapeHtml(m.key)}.svg" alt="" />
    </div>`;
  const sections = [];
  if (suggested && suggested.length) {
    const sugItems = suggested.map((k) => manifest.find((m) => m.key === k)).filter(Boolean);
    sections.push(`<div class="sticker-section-label">Suggested for this topic</div><div class="sticker-grid">${sugItems.map(renderThumb).join('')}</div>`);
  }
  const groups = [
    { label: 'Bitcoin Bay', kind: 'brand' },
    { label: 'Crypto coins', kind: 'coin' },
    { label: 'Exchanges', kind: 'exchange' },
  ];
  for (const g of groups) {
    const items = manifest.filter((m) => m.kind === g.kind && !sugSet.has(m.key));
    if (!items.length) continue;
    sections.push(`<div class="sticker-section-label">${g.label}</div><div class="sticker-grid">${items.map(renderThumb).join('')}</div>`);
  }
  return sections.join('');
}

async function actionStickerPick(id, cardEl, slideIndex, btn) {
  const key = btn.dataset.stickerKey;
  if (!key) return;
  // Default placement: top-right corner-ish, modest size. Operator drags to
  // taste, then clicks Save to bake.
  const overlay = { key, x_pct: 80, y_pct: 14, scale_pct: 18 };
  await applyBrandedOverlay(id, slideIndex, overlay);
  // Re-open the panel with the new active row + scale slider
  await loadStickerCandidates(cardEl, slideIndex, id);
}

async function actionRemoveSticker(id, slideIndex) {
  await applyBrandedOverlay(id, slideIndex, null);
}

async function actionSaveStickerLayout(id, cardEl, slideIndex) {
  // Pull current x/y/scale from the live overlay element. Scale comes from
  // the element's dataset (updated by both the slider and the corner-drag
  // resize handle); the slider just reads it back if present.
  const stickerEl = findStickerOverlay(cardEl, slideIndex);
  const scaleEl = cardEl.querySelector(
    Number.isInteger(slideIndex)
      ? `[data-sticker-scale][data-slide-index="${slideIndex}"]`
      : '[data-sticker-scale]:not([data-slide-index])'
  );
  const draft = DRAFTS.find((x) => x._id === id);
  const current = Number.isInteger(slideIndex)
    ? draft?.slides?.[slideIndex]?.branded_overlay
    : draft?.branded_overlay;
  if (!current?.key) {
    toast('No active sticker on this slide', 'error');
    return;
  }
  // Live element wins over slider so the corner-drag resize is honored.
  const liveScale = stickerEl ? parseFloat(stickerEl.dataset.scalePct) : NaN;
  const overlay = {
    key: current.key,
    x_pct: stickerEl ? Number(stickerEl.dataset.xPct) : (current.x_pct ?? 80),
    y_pct: stickerEl ? Number(stickerEl.dataset.yPct) : (current.y_pct ?? 14),
    scale_pct: Number.isFinite(liveScale) ? liveScale
      : (scaleEl ? Number(scaleEl.value) : (current.scale_pct ?? 18)),
  };
  toast('Saving sticker layout…', '');
  await applyBrandedOverlay(id, slideIndex, overlay);
  // Bake into composite
  fetch(`/api/admin/dashboard/post-drafts/${id}/regenerate-all-images`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
  }).catch(() => {});
  toast('Layout saved — rendering composite…', 'success');
  setTimeout(() => loadDrafts(), 4000);
}

function findStickerOverlay(cardEl, slideIndex) {
  if (Number.isInteger(slideIndex)) {
    return cardEl.querySelector(`[data-sticker-overlay][data-slide-index="${slideIndex}"]`);
  }
  return cardEl.querySelector('[data-sticker-overlay]:not([data-slide-index]), [data-sticker-overlay][data-slide-index=""]');
}

async function applyBrandedOverlay(id, slideIndex, overlay) {
  const draft = DRAFTS.find((x) => x._id === id);
  if (!draft) return false;
  let body;
  if (Number.isInteger(slideIndex)) {
    const slides = (draft.slides || []).map((s, i) => i === slideIndex ? { ...s, branded_overlay: overlay } : s);
    draft.slides = slides;
    body = { slides };
  } else {
    draft.branded_overlay = overlay;
    body = { branded_overlay: overlay };
  }
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json();
  if (!res.ok || !json.success) {
    toast(json.error || 'patch failed', 'error');
    return false;
  }
  // Live-update the visible overlay without re-rendering the whole card —
  // the sticker modal is open and a full re-render would close it. Find
  // the affected card's image preview and inject a fresh .sticker-overlay
  // in place (or remove if overlay is now null/missing).
  const cardEl = document.querySelector(`.card[data-id="${id}"]`);
  if (cardEl) refreshStickerOverlayInImage(cardEl, slideIndex, overlay);
  return true;
}

// Phase 9.5 — keep the in-canvas sticker overlay in sync with the latest
// branded_overlay state. Removes any existing sticker DOM and inserts a
// fresh one (or nothing if overlay is null). Re-wires drag if applicable.
function refreshStickerOverlayInImage(cardEl, slideIndex, overlay) {
  let imagePreview;
  if (Number.isInteger(slideIndex)) {
    // Carousel: only the active slide is rendered. If a different slide is
    // active right now there's nothing to refresh visibly — the next slide
    // switch will render the new state.
    const draftId = cardEl.dataset.id;
    const cur = CURRENT_SLIDE[draftId] ?? 0;
    if (cur !== slideIndex) return;
    imagePreview = cardEl.querySelector('.image-preview.large.overlay-canvas');
  } else {
    imagePreview = cardEl.querySelector('.image-preview');
  }
  if (!imagePreview) return;
  const existing = imagePreview.querySelector('.sticker-overlay');
  if (existing) existing.remove();
  if (!overlay || !overlay.key) return;
  const html = renderStickerOverlayHtml(overlay, slideIndex, false);
  if (!html) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const node = tmp.firstElementChild;
  if (!node) return;
  // Sit above the image but below the corner-actions buttons so 📷 / 🏷️ /
  // 🎨 stay clickable.
  const cornerActions = imagePreview.querySelector('.image-corner-actions');
  if (cornerActions) imagePreview.insertBefore(node, cornerActions);
  else imagePreview.appendChild(node);
  // If we're inside an overlay-canvas, re-wire drag so the new overlay is
  // movable too.
  if (imagePreview.classList.contains('overlay-canvas')) {
    initOverlayDrag(imagePreview);
  }
}

async function actionDeleteSlide(id, slideIndex) {
  if (!Number.isInteger(slideIndex)) return;
  const draft = DRAFTS.find((x) => x._id === id);
  const total = Array.isArray(draft?.slides) ? draft.slides.length : 0;
  if (total <= 2) {
    toast('Carousel must have at least 2 slides — cannot delete', 'error');
    return;
  }
  const ok = window.confirm(`Delete slide ${slideIndex + 1} of ${total}? This cannot be undone.`);
  if (!ok) return;
  toast('Deleting slide…', '');
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}/delete-slide`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slide_index: slideIndex }),
  });
  const json = await res.json();
  if (!res.ok || !json.success) {
    toast(json.error || 'delete failed', 'error');
    return;
  }
  toast(`Slide deleted (${json.slides_count} remaining)`, 'success');
  // Land on the previous slide (or 0 if we deleted the first)
  CURRENT_SLIDE[id] = Math.max(0, slideIndex - 1);
  await loadDrafts();
}
