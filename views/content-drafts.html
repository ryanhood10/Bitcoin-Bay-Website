async function actionGenerateArt(id, cardEl, slideIndex) {
  const panel = findScenePanel(cardEl, slideIndex);
  if (!panel) throw new Error('scene panel not found');
  const promptEl = panel.querySelector('[data-scene-field="prompt"]');
  const refEl = panel.querySelector('[data-scene-field="reference"]');
  const scenePrompt = (promptEl?.value || '').trim();
  if (scenePrompt.length < 10) throw new Error('Scene prompt must be at least 10 characters');
  const referenceImageUrl = (refEl?.value || '').trim();
  const body = { scene_prompt: scenePrompt };
  if (referenceImageUrl) body.reference_image_url = referenceImageUrl;
  if (Number.isInteger(slideIndex)) body.slide_index = slideIndex;
  toast('Generating scene — this takes 30-60s…', '');
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}/generate-art`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json();
  if (!res.ok || !json.success) {
    if (res.status === 503) {
      throw new Error('Replicate is not configured — add REPLICATE_API_TOKEN to Heroku config');
    }
    throw new Error(json.error || 'generate-art failed');
  }
  toast('Scene generated · ~$0.05 logged', 'success');
  await loadDrafts();
}

async function actionApprove(id, cardEl) {
  // First save any pending edits
  const edits = gatherEdits(cardEl);
  if (Object.keys(edits).length > 0) {
    const r1 = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(edits),
    });
    if (!r1.ok) throw new Error('save before approve failed');
  }
  if (!confirm('Approve this draft? (Phase 7 will auto-publish; for now you copy/paste to native X/IG.)')) return;
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}/approve`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
  });
  const json = await res.json();
  if (!res.ok || !json.success) throw new Error(json.error || 'approve failed');
  toast(json.note || 'Approved', 'success');
  await loadDrafts();
}

// ─── Run drafter ────────────────────────────────────────────────────────
async function runDrafter(targetDate) {
  // Buttons that trigger this: header "↻ Run drafter now" (no date — picks
  // latest brief server-side) AND the stale-banner "Generate drafts for
  // [date]" (passes the latest_brief_date so the run is deterministic).
  const headerBtn = document.getElementById('btn-run-drafter');
  const bannerBtn = document.getElementById('stale-run-btn');
  const lockBtns = (disabled, msg) => {
    if (headerBtn) { headerBtn.disabled = disabled; if (msg !== undefined) headerBtn.innerHTML = msg; }
    if (bannerBtn) { bannerBtn.disabled = disabled; }
  };
  lockBtns(true, 'Running drafter…');
  try {
    const body = targetDate ? { date: targetDate } : {};
    const res = await fetch('/api/admin/dashboard/run-drafter', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'run-drafter failed');
    toast(json.note || 'Drafter started — refreshing in 60s', 'success');
    // Poll every 15s for the next 90s, then stop
    let elapsed = 0;
    const poller = setInterval(async () => {
      elapsed += 15;
      await loadDrafts();
      if (elapsed >= 90) clearInterval(poller);
    }, 15000);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setTimeout(() => lockBtns(false, '↻ Run drafter now'), 90000);
  }
}

// Phase 9.10 — banner "Generate drafts for [date]" reads the date from its
// own data attribute (set by renderStaleBanner) so it's always pointed at
// the freshest brief, regardless of how stale the cached page is.
function runDrafterForLatest() {
  const btn = document.getElementById('stale-run-btn');
  const date = btn?.dataset.targetDate;
  return runDrafter(date);
}

function renderStaleBanner(currentDate, latestDate, isStale) {
  const banner = document.getElementById('stale-banner');
  if (!banner) return;
  if (!isStale || !latestDate || currentDate === latestDate) {
    banner.style.display = 'none';
    return;
  }
  // Compute the "N newer briefs" count by date difference (good-enough proxy
  // since Pi writes one brief per day; lexical YYYY-MM-DD diff = day delta).
  const diff = Math.max(1, daysBetween(currentDate, latestDate));
  banner.querySelector('#stale-count').textContent = String(diff);
  banner.querySelector('#stale-plural').textContent = diff === 1 ? '' : 's';
  banner.querySelector('#stale-current').textContent = currentDate || '(none)';
  banner.querySelector('#stale-latest').textContent = latestDate;
  banner.querySelector('#stale-target').textContent = latestDate;
  const runBtn = banner.querySelector('#stale-run-btn');
  if (runBtn) runBtn.dataset.targetDate = latestDate;
  banner.style.display = 'flex';
}

function daysBetween(a, b) {
  if (!a || !b) return 1;
  const da = new Date(a + 'T00:00:00Z').getTime();
  const db = new Date(b + 'T00:00:00Z').getTime();
  return Math.round((db - da) / 86_400_000);
}

// ─── Load + render ──────────────────────────────────────────────────────
async function loadDrafts() {
  try {
    const [briefRes, draftsRes] = await Promise.all([
      fetch('/api/admin/dashboard/post-briefs/latest').then((r) => r.json()).catch(() => null),
      fetch('/api/admin/dashboard/post-drafts').then((r) => r.json()),
    ]);

    BRIEF = briefRes?.brief || null;
    DRAFTS = draftsRes?.drafts || [];

    // Phase 9.10 — stale-drafts banner. Server tells us the brief_date the
    // returned drafts came from + the latest brief_date in Mongo. If they
    // differ (and the latest is newer), Pi has written briefs the drafter
    // hasn't processed yet → surface a one-click "Generate" banner so the
    // operator isn't staring at week-old drafts forever.
    renderStaleBanner(draftsRes?.drafts_brief_date, draftsRes?.latest_brief_date, draftsRes?.stale);

    // Status strip
    const dateEl = document.getElementById('status-date');
    const catEl = document.getElementById('status-category');
    const countEl = document.getElementById('status-count');
    const datePill = document.getElementById('brief-date-pill');
    const topicPill = document.getElementById('brief-topic-pill');

    if (BRIEF) {
      datePill.textContent = BRIEF.date || '—';
      dateEl.textContent = BRIEF.date || '—';
      const cat = BRIEF.blog_research?.topic_category || '—';
      catEl.textContent = cat;
      topicPill.textContent = cat;
      const igFmt = BRIEF.per_platform_topics?.instagram?.format_hint;
      if (igFmt) topicPill.textContent = `${cat} · IG ${igFmt}`;
    } else {
      datePill.textContent = 'no brief yet';
      dateEl.textContent = 'no brief yet';
    }
    countEl.textContent = String(DRAFTS.length);

    // Phase 8 — Today's games panel (operator-pull). Hidden if brief has none.
    renderGamesPanel();

    // Render columns
    const xCards = DRAFTS.filter((d) => d.platform === 'twitter');
    const igCards = DRAFTS.filter((d) => d.platform === 'instagram_single' || d.platform === 'instagram_carousel');

    document.getElementById('x-count').textContent = String(xCards.length);
    document.getElementById('ig-count').textContent = String(igCards.length);

    const xWrap = document.getElementById('x-cards');
    const igWrap = document.getElementById('ig-cards');

    // Phase 9.4: skip column repaint while focus modal is open. The card
    // currently being edited has been transplanted into the modal — wiping
    // innerHTML here would leave it orphaned and we'd lose its return slot.
    const modalOpen = document.getElementById('focus-modal')?.classList.contains('open');
    if (!modalOpen) {
      if (xCards.length === 0 && igCards.length === 0) {
        xWrap.innerHTML = '';
        igWrap.innerHTML = `<div class="empty-state">
          <h3>No drafts yet for today</h3>
          <p>Click <b>Run drafter now</b> at the top to generate today's batch from the latest research brief.</p>
        </div>`;
      } else {
        xWrap.innerHTML = xCards.map(renderTwitterCard).join('') ||
          `<div class="empty-state"><p>No Twitter drafts.</p></div>`;
        igWrap.innerHTML = igCards.map((d) => (
          d.platform === 'instagram_carousel' ? renderInstagramCarouselCard(d) : renderInstagramSingleCard(d)
        )).join('') || `<div class="empty-state"><p>No Instagram draft.</p></div>`;
      }
      // Wire each card
      document.querySelectorAll('.card[data-id]').forEach(wireCardActions);
    }

    // Auto-trigger image rendering for any draft stuck in 'pending'.
    // The render is fire-and-forget (returns 202); we set up a single
    // poll cycle 12s later to refresh once images land.
    autoRenderPendingDrafts();
    // Once-per-session: HEAD probe the first composite image. If it 404s
    // (Heroku ephemeral filesystem was wiped on a recent deploy), fire
    // /regenerate-all-images for every draft to rebuild the local files.
    checkFilesystemOnFirstLoad();
  } catch (e) {
    console.error('loadDrafts error:', e);
    toast('Failed to load drafts: ' + e.message, 'error');
  }
}

// Once-per-session HEAD probe of the first composite image URL. Heroku's
// dyno filesystem is ephemeral — every deploy wipes /public/post-images/
// so previously-rendered files vanish even though Mongo still says
// image_status='ready' with a /post-images/... URL. Operator's browser
// then 404s on every <img>. This catches that condition and triggers
// /regenerate-all-images for every draft so files come back.
let _autoRenderTriggered = new Set();
async function checkFilesystemOnFirstLoad() {
  if (sessionStorage.getItem('bcb_fs_checked') === '1') return;
  if (!DRAFTS.length) return;
  // Find the first composite_url across drafts/slides
  let probeUrl = null;
  for (const d of DRAFTS) {
    if (d.composite_url) { probeUrl = d.composite_url; break; }
    const slide = (d.slides || []).find((s) => s.composite_url);
    if (slide) { probeUrl = slide.composite_url; break; }
  }
  if (!probeUrl) {
    sessionStorage.setItem('bcb_fs_checked', '1');
    return;
  }
  try {
    const r = await fetch(probeUrl, { method: 'HEAD', cache: 'no-cache' });
    sessionStorage.setItem('bcb_fs_checked', '1');
    if (r.status === 404) {
      console.log('[fs-check] composite URLs are 404 — Heroku filesystem was wiped. Auto-rendering all drafts.');
      toast('Heroku restart wiped images — re-rendering (~15s)…', '');
      for (const d of DRAFTS) {
        if (_autoRenderTriggered.has(d._id)) continue;
        _autoRenderTriggered.add(d._id);
        fetch(`/api/admin/dashboard/post-drafts/${d._id}/regenerate-all-images`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
        }).catch(() => {});
      }
      setTimeout(() => loadDrafts().catch(() => {}), 15_000);
    }
  } catch (e) {
    sessionStorage.setItem('bcb_fs_checked', '1');
    console.warn('[fs-check] HEAD probe failed (non-fatal):', e.message);
  }
}

// Auto-trigger /regenerate-all-images for any draft whose image_status is
// 'pending' and whose creation timestamp is more than ~30s ago — meaning
// runDrafter's image pass has had a fair chance and never finished. Single
// shot per dashboard load. Silent: no toast unless the operator explicitly
// triggered it.
async function autoRenderPendingDrafts() {
  const now = Date.now();
  const stale = DRAFTS.filter((d) => {
    if (d.image_status === 'ready') return false;
    if (_autoRenderTriggered.has(d._id)) return false;
    if (!d.created_at) return false;
    const created = new Date(d.created_at).getTime();
    return (now - created) > 30_000;
  });
  if (stale.length === 0) return;
  console.log(`[auto-render] ${stale.length} draft(s) stuck on pending — auto-triggering /regenerate-all-images`);
  for (const d of stale) {
    _autoRenderTriggered.add(d._id);
    fetch(`/api/admin/dashboard/post-drafts/${d._id}/regenerate-all-images`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
    }).catch((e) => console.warn('auto-render failed for', d._id, e.message));
  }
  // Single refresh cycle 12s later — should be enough for parallel render
  setTimeout(() => loadDrafts().catch(() => {}), 12_000);
}

// ── Phase 9.7: ⋯ More menu open/close + outside-click + ESC ─────────────
function toggleMoreMenu(targetId, btn) {
  // Close any other open menus first.
  document.querySelectorAll('.more-menu.open').forEach((m) => {
    if (m.dataset.moreMenu !== targetId) {
      m.classList.remove('open');
      const trigger = document.querySelector(`[data-menu-target="${m.dataset.moreMenu}"]`);
      if (trigger) trigger.setAttribute('aria-expanded', 'false');
    }
  });
  const menu = document.querySelector(`.more-menu[data-more-menu="${targetId}"]`);
  if (!menu) return;
  const opened = menu.classList.toggle('open');
  if (btn) btn.setAttribute('aria-expanded', opened ? 'true' : 'false');
}
function closeAllMoreMenus() {
  document.querySelectorAll('.more-menu.open').forEach((m) => {
    m.classList.remove('open');
    const trigger = document.querySelector(`[data-menu-target="${m.dataset.moreMenu}"]`);
    if (trigger) trigger.setAttribute('aria-expanded', 'false');
  });
}
document.addEventListener('click', (e) => {
  // Don't close if click is inside an open menu OR is the trigger that
  // opened it. Anything else: close all.
  if (e.target.closest('.more-menu')) return;
  if (e.target.closest('[data-action="open-more-menu"]')) return;
  closeAllMoreMenus();
});

// ── Phase 9.7: sticker selection + keyboard delete ──────────────────────
let SELECTED_STICKER = null; // { cardId, slideIndex } | null
function clearStickerSelection() {
  document.querySelectorAll('.sticker-overlay.selected').forEach((s) => s.classList.remove('selected'));
  SELECTED_STICKER = null;
}
document.addEventListener('click', (e) => {
  // Click on sticker body (not the resize handle) → select. Click outside any
  // sticker → clear. Resize handle clicks fall through (don't change selection).
  if (e.target.closest('.resize-handle')) return;
  const sticker = e.target.closest('.sticker-overlay');
  if (sticker && sticker.classList.contains('draggable')) {
    clearStickerSelection();
    sticker.classList.add('selected');
    const cardEl = sticker.closest('.card[data-id]');
    const slideRaw = sticker.dataset.slideIndex;
    SELECTED_STICKER = {
      cardId: cardEl?.dataset.id || null,
      slideIndex: (slideRaw !== undefined && slideRaw !== '') ? Number(slideRaw) : null,
    };
  } else if (!e.target.closest('.sticker-panel') && !e.target.closest('[data-action="add-sticker"]')) {
    // Don't deselect when interacting with the sticker picker — operator
    // is mid-edit and probably wants to swap stickers, not deselect.
    clearStickerSelection();
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Delete' && e.key !== 'Backspace') return;
  if (!SELECTED_STICKER) return;
  // Don't fire when the operator is typing in an input / textarea / contenteditable.
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
  e.preventDefault();
  const { cardId, slideIndex } = SELECTED_STICKER;
  SELECTED_STICKER = null;
  actionRemoveSticker(cardId, slideIndex);
});

// ── Phase 9.6: shared tool-modal backdrop helpers ───────────────────────
// The 🎨 / 📷 / 🏷️ panels reuse a single backdrop element. Show it whenever
// any panel has .open; hide once they all close. Backdrop click + ESC both
// dismiss any open tool panel.
function syncToolModalBackdrop() {
  const anyOpen = document.querySelector('.scene-panel.open, .photo-panel.open, .sticker-panel.open');
  const backdrop = document.getElementById('tool-modal-backdrop');
  if (!backdrop) return;
  backdrop.classList.toggle('open', !!anyOpen);
}
function closeAllToolModals() {
  document.querySelectorAll('.scene-panel.open, .photo-panel.open, .sticker-panel.open')
    .forEach((p) => p.classList.remove('open'));
  syncToolModalBackdrop();
}
document.addEventListener('DOMContentLoaded', () => {
  const bd = document.getElementById('tool-modal-backdrop');
  if (bd) bd.addEventListener('click', closeAllToolModals);
});
// Also wire immediately in case DOMContentLoaded already fired
{
  const bd = document.getElementById('tool-modal-backdrop');
  if (bd && !bd.dataset.wired) {
    bd.addEventListener('click', closeAllToolModals);
    bd.dataset.wired = '1';
  }
}

// ── Phase 9.4: focus modal (click ⛶ on a card to expand) ─────────────────
// We *transplant* the live card DOM into the modal so all wired event
// handlers (drag, contenteditable, hashtag pills) keep working without
// re-wiring. On close we put it back in its original column position.
let MODAL_RETURN = null; // { parent, nextSibling } where the card came from

function openFocusModal(cardEl) {
  if (!cardEl) return;
  const modal = document.getElementById('focus-modal');
  const body = modal.querySelector('.focus-modal-body');
  // Remember where this card lived so we can re-insert it on close
  MODAL_RETURN = { parent: cardEl.parentElement, nextSibling: cardEl.nextElementSibling };
  body.appendChild(cardEl);
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Pop scroll to top of the modal
  modal.scrollTop = 0;
}

function closeFocusModal() {
  const modal = document.getElementById('focus-modal');
  const body = modal.querySelector('.focus-modal-body');
  const cardEl = body.querySelector('.card[data-id]');
  if (cardEl && MODAL_RETURN) {
    if (MODAL_RETURN.nextSibling && MODAL_RETURN.parent.contains(MODAL_RETURN.nextSibling)) {
      MODAL_RETURN.parent.insertBefore(cardEl, MODAL_RETURN.nextSibling);
    } else if (MODAL_RETURN.parent) {
      MODAL_RETURN.parent.appendChild(cardEl);
    }
  }
  MODAL_RETURN = null;
  modal.classList.remove('open');
  document.body.style.overflow = '';
  // Re-fetch so columns reflect any saves made while in focus mode
  loadDrafts().catch(() => {});
}

document.getElementById('focus-modal').addEventListener('click', (e) => {
  // Backdrop click closes — onclick="event.stopPropagation()" on .focus-modal
  // means inner clicks don't bubble here.
  if (e.target.id === 'focus-modal') closeFocusModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  // Priority: More menus > tool modals > focus modal. Each layer closes
  // and the deeper layers stay open until the operator hits ESC again.
  const moreOpen = document.querySelector('.more-menu.open');
  if (moreOpen) {
    closeAllMoreMenus();
    return;
  }
  const anyTool = document.querySelector('.scene-panel.open, .photo-panel.open, .sticker-panel.open');
  if (anyTool) {
    closeAllToolModals();
  } else if (document.getElementById('focus-modal').classList.contains('open')) {
    closeFocusModal();
  }
});
// Top-level click delegation for expand/close — these targets aren't bound
// inside wireCardActions because the card may be in the modal at the time.
document.addEventListener('click', (e) => {
  const expand = e.target.closest('[data-action="expand-card"]');
  if (expand) {
    e.preventDefault(); e.stopPropagation();
    const cardEl = expand.closest('.card[data-id]');
    openFocusModal(cardEl);
    return;
  }
  const close = e.target.closest('[data-action="close-focus-modal"]');
  if (close) {
    e.preventDefault();
    closeFocusModal();
  }
});

// Initial load
loadDrafts();
</script>
