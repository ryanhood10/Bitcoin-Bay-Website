<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Content Drafts · BC Bay</title>
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181c23;
    --surface3: #1f2530;
    --border: #1f2530;
    --border2: #2a3040;
    --gold: #f0b429;
    --gold2: #ffd166;
    --orange: #ee8034;
    --green: #00d68f;
    --green-dim: #00a86e;
    --red: #ff5c5c;
    --blue: #4a9eff;
    --text: #e8ecf4;
    --muted: #5a6478;
    --muted2: #8892a4;
    --twitter: #1d9bf0;
    --instagram: #e1306c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, "Inter", "Segoe UI", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .page { max-width: 1320px; margin: 0 auto; padding: 18px 22px 60px; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); color: var(--muted2); }
  .pill.gold { background: rgba(240,180,41,0.1); color: var(--gold); border-color: rgba(240,180,41,0.3); }
  .pill.green { background: rgba(0,214,143,0.1); color: var(--green); border-color: rgba(0,214,143,0.3); }
  .pill.orange { background: rgba(238,128,52,0.1); color: var(--orange); border-color: rgba(238,128,52,0.3); }
  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); cursor: pointer; transition: all 0.12s ease; font-family: inherit; }
  .btn:hover:not(:disabled) { border-color: var(--muted); background: var(--surface3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.primary { background: var(--orange); border-color: var(--orange); color: #fff; }
  .btn.primary:hover:not(:disabled) { background: #ff9145; }
  .btn.success { background: var(--green-dim); border-color: var(--green-dim); color: #fff; }
  .btn.success:hover:not(:disabled) { background: var(--green); }
  .btn.danger { color: var(--red); border-color: rgba(255,92,92,0.3); }
  .btn.danger:hover:not(:disabled) { background: rgba(255,92,92,0.1); }
  .btn.small { padding: 5px 10px; font-size: 12px; }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--muted2); }
  .btn.ghost:hover:not(:disabled) { color: var(--text); background: var(--surface2); }

  /* STATUS STRIP */
  .status-strip { display: flex; gap: 16px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; font-size: 12px; }
  .status-strip .label { color: var(--muted2); }
  .status-strip .value { color: var(--text); font-weight: 600; }
  .status-strip .topic { color: var(--gold); }

  /* GRID — cards centered within columns at native widths.
     Twitter native ≈ 600px on x.com, IG native ≈ 470px. Constraining + centering
     makes the page read as a feed scroll rather than a dashboard form. */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
  .col { display: flex; flex-direction: column; gap: 14px; min-width: 0; align-items: center; }
  .col > .card { width: 100%; max-width: 580px; }
  .col > .platform-header { width: 100%; max-width: 580px; }
  .col-stack { width: 100%; max-width: 580px; align-items: stretch; }
  /* IG cards are narrower per native dimensions */
  .col-stack .card.platform-instagram { max-width: 470px; align-self: center; }

  /* PLATFORM HEADER — strong visual separation between Twitter and Instagram columns */
  .platform-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px 10px 0 0; font-weight: 800; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; position: sticky; top: 0; z-index: 5; }
  .platform-header.twitter { background: #15202b; color: #fff; border: 1px solid #1d2733; border-bottom-color: var(--twitter); }
  .platform-header.instagram { background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
  .platform-header .platform-icon { width: 18px; height: 18px; flex-shrink: 0; }
  .platform-header .count-pill { margin-left: auto; padding: 2px 8px; background: rgba(255,255,255,0.18); border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.02em; }

  /* CARDS — denser than v1 */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.15s ease; }
  .card.platform-twitter { border-left: 3px solid var(--twitter); }
  .card.platform-instagram { border-left: 3px solid var(--instagram); }
  .card.skipped { opacity: 0.55; }
  .card.posted { border-color: var(--green-dim); }
  .card.approved { border-color: var(--orange); }

  /* Collapsed (posted/skipped) — one-line preview, click to expand */
  .card.collapsed { cursor: pointer; }
  .card.collapsed .card-body, .card.collapsed .card-actions, .card.collapsed .topic-line, .card.collapsed .scene-panel { display: none; }
  .card.collapsed .card-head { border-bottom: none; padding: 8px 12px; }
  .card.collapsed .collapsed-preview { display: block; padding: 4px 12px 8px; font-size: 12px; color: var(--muted2); line-height: 1.4; max-height: 32px; overflow: hidden; text-overflow: ellipsis; }
  .collapsed-preview { display: none; }

  .card-head { padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 6px; }
  .card-head-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .topic-line { font-size: 11px; color: var(--muted2); padding: 6px 12px 0; line-height: 1.4; }
  .topic-line strong { color: var(--text); font-weight: 600; }

  .card-body { padding: 10px 12px; }
  .editor { width: 100%; min-height: 70px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-family: inherit; font-size: 13px; line-height: 1.45; resize: vertical; }
  .editor.ig { min-height: 100px; }
  .editor:focus { outline: none; border-color: var(--orange); }
  .char-count { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: right; }
  .char-count.over { color: var(--red); font-weight: 700; }

  /* IMAGE-FIRST layout for Instagram (image at top of card body, caption below).
     Twitter keeps text-first since text is the primary content. */
  .image-preview { width: 100%; border-radius: 6px; overflow: hidden; background: var(--surface2); border: 1px solid var(--border); position: relative; }
  .image-preview.below-text { margin-top: 8px; }
  .image-preview.above-text { margin-bottom: 10px; }
  .image-preview img { display: block; width: 100%; max-height: 220px; object-fit: cover; background: #000; }
  .image-preview.large img { max-height: 360px; }
  .image-preview .placeholder { padding: 28px 10px; text-align: center; color: var(--muted); font-size: 11px; }
  .image-meta { padding: 4px 8px; font-size: 10px; color: var(--muted); display: flex; gap: 8px; justify-content: space-between; border-top: 1px solid var(--border); align-items: center; }
  .image-meta .download-btn { color: var(--blue); text-decoration: none; padding: 2px 6px; border-radius: 4px; font-size: 14px; }
  .image-meta .download-btn:hover { background: var(--surface3); }

  /* Corner overlay buttons on the image preview itself (e.g. 🎨 Replace
     with AI scene). Top-right corner, semi-transparent until hover. */
  .image-corner-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; z-index: 4; }
  .corner-btn { width: 36px; height: 36px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.6); background: rgba(0,0,0,0.65); color: var(--gold); font-size: 16px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; backdrop-filter: blur(6px); transition: all 0.12s ease; }
  .corner-btn:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); transform: scale(1.08); }
  .corner-btn.danger { color: var(--red); border-color: rgba(255,92,92,0.5); }
  .corner-btn.danger:hover { background: var(--red); color: #fff; border-color: var(--red); }

  @media (max-width: 800px) {
    .image-preview img { max-height: 200px; }
    .image-preview.large img { max-height: 280px; }
    .corner-btn { width: 32px; height: 32px; font-size: 14px; }
  }

  .field-row { margin-top: 8px; }
  .field-label { font-size: 10px; font-weight: 600; color: var(--muted2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
  .field-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: 5px; font-family: inherit; font-size: 12px; }
  .field-input:focus { outline: none; border-color: var(--orange); }

  .source-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--muted2); margin-top: 6px; }
  .source-chip a { color: var(--blue); }

  /* HASHTAG PILLS — replaces inline comma input by default */
  .hashtag-row { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; cursor: pointer; padding: 4px; border-radius: 6px; min-height: 28px; }
  .hashtag-row:hover { background: var(--surface2); }
  .hashtag-pill { display: inline-block; padding: 2px 7px; background: rgba(74,158,255,0.12); color: var(--blue); border: 1px solid rgba(74,158,255,0.3); border-radius: 999px; font-size: 11px; font-weight: 500; }
  .hashtag-pill.empty { color: var(--muted); background: transparent; border-color: var(--border); font-style: italic; }
  .hashtag-edit-input { display: none; width: 100%; }
  .hashtag-row.editing .hashtag-pill { display: none; }
  .hashtag-row.editing .hashtag-edit-input { display: block; }

  /* VARIANT CHIP — Twitter only — shows MEME or NEWS */
  .variant-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; }
  .variant-chip.meme { background: rgba(240,180,41,0.15); color: var(--gold); border: 1px solid rgba(240,180,41,0.35); }
  .variant-chip.professional { background: rgba(74,158,255,0.15); color: var(--blue); border: 1px solid rgba(74,158,255,0.35); }

  /* ADVANCED EXPANDER — for "Override image URL" etc. */
  details.advanced { margin-top: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 11px; }
  details.advanced summary { cursor: pointer; color: var(--muted2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; user-select: none; padding: 2px 0; }
  details.advanced summary::-webkit-details-marker { color: var(--muted); }
  details.advanced[open] summary { color: var(--text); margin-bottom: 6px; }

  /* HOVER-REVEAL action row — less permanent chrome per the UI research.
     Stays at 65% opacity until card hover/focus, fades to full. */
  .card-actions { padding: 8px 12px; background: var(--surface2); border-top: 1px solid var(--border); display: flex; gap: 5px; flex-wrap: wrap; align-items: center; opacity: 0.7; transition: opacity 0.15s ease; }
  .card:hover .card-actions, .card:focus-within .card-actions { opacity: 1; }

  /* ─── NATIVE-STYLE POST MOCKS (Phase 6.9 — UI research recommendation) ───
     These elements layer ABOVE the editor to make each card feel like the
     actual platform. The editor underneath stays functional for editing. */

  /* Twitter mock header — avatar + display name + @handle + timestamp */
  .tweet-mock-header { display: flex; gap: 10px; align-items: center; padding: 0 0 6px; }
  .tweet-mock-header .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--bg); object-fit: cover; flex-shrink: 0; border: 1px solid var(--border2); }
  .tweet-mock-header .name-row { font-size: 13px; line-height: 1.2; }
  .tweet-mock-header .display-name { font-weight: 700; color: var(--text); }
  .tweet-mock-header .handle { color: var(--muted2); font-weight: 400; margin-left: 4px; }
  .tweet-mock-header .handle::before { content: '· now'; color: var(--muted2); font-weight: 400; margin-left: 4px; opacity: 0; }

  /* ─── UNIFIED contenteditable POST TEXT (replaces text-display + textarea
     swap pattern). Same element is the display AND the editor — sizing,
     padding, font, line-height all stay identical regardless of focus state.
     Hashtags + @mentions render as inline blue spans both at rest and while
     editing. The blur handler re-renders to clean up any messy span structure
     introduced by typing inside spans. */
  .post-text { font-family: -apple-system, "Segoe UI", "Inter", BlinkMacSystemFont, Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.45; border: 1px solid transparent; background: transparent; padding: 6px 8px; min-height: 60px; color: var(--text); border-radius: 6px; outline: none; white-space: pre-wrap; word-wrap: break-word; cursor: text; transition: background 0.12s ease, border-color 0.12s ease; }
  .post-text:hover { background: var(--surface2); }
  .post-text:focus { background: var(--surface2); border-color: var(--twitter); }
  .post-text .ht, .post-text .mt { color: var(--twitter); font-weight: 500; }
  /* IG-flavored variant — slightly smaller line-height to match IG feed */
  .post-text.ig { font-size: 14px; line-height: 1.4; min-height: 50px; padding: 4px 0; border: none; }
  .post-text.ig:hover { background: var(--surface2); border-radius: 4px; }
  .post-text.ig:focus { background: var(--surface2); border-radius: 4px; }
  .post-text.ig .ht, .post-text.ig .mt { color: var(--blue); }
  /* Empty-state placeholder via :empty + ::before (works on contenteditable) */
  .post-text:empty::before { content: attr(data-placeholder); color: var(--muted); font-style: italic; pointer-events: none; }

  /* Twitter mock action row — reply, retweet, like, view, share icons */
  .tweet-mock-actions { display: flex; gap: 0; padding: 6px 0 0; color: var(--muted2); font-size: 12px; align-items: center; justify-content: space-between; max-width: 100%; }
  .tweet-mock-actions .act { display: inline-flex; align-items: center; gap: 4px; flex: 1; }
  .tweet-mock-actions .act svg { width: 16px; height: 16px; opacity: 0.7; }

  /* IG mock header — gradient-ring avatar + username */
  .ig-mock-header { display: flex; gap: 10px; align-items: center; padding: 4px 0 8px; }
  .ig-mock-header .ig-avatar-ring { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%); padding: 2px; flex-shrink: 0; }
  .ig-mock-header .ig-avatar-ring img, .ig-mock-header .ig-avatar-ring .ig-avatar-fallback { display: block; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: var(--bg); }
  .ig-mock-header .ig-avatar-fallback { display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--gold); }
  .ig-mock-header .ig-username { font-weight: 600; font-size: 14px; color: var(--text); }
  .ig-mock-header .ig-dot { color: var(--muted); }

  /* IG mock action row — heart, comment, paperplane, bookmark */
  .ig-mock-actions { display: flex; gap: 14px; padding: 8px 2px 4px; font-size: 22px; color: var(--text); align-items: center; }
  .ig-mock-actions .right { margin-left: auto; }

  /* IG "Liked by" placeholder line */
  .ig-likes { font-size: 13px; color: var(--text); padding: 2px 0 4px; }
  .ig-likes b { font-weight: 700; }

  /* IG caption preview — username bold, caption text inline,
     hashtags rendered as inline IG-blue text (NOT pills). */
  .ig-caption-preview { font-size: 13px; line-height: 1.5; padding: 4px 0; word-break: break-word; max-height: 5.5em; overflow: hidden; }
  .ig-caption-preview .ig-username { font-weight: 700; margin-right: 4px; color: var(--text); }
  .ig-caption-preview .ht, .ig-caption-preview .mt { color: var(--blue); font-weight: 500; }
  .ig-caption-preview .more-link { color: var(--muted2); cursor: pointer; }
  .ig-caption-preview.expanded { max-height: none; }

  /* Carousel "1/N" pill on the image (native IG style) */
  .ig-card-num { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.72); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; pointer-events: none; z-index: 3; }

  /* Carousel dot row under the image (native IG style) */
  .ig-dots { display: flex; justify-content: center; gap: 5px; padding: 6px 0 4px; background: var(--surface); align-items: center; }
  .ig-dots .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); cursor: pointer; transition: all 0.12s ease; flex-shrink: 0; }
  .ig-dots .dot.active { background: var(--blue); transform: scale(1.2); }
  .ig-dots .dot:hover { background: var(--muted2); }
  /* "+" CTA slot tile in the dot row — appears at the end when no CTA
     slide has been added yet. Click → opens the CTA editor in the slide
     panel below. Visually distinct from real dots (dashed gold ring). */
  .ig-dots .dot.add-cta { width: 14px; height: 14px; border-radius: 50%; background: transparent; border: 1.5px dashed var(--gold); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; line-height: 1; padding: 0; }
  .ig-dots .dot.add-cta:hover { background: rgba(240,180,41,0.15); transform: scale(1.15); }
  .ig-dots .dot.add-cta.active { background: var(--gold); color: var(--bg); border-color: var(--gold); transform: scale(1.15); }
  /* Section header inside the slide panel area */
  .slide-section-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted2); padding: 12px 12px 6px; border-top: 1px solid var(--border); margin-top: 8px; display: flex; align-items: center; gap: 6px; }

  /* Scene-prompt panel — hidden until the operator clicks 🎨 Generate scene.
     Operator-triggered AI image generation (Replicate InstantID, ~$0.05/call). */
  .scene-panel { display: none; padding: 12px 14px; background: var(--surface2); border-top: 1px dashed var(--border2); }
  .scene-panel.open { display: block; }
  .scene-prompt { width: 100%; min-height: 80px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-family: inherit; font-size: 12px; line-height: 1.5; resize: vertical; }
  .scene-prompt:focus { outline: none; border-color: var(--orange); }
  .scene-buttons { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
  .scene-cost { font-size: 11px; color: var(--muted); margin-left: auto; }
  .scene-hint { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

  /* CAROUSEL — thumbnail strip (Phase 6.3) replaces text-only slide-tabs */
  .slide-strip { display: flex; gap: 8px; padding: 10px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); overflow-x: auto; scroll-snap-type: x mandatory; }
  .slide-strip::-webkit-scrollbar { height: 6px; }
  .slide-strip::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .slide-thumb { position: relative; flex-shrink: 0; width: 110px; height: 110px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; background: var(--surface3); scroll-snap-align: start; transition: all 0.12s ease; }
  .slide-thumb:hover { border-color: var(--muted); transform: translateY(-2px); }
  .slide-thumb.active { border-color: var(--instagram); box-shadow: 0 0 0 3px rgba(225,48,108,0.35); }
  .slide-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .slide-thumb .thumb-num { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.75); color: #fff; font-size: 11px; font-weight: 800; padding: 2px 7px; border-radius: 4px; }
  .slide-thumb .thumb-role { position: absolute; bottom: 4px; left: 4px; right: 4px; background: rgba(0,0,0,0.75); color: #fff; font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 2px 4px; border-radius: 4px; text-align: center; letter-spacing: 0.04em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slide-thumb .thumb-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 24px; }
  .slide-strip-empty { padding: 16px 12px; text-align: center; color: var(--muted); font-size: 12px; background: var(--surface2); border-bottom: 1px solid var(--border); }

  .slide-panel { display: none; }
  .slide-panel.active { display: block; }
  .slide-panel { padding: 0 12px 10px; }
  .slide-panel-head { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
  .slide-panel-head .slide-role-pill { padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted2); font-weight: 700; }

  /* Carousel-level tools (regen-all-images, add-cta, download-zip) */
  .carousel-tools { display: flex; gap: 5px; flex-wrap: wrap; padding: 6px 12px 8px; background: var(--surface2); border-bottom: 1px solid var(--border); }

  /* Phase 6.4 — drag overlay editor + color picker */
  .overlay-canvas { position: relative; user-select: none; touch-action: none; }
  .overlay-canvas img { pointer-events: none; }
  .overlay-headline { position: absolute; transform: translate(0, -100%); cursor: move; padding: 4px 8px; background: rgba(0,0,0,0.0); border: 2px dashed rgba(255,255,255,0.6); border-radius: 4px; font-weight: 800; font-size: 18px; line-height: 1.1; max-width: 75%; text-shadow: 0 2px 6px rgba(0,0,0,0.85); white-space: pre-wrap; word-break: break-word; }
  .overlay-headline:hover { border-color: var(--orange); background: rgba(0,0,0,0.18); }
  .overlay-headline.dragging { border-color: var(--orange); background: rgba(0,0,0,0.25); }

  .color-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; padding: 6px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; }
  .color-row .field-label { margin-bottom: 0; }
  .color-row input[type="color"] { width: 28px; height: 28px; border: 1px solid var(--border2); border-radius: 4px; padding: 0; background: transparent; cursor: pointer; }
  .color-swatch { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border2); cursor: pointer; transition: transform 0.1s ease; padding: 0; }
  .color-swatch:hover { transform: scale(1.15); border-color: var(--text); }
  .color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--orange); }

  /* STATUS PILLS on cards */
  .status-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .status-pill.draft { background: var(--surface3); color: var(--muted2); }
  .status-pill.approved { background: rgba(238,128,52,0.15); color: var(--orange); }
  .status-pill.posted { background: rgba(0,214,143,0.15); color: var(--green); }
  .status-pill.skipped { background: rgba(255,92,92,0.15); color: var(--red); }

  /* TOAST */
  .toast { position: fixed; bottom: 22px; right: 22px; padding: 12px 18px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,0.4); font-size: 13px; opacity: 0; transform: translateY(8px); transition: all 0.2s ease; pointer-events: none; max-width: 360px; z-index: 100; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green-dim); color: var(--green); }

  /* EMPTY STATE */
  .empty-state { padding: 60px 20px; text-align: center; color: var(--muted2); }
  .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 13px; margin-bottom: 20px; }

  /* ─── TODAY'S GAMES panel (Phase 8 — operator-pull only) ─── */
  .games-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .games-panel-head { padding: 8px 14px; display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gold); background: var(--surface2); border-bottom: 1px solid var(--border); }
  .games-panel-head .games-sub { color: var(--muted2); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .games-panel-head .games-count { margin-left: auto; padding: 2px 8px; background: rgba(240,180,41,0.15); color: var(--gold); border-radius: 999px; font-size: 11px; }
  .games-strip { display: flex; gap: 8px; padding: 10px 12px; overflow-x: auto; scroll-snap-type: x mandatory; }
  .games-strip::-webkit-scrollbar { height: 6px; }
  .games-strip::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .game-card { flex-shrink: 0; min-width: 240px; max-width: 280px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; scroll-snap-align: start; display: flex; flex-direction: column; gap: 4px; transition: border-color 0.12s ease; }
  .game-card.live { border-color: var(--green-dim); box-shadow: 0 0 0 1px rgba(0,168,110,0.25); }
  .game-card.pre { border-color: var(--border2); }
  .game-card.post { opacity: 0.55; }
  .game-card .game-league { display: inline-block; font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 3px; background: var(--surface3); color: var(--muted2); letter-spacing: 0.04em; align-self: flex-start; }
  .game-card .game-teams { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .game-card .game-teams .score { color: var(--gold); font-variant-numeric: tabular-nums; }
  .game-card .game-status { font-size: 11px; color: var(--muted2); }
  .game-card .game-status .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .game-card .game-broadcast { font-size: 10px; color: var(--muted); font-style: italic; }
  .game-card .game-actions { display: flex; gap: 4px; margin-top: 4px; }
  .game-card .game-actions .btn { padding: 3px 8px; font-size: 11px; }
  .game-state-expand { display: none; margin-top: 6px; padding: 8px 10px; background: var(--surface3); border-radius: 6px; font-size: 11px; line-height: 1.4; }
  .game-state-expand.show { display: block; }
  .game-state-expand .play { padding: 2px 0; color: var(--text); border-bottom: 1px dashed var(--border2); }
  .game-state-expand .play:last-child { border-bottom: none; }
  .game-state-expand .winprob { display: flex; gap: 12px; padding: 4px 0 6px; font-size: 11px; color: var(--muted2); }
  .game-state-expand .winprob b { color: var(--gold); }
</style>
</head>
<body>

<div class="page">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>Content Drafts</h1>
      <span id="brief-date-pill" class="pill gold">—</span>
      <span id="brief-topic-pill" class="pill">—</span>
    </div>
    <div class="header-right">
      <button id="btn-refresh" class="btn ghost small" onclick="loadDrafts()">↻ Refresh</button>
      <button id="btn-run-drafter" class="btn primary" onclick="runDrafter()">↻ Run drafter now</button>
      <a class="btn ghost small" href="/admin/dashboard">← Dashboard</a>
    </div>
  </div>

  <!-- STATUS STRIP -->
  <div id="status-strip" class="status-strip">
    <div><span class="label">Brief:</span> <span id="status-date" class="value">loading…</span></div>
    <div><span class="label">Today's category:</span> <span id="status-category" class="topic">—</span></div>
    <div><span class="label">Drafts:</span> <span id="status-count" class="value">0</span></div>
    <div id="status-runtime" style="color: var(--muted); display: none;"></div>
  </div>

  <!-- TODAY'S GAMES (Phase 8 — operator-pull) -->
  <div id="games-panel" class="games-panel" style="display:none;">
    <div class="games-panel-head">
      🏀 Today's games
      <span class="games-sub">operator-pull · ESPN free API · ~$0.04 per draft</span>
      <span class="games-count" id="games-count">0</span>
    </div>
    <div class="games-strip" id="games-strip"></div>
  </div>

  <!-- TWO-COLUMN GRID -->
  <div class="grid">
    <div class="col">
      <div class="platform-header twitter">
        <svg class="platform-icon" viewBox="0 0 24 24" fill="#fff"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Twitter / X
        <span id="x-count" class="count-pill">0</span>
      </div>
      <div id="x-cards" class="col-stack" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>
    <div class="col">
      <div class="platform-header instagram">
        <svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#fff" stroke="none"/></svg>
        Instagram
        <span id="ig-count" class="count-pill">0</span>
      </div>
      <div id="ig-cards" class="col-stack" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────
// CONTENT DRAFTS — operator review/edit/approve UI for the daily X+IG drafts.
// All endpoints under /api/admin/dashboard/post-drafts/* (Phase 6).
// ─────────────────────────────────────────────────────────────────────────

const TWITTER_LIMIT = 280;
const IG_CAPTION_LIMIT = 2200;

// State
let DRAFTS = [];
let BRIEF = null;
let CURRENT_SLIDE = {}; // draftId -> active slide index for carousel cards

const escapeHtml = (s) => String(s || '').replace(/[&<>"']/g, (c) => (
  { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
));

function toast(message, kind = '') {
  const t = document.getElementById('toast');
  t.textContent = message;
  t.className = 'toast show ' + kind;
  setTimeout(() => { t.className = 'toast ' + kind; }, 3500);
}

// ─── Render ─────────────────────────────────────────────────────────────
function renderTwitterCard(d) {
  const len = (d.text || '').length;
  const overLimit = len > TWITTER_LIMIT;
  const status = d.status || 'draft';
  const sourceChip = d.source_url
    ? `<div class="source-chip">📎 <a href="${escapeHtml(d.source_url)}" target="_blank" rel="noopener">${escapeHtml(d.source_url.replace(/^https?:\/\//, '').slice(0, 40))}…</a></div>`
    : '';
  const imageBlock = renderImageBlock(d, 'below-text');
  const isLocked = ['posted', 'skipped'].includes(status);
  const isCollapsed = isLocked;
  const variantChip = renderVariantChip(d);

  return `<div class="card platform-twitter ${status}${isCollapsed ? ' collapsed' : ''}" data-id="${d._id}">
    <div class="card-head">
      <div class="card-head-left">
        ${d.athlete_crypto_pin ? '<span class="pill orange">🚨 ATHLETE×CRYPTO</span>' : ''}
        ${variantChip}
        <span class="status-pill ${status}">${status}</span>
      </div>
      <div style="font-size:10px;color:var(--muted);" title="${escapeHtml(d.topic || '')}">${escapeHtml(d.format_hint || 'take')}</div>
    </div>
    <div class="collapsed-preview">${escapeHtml((d.text || '').slice(0, 120))}…</div>
    <div class="card-body">
      <div class="tweet-mock-header">
        <img class="avatar" src="/bb-logo.png" alt="" onerror="this.style.display='none'"/>
        <div class="name-row">
          <span class="display-name">Bitcoin Bay</span>
          <span class="handle">@BitcoinBay_com · now</span>
        </div>
      </div>
      <div class="post-text" ${isLocked ? '' : 'contenteditable="true"'} data-field="text" data-placeholder="Type your tweet…" spellcheck="true">${renderInlineText(d.text || '')}</div>
      <div class="char-count ${overLimit ? 'over' : ''}" data-counter><span class="len">${len}</span> / ${TWITTER_LIMIT}</div>
      ${sourceChip}
      ${imageBlock}
      ${renderAdvanced(d, isLocked)}
    </div>
    ${renderScenePanel(d)}
    ${renderActions(d, isLocked)}
  </div>`;
}

function renderInstagramSingleCard(d) {
  const len = (d.caption || '').length;
  const overLimit = len > IG_CAPTION_LIMIT;
  const status = d.status || 'draft';
  const sourceChip = d.source_url
    ? `<div class="source-chip">📎 <a href="${escapeHtml(d.source_url)}" target="_blank" rel="noopener">${escapeHtml(d.source_url.replace(/^https?:\/\//, '').slice(0, 40))}…</a></div>`
    : '';
  const isLocked = ['posted', 'skipped'].includes(status);
  const isCollapsed = isLocked;

  return `<div class="card platform-instagram ${status}${isCollapsed ? ' collapsed' : ''}" data-id="${d._id}">
    <div class="card-head">
      <div class="card-head-left">
        <span class="status-pill ${status}">${status}</span>
      </div>
      <div style="font-size:10px;color:var(--muted);" title="${escapeHtml(d.topic || '')}">single image</div>
    </div>
    <div class="collapsed-preview">${escapeHtml((d.caption || '').slice(0, 120))}…</div>
    <div class="card-body" style="padding-bottom:6px;">
      <div class="ig-mock-header">
        <div class="ig-avatar-ring"><img src="/bb-logo.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ig-avatar-fallback',textContent:'BB'}))"/></div>
        <span class="ig-username">bitcoin_bay</span>
        <span class="ig-dot">·</span>
        <span style="color:var(--muted2); font-size:12px;">now</span>
      </div>
    </div>
    ${renderImageBlock(d, 'above-text', 'large')}
    <div class="card-body" style="padding-top:6px;">
      <div class="ig-mock-actions">
        <span title="Like">♡</span>
        <span title="Comment">💬</span>
        <span title="Share">⤴</span>
        <span class="right" title="Save">🔖</span>
      </div>
      <div class="ig-likes">Liked by <b>fans</b> and others</div>
      ${renderIgCaptionPreview(d, isLocked)}
      <div class="char-count ${overLimit ? 'over' : ''}" data-counter><span class="len">${len}</span> / ${IG_CAPTION_LIMIT}</div>
      <details class="advanced">
        <summary>✏️ More edits — image overlay text + manual URL override</summary>
        <div class="field-row">
          <div class="field-label">Image overlay text (≤8 words, shown on the photo)</div>
          <input class="field-input" data-field="image_overlay_text" value="${escapeHtml(d.image_overlay_text || '')}" ${isLocked ? 'disabled' : ''} />
        </div>
        <div class="field-row">
          <div class="field-label">Override image URL (manual)</div>
          <input class="field-input" data-field="image_url" placeholder="paste a public image URL" value="${escapeHtml(d.image_url_override || '')}" ${isLocked ? 'disabled' : ''} />
        </div>
      </details>
      ${sourceChip}
    </div>
    ${renderScenePanel(d)}
    ${renderActions(d, isLocked)}
  </div>`;
}

function renderInstagramCarouselCard(d) {
  const len = (d.caption || '').length;
  const overLimit = len > IG_CAPTION_LIMIT;
  const status = d.status || 'draft';
  const slides = d.slides || [];
  const cur = CURRENT_SLIDE[d._id] ?? 0;
  const isLocked = ['posted', 'skipped'].includes(status);
  const isCollapsed = isLocked;

  // Native-style dot row (replaces the giant thumbnail strip per UI research).
  // Click a dot to switch the active slide. After the last real slide, a
  // "+" tile appears IF no CTA slide has been added yet — click it to open
  // the CTA editor in place. Operator-clear way of showing where the BB CTA
  // slide will go (vs the old opaque "Add BB CTA slide" button).
  const hasCtaSlide = slides.some((s) => s.is_cta_slide);
  const ctaSlotActive = cur === 'cta_slot';
  const showAddCtaTile = !isLocked && !hasCtaSlide && slides.length < 10 && slides.length > 0;
  const realDots = slides.map((_, i) =>
    `<div class="dot ${i === cur && !ctaSlotActive ? 'active' : ''}" data-slide="${i}" title="Slide ${i + 1}"></div>`
  ).join('');
  const ctaTile = showAddCtaTile
    ? `<div class="dot add-cta ${ctaSlotActive ? 'active' : ''}" data-slide="cta_slot" title="Add a BB-branded CTA slide at the end">+</div>`
    : '';
  const dots = realDots + ctaTile;

  // Active slide's image — bigger, with "1/N" pill and corner 🎨 button.
  // Fits the IG-native pattern: image dominates the card.
  const active = slides[cur] || {};
  const activeComposite = active.composite_url || active.image_url || '';
  const activeOverlayX = Number.isFinite(active.overlay_x) ? active.overlay_x : 5.5;
  const activeOverlayY = Number.isFinite(active.overlay_y) ? active.overlay_y : 92;
  const activeOverlayColor = (typeof active.overlay_color === 'string' && /^#[0-9a-f]{3,8}$/i.test(active.overlay_color))
    ? active.overlay_color : '#FFFFFF';
  const heroImage = activeComposite
    ? `<div class="image-preview large overlay-canvas" data-slide-index="${cur}">
         <img src="${escapeHtml(activeComposite)}" alt="" onerror="this.parentElement.querySelector('.overlay-headline').style.display='none'"/>
         <div class="overlay-headline${isLocked ? '' : ' draggable'}"
              data-overlay-x="${activeOverlayX}" data-overlay-y="${activeOverlayY}"
              style="left:${activeOverlayX}%; top:${activeOverlayY}%; color:${escapeHtml(activeOverlayColor)};">${escapeHtml(active.headline || '')}</div>
         ${slides.length > 1 ? `<div class="ig-card-num">${cur + 1}/${slides.length}</div>` : ''}
         ${isLocked ? '' : `<div class="image-corner-actions">
           <button class="corner-btn" data-action="generate-art" data-slide-index="${cur}" title="Replace this slide with AI scene (~$0.05)">🎨</button>
         </div>`}
         <div class="image-meta">
           <span>${escapeHtml(active.image_attribution || '')}</span>
           ${activeComposite ? `<a class="download-btn" download="slide-${cur + 1}.jpg" href="${escapeHtml(activeComposite)}" title="Download this slide">💾</a>` : ''}
         </div>
       </div>`
    : `<div class="image-preview large"><div class="placeholder">Image rendering — refresh in 30s, or paste a URL in the editor below.</div></div>`;

  // Carousel-level tools row removed in Phase 8.5: "Add BB CTA slide" became
  // the "+" tile in the dot row (clearer intent). "🔁 Regen images" + "📦 ZIP"
  // moved into the card-actions row alongside Save/Skip/Approve. Cleaner card.
  const tools = '';

  // Active-slide editor (only the currently-focused slide gets the editing
  // surface — operator switches via the dot row above). Per UI research, the
  // old per-slide-stacked-vertically layout was making 1500px-tall cards.
  // When ctaSlotActive (operator clicked "+" tile), show the CTA editor form.
  let activePanelHtml = '';
  if (ctaSlotActive) {
    activePanelHtml = renderCtaSlotForm(d);
  } else if (slides[cur]) {
    activePanelHtml = buildSlideEditor(d, slides[cur], cur, isLocked, slides.length);
  }

  return `<div class="card platform-instagram ${status}${isCollapsed ? ' collapsed' : ''}" data-id="${d._id}">
    <div class="card-head">
      <div class="card-head-left">
        ${d.athlete_crypto_pin ? '<span class="pill orange">🚨 ATHLETE×CRYPTO</span>' : ''}
        <span class="status-pill ${status}">${status}</span>
        <span class="pill" style="background:rgba(74,158,255,0.1); color: var(--blue); border-color: rgba(74,158,255,0.3);">${slides.length}-slide carousel</span>
      </div>
      <div style="font-size:10px;color:var(--muted);" title="${escapeHtml(d.topic || '')}">${escapeHtml((d.topic || '').slice(0, 32))}${(d.topic || '').length > 32 ? '…' : ''}</div>
    </div>
    <div class="collapsed-preview">${escapeHtml((d.caption || '').slice(0, 120))}…</div>
    <div class="card-body" style="padding-bottom:6px;">
      <div class="ig-mock-header">
        <div class="ig-avatar-ring"><img src="/bb-logo.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ig-avatar-fallback',textContent:'BB'}))"/></div>
        <span class="ig-username">bitcoin_bay</span>
        <span class="ig-dot">·</span>
        <span style="color:var(--muted2); font-size:12px;">now</span>
      </div>
    </div>
    ${slides.length === 0
      ? `<div class="slide-strip-empty">No slides yet — click <b>↻ Run drafter now</b> at the top to generate today's batch.</div>`
      : `${heroImage}<div class="ig-dots">${dots}</div>`}
    <div class="card-body" style="padding-top:6px; padding-bottom:8px;">
      <div class="ig-mock-actions">
        <span title="Like">♡</span>
        <span title="Comment">💬</span>
        <span title="Share">⤴</span>
        <span class="right" title="Save">🔖</span>
      </div>
      <div class="ig-likes">Liked by <b>fans</b> and others</div>
      ${renderIgCaptionPreview(d, isLocked)}
      <div class="char-count ${overLimit ? 'over' : ''}" data-counter><span class="len">${len}</span> / ${IG_CAPTION_LIMIT}</div>
    </div>
    ${tools}
    ${activePanelHtml ? `<div class="card-body" style="border-top: 1px dashed var(--border);">${activePanelHtml}</div>` : ''}
    ${renderActions(d, isLocked)}
  </div>`;
}

// CTA slot form — shown when the operator clicks the "+" tile in the dot row.
// Lets them set the headline + subhead for a BB-branded CTA slide that gets
// appended to the end of the carousel. On submit, calls /add-cta-slide.
function renderCtaSlotForm(d) {
  return `<div class="slide-panel active cta-slot-form" data-slide="cta_slot">
      <div class="slide-panel-head">
        <span class="slide-role-pill" style="background: rgba(240,180,41,0.15); color: var(--gold); border-color: rgba(240,180,41,0.3);">+ NEW BB CTA SLIDE</span>
        <span style="font-size:10px;color:var(--muted);">appended at the end · BB-branded composite</span>
      </div>
      <p style="font-size:12px; color:var(--muted2); margin: 8px 0 12px; line-height:1.5;">
        Add a Bitcoin Bay-branded promotional slide to the end of this carousel.
        The slide uses the BB logo + brand-palette gradient + your custom headline.
        Operator-optional — leave the "+" alone if today's deck doesn't need a CTA.
      </p>
      <div class="field-row">
        <div class="field-label">Headline (≤80 chars)</div>
        <input class="field-input" data-cta-headline value="Sharp picks. Bitcoin only." />
      </div>
      <div class="field-row">
        <div class="field-label">Sub-headline / footer (≤80 chars)</div>
        <input class="field-input" data-cta-subhead value="bitcoinbay.com" />
      </div>
      <div style="margin-top:12px; display:flex; gap:5px;">
        <button class="btn small primary" data-action="add-cta-slide-confirm">+ Add CTA slide</button>
        <button class="btn small ghost" data-action="add-cta-slide-cancel">Cancel</button>
      </div>
    </div>`;
}

// Editor for the currently-active carousel slide. Layered ABOVE the existing
// scene-panel logic — kept compact since only one slide is editable at a time.
function buildSlideEditor(d, s, i, isLocked, totalSlides) {
  const overlayColor = (typeof s.overlay_color === 'string' && /^#[0-9a-f]{3,8}$/i.test(s.overlay_color))
    ? s.overlay_color : '#FFFFFF';
  const colorRow = isLocked ? '' : `
    <div class="color-row">
      <span class="field-label">Headline color</span>
      <input type="color" data-overlay-color data-slide-index="${i}" value="${escapeHtml(overlayColor)}" />
      <button class="color-swatch${overlayColor.toUpperCase() === '#FFFFFF' ? ' active' : ''}" data-color="#FFFFFF" data-slide-index="${i}" style="background:#FFFFFF;" title="White"></button>
      <button class="color-swatch${overlayColor.toUpperCase() === '#000000' ? ' active' : ''}" data-color="#000000" data-slide-index="${i}" style="background:#000000;" title="Black"></button>
      <button class="color-swatch${overlayColor.toUpperCase() === '#0A1628' ? ' active' : ''}" data-color="#0A1628" data-slide-index="${i}" style="background:#0A1628;" title="BB Navy"></button>
      <button class="color-swatch${overlayColor.toUpperCase() === '#F7941D' ? ' active' : ''}" data-color="#F7941D" data-slide-index="${i}" style="background:#F7941D;" title="BB Gold"></button>
      <button class="color-swatch${overlayColor.toUpperCase() === '#F26522' ? ' active' : ''}" data-color="#F26522" data-slide-index="${i}" style="background:#F26522;" title="BB Orange"></button>
      <button class="color-swatch${overlayColor.toUpperCase() === '#22C55E' ? ' active' : ''}" data-color="#22C55E" data-slide-index="${i}" style="background:#22C55E;" title="Accent green"></button>
      <button class="btn small primary" data-action="apply-layout" data-slide-index="${i}" style="margin-left:auto;">💾 Save layout</button>
    </div>`;
  // Primary editing surface: headline + color + save layout. That's the
  // only thing most operators touch. Everything else lives behind "More edits".
  return `<div class="slide-panel active" data-slide="${i}">
      <div class="slide-panel-head">
        <span class="slide-role-pill">${escapeHtml((s.slide_role || '').replace(/_/g, ' '))}</span>
        <span style="font-size:10px;color:var(--muted);">slide ${i + 1} of ${totalSlides}${s.is_cta_slide ? ' · BB CTA' : ''}</span>
      </div>
      <div class="field-row">
        <div class="field-label">Headline (shown on the image, ≤8 words)</div>
        <input class="field-input" data-slide-field="headline" data-slide-index="${i}" value="${escapeHtml(s.headline || '')}" ${isLocked ? 'disabled' : ''} placeholder="Drag the headline on the image to reposition it" />
      </div>
      ${colorRow}
      <details class="advanced" style="margin-top:10px;">
        <summary>✏️ More edits — body text, image subject, manual URL, Claude re-prompt</summary>
        <div class="field-row">
          <div class="field-label">Body / alt text (not shown on image — only for accessibility + dev preview)</div>
          <textarea class="editor" data-slide-field="body_text" data-slide-index="${i}" ${isLocked ? 'disabled' : ''} style="min-height:50px;">${escapeHtml(s.body_text || '')}</textarea>
        </div>
        <div class="field-row">
          <div class="field-label">Image subject (drives the photo lookup — full athlete name, no abbreviations)</div>
          <input class="field-input" data-slide-field="image_subject" data-slide-index="${i}" value="${escapeHtml(s.image_subject || '')}" ${isLocked ? 'disabled' : ''} />
        </div>
        <div class="field-row">
          <div class="field-label">Manual image URL override</div>
          <input class="field-input" data-slide-field="image_url" data-slide-index="${i}" placeholder="paste a public image URL to override the auto-found one" value="${escapeHtml(s.image_url || '')}" ${isLocked ? 'disabled' : ''} />
        </div>
        <button class="btn small danger" data-action="regen-slide" data-slide-index="${i}" ${isLocked ? 'disabled' : ''} style="margin-top:8px;" title="Re-prompt Claude for this slide's text only (replaces headline+body)">🆕 New slide text (Claude re-prompt)</button>
      </details>
      ${renderScenePanel(d, i)}
    </div>`;
}

function renderImageBlock(d, position = 'below-text', size = '') {
  const url = d.image_url;
  const attr = d.image_attribution;
  const cls = `image-preview ${position}${size === 'large' ? ' large' : ''}`;
  if (!url) {
    return `<div class="${cls}"><div class="placeholder">Image rendering — refresh in 30s.</div></div>`;
  }
  const fname = (d.platform || 'post') + '-' + (d._id || 'image') + '.jpg';
  // 🎨 corner button → opens scene panel below; default scene-prompt is
  // pre-filled (suggestScenePrompt). Reference image defaults to this image.
  return `<div class="${cls}">
    <img src="${escapeHtml(url)}" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;placeholder&quot;>image fetch failed — try a manual URL in Advanced</div>'"/>
    <div class="image-corner-actions">
      <button class="corner-btn" data-action="generate-art" title="Replace with AI scene (Replicate InstantID, ~$0.05)">🎨</button>
    </div>
    <div class="image-meta">
      <span>${escapeHtml(attr || '')}</span>
      <a class="download-btn" download="${escapeHtml(fname)}" href="${escapeHtml(url)}" title="Download">💾</a>
    </div>
  </div>`;
}

// Hashtag row — renders as colored pills by default; click to switch to comma input.
// Saves on blur via the existing PATCH path (data-field="hashtags").
function renderHashtagRow(d, isLocked) {
  const tags = Array.isArray(d.hashtags) ? d.hashtags : [];
  const pills = tags.length
    ? tags.map((t) => `<span class="hashtag-pill">#${escapeHtml(String(t).replace(/^#/, ''))}</span>`).join('')
    : `<span class="hashtag-pill empty">no hashtags — click to add</span>`;
  return `<div class="hashtag-row" data-hashtag-row ${isLocked ? 'data-locked' : ''}>
    ${pills}
    <input class="field-input hashtag-edit-input" data-field="hashtags" value="${escapeHtml(tags.join(', '))}" ${isLocked ? 'disabled' : ''} placeholder="comma-separated, no #" />
  </div>`;
}

// Advanced expander — collapses the manual image-URL override out of the
// default editing surface. Operator clicks "Advanced" to reveal it.
function renderAdvanced(d, isLocked) {
  return `<details class="advanced">
    <summary>Advanced — manual image URL override</summary>
    <input class="field-input" data-field="image_url" placeholder="paste a public image URL" value="${escapeHtml(d.image_url_override || '')}" ${isLocked ? 'disabled' : ''} style="margin-top:6px;" />
  </details>`;
}

// Variant chip — Twitter only, shows whether the active variant is the
// meme reaction or the professional news take.
function renderVariantChip(d) {
  if (d.platform !== 'twitter' || !Array.isArray(d.variants) || d.variants.length < 2) return '';
  const idx = Number.isInteger(d.active_variant_index) ? d.active_variant_index : 0;
  const kind = d.variants[idx]?.variant_kind || 'meme';
  const label = kind === 'professional' ? 'NEWS' : 'MEME';
  return `<span class="variant-chip ${kind}">${label}</span>`;
}

// ─── Today's games panel (Phase 8) ─────────────────────────────────────
// BRIEF.todays_games is populated by Pi nightly. Render as a horizontal
// strip; each card has Live state + Draft tweet buttons. Operator-pull
// only, no auto-polling. ESPN is free; Claude only fires on Draft click.
function renderGamesPanel() {
  const games = (BRIEF && BRIEF.todays_games) || [];
  const panel = document.getElementById('games-panel');
  const strip = document.getElementById('games-strip');
  const countEl = document.getElementById('games-count');
  if (!panel || !strip || !countEl) return;
  if (games.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = '';
  countEl.textContent = String(games.length);
  strip.innerHTML = games.map((g, i) => renderGameCard(g, i)).join('');
  strip.querySelectorAll('.game-card [data-action]').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const card = btn.closest('.game-card');
      const eventId = card.dataset.eventId;
      const leaguePath = card.dataset.leaguePath;
      const action = btn.dataset.action;
      try {
        btn.disabled = true;
        if (action === 'game-state') await actionGameState(card, eventId, leaguePath);
        else if (action === 'game-draft') await actionDraftFromGame(eventId, leaguePath);
      } catch (err) {
        toast(err.message || 'Game action failed', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  });
}

function renderGameCard(g, i) {
  const state = g.state || 'pre';  // pre | in | post
  const score = (g.away_score != null && g.home_score != null)
    ? `<span class="score">${g.away_abbr} ${g.away_score} · ${g.home_abbr} ${g.home_score}</span>`
    : `${g.away_abbr} @ ${g.home_abbr}`;
  const liveDot = state === 'in' ? '<span class="live-dot"></span>' : '';
  const broadcast = g.broadcast ? `<div class="game-broadcast">${escapeHtml(g.broadcast)}</div>` : '';
  return `<div class="game-card ${state}" data-event-id="${escapeHtml(String(g.espn_event_id || ''))}" data-league-path="${escapeHtml(g.league_path || '')}">
    <div class="game-league">${escapeHtml(g.league || '')}</div>
    <div class="game-teams">${score}</div>
    <div class="game-status">${liveDot}${escapeHtml(g.status_short || '')}</div>
    ${broadcast}
    <div class="game-actions">
      <button class="btn small" data-action="game-state" title="Pull live ESPN state (score + recent plays)">📡 Live state</button>
      <button class="btn small primary" data-action="game-draft" title="Draft a tweet from this game state (~$0.04, 2 variants)">✍️ Draft</button>
    </div>
    <div class="game-state-expand" data-game-expand></div>
  </div>`;
}

async function actionGameState(card, eventId, leaguePath) {
  const expand = card.querySelector('[data-game-expand]');
  if (!expand) return;
  if (expand.classList.contains('show')) {
    expand.classList.remove('show');
    expand.innerHTML = '';
    return;
  }
  expand.innerHTML = '<div style="padding:6px;">Fetching ESPN…</div>';
  expand.classList.add('show');
  const res = await fetch(`/api/admin/dashboard/game-state?event_id=${encodeURIComponent(eventId)}&league_path=${encodeURIComponent(leaguePath)}`);
  const json = await res.json();
  if (!res.ok || !json.success) {
    expand.innerHTML = `<div style="color:var(--red);">${escapeHtml(json.error || 'failed')}</div>`;
    return;
  }
  const wp = json.win_probability;
  const wpHtml = wp
    ? `<div class="winprob"><span><b>${json.away.abbr}</b> ${wp.away_pct}%</span> · <span><b>${json.home.abbr}</b> ${wp.home_pct}%</span></div>`
    : '';
  const playsHtml = (json.plays || []).slice(-5).reverse().map((p) =>
    `<div class="play">Q${p.period || '?'} ${escapeHtml(p.clock || '')} — ${escapeHtml(p.text || '')}</div>`
  ).join('');
  expand.innerHTML = `
    <div style="margin-bottom:4px;"><b>${escapeHtml(json.status || '')}</b></div>
    ${wpHtml}
    <div style="margin-top:4px; font-weight:600; color:var(--muted2); font-size:10px; text-transform:uppercase;">Last plays</div>
    ${playsHtml || '<div class="play" style="color:var(--muted);">no plays yet</div>'}
  `;
}

async function actionDraftFromGame(eventId, leaguePath) {
  if (!confirm('Draft a tweet about this game right now? (~$0.04 — generates meme + professional variants from the live state)')) return;
  toast('Drafting from live game — 5-10s…', '');
  const res = await fetch('/api/admin/dashboard/draft-from-game', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ event_id: eventId, league_path: leaguePath }),
  });
  const json = await res.json();
  if (!res.ok || !json.success) throw new Error(json.error || 'draft-from-game failed');
  toast(`Live-game draft created (${json.variants_count} variants)`, 'success');
  await loadDrafts();
}


// Decode HTML entities back to characters. Defensive — Claude (or some
// intermediate layer) occasionally emits text with `&#39;` for apostrophes,
// `&amp;` for &, etc. Without this, escapeHtml below would re-escape
// `&#39;` → `&amp;#39;` which renders as the literal text `&#39;` on screen.
// Was the source of "the players&#39; unions" showing literally in the IG
// caption preview.
function decodeHtmlEntities(s) {
  if (!s) return '';
  const t = document.createElement('textarea');
  t.innerHTML = String(s);
  return t.value;
}

// Render plain text with inline-blue hashtags and @mentions, line breaks
// preserved. The single biggest "feels native" lever per UI research.
function renderInlineText(text) {
  return escapeHtml(decodeHtmlEntities(text))
    .replace(/(#[\w]+)/g, '<span class="ht">$1</span>')
    .replace(/(@[\w_]+)/g, '<span class="mt">$1</span>')
    .replace(/\n/g, '<br>');
}

// IG caption + hashtags as a single contenteditable. Operator types caption
// and hashtags inline (with #tag syntax); on blur we extract trailing
// hashtags into the d.hashtags array and store the bare caption in d.caption.
// The username sits next to (not inside) the editable region so it can't
// be accidentally edited.
function renderIgCaptionPreview(d, isLocked) {
  const caption = d.caption || '';
  const tags = (d.hashtags || []).map((t) => '#' + String(t).replace(/^#/, '')).join(' ');
  const combined = caption + (tags ? '\n\n' + tags : '');
  return `<div class="ig-caption-preview">
    <span class="ig-username">bitcoin_bay</span>
    <span class="post-text ig" ${isLocked ? '' : 'contenteditable="true"'} data-field="caption_with_tags" data-placeholder="Write a caption…" spellcheck="true">${renderInlineText(combined)}</span>
  </div>`;
}

// Build a context-aware scene-prompt suggestion when Claude didn't produce one.
// Operator can edit before submitting; this is just a sensible starting point.
function suggestScenePrompt(d, slideIndex) {
  const slide = Number.isInteger(slideIndex) ? d.slides?.[slideIndex] : null;
  const target = slide || d;
  if (target.image_scene_prompt) return target.image_scene_prompt;
  const subject = (target.image_subject || 'an athlete').trim();
  const headline = (target.headline || target.image_overlay_text || '').trim();
  const angle = (d.angle || '').trim();
  const ctx = headline || angle || (d.topic || '').trim();
  const sceneClause = ctx ? `reacting to "${ctx}"` : 'in a dynamic moment';
  return `${subject} ${sceneClause}, photorealistic editorial sports photo, dramatic stadium lighting, dynamic composition, high detail`;
}

// Scene-prompt panel for operator-triggered AI image generation.
// `slideIndex` is null for single-image cards (Twitter, IG single), or the
// slide index for carousel slides. The panel is hidden until the operator
// clicks 🎨 Generate scene; submit calls /generate-art and replaces the image.
function renderScenePanel(d, slideIndex) {
  const isSlide = Number.isInteger(slideIndex);
  const slide = isSlide ? (d.slides || [])[slideIndex] : null;
  const prefilled = suggestScenePrompt(d, isSlide ? slideIndex : null);
  const refUrl = isSlide ? (slide?.image_url || '') : (d.image_url || '');
  const sIdxAttr = isSlide ? `data-slide-index="${slideIndex}"` : '';
  const panelKey = isSlide ? slideIndex : '';
  return `<div class="scene-panel" data-scene-panel="${panelKey}">
    <div class="field-label">🎨 Generate AI scene with athlete's face (Replicate InstantID)</div>
    <textarea class="scene-prompt" data-scene-field="prompt" ${sIdxAttr} placeholder="">${escapeHtml(prefilled)}</textarea>
    <div class="scene-hint">InstantID preserves the face from the reference image while restyling the surroundings to match your prompt. The textarea above is pre-filled with a suggested prompt — edit before submitting if you want a different scene.</div>
    <div class="field-label" style="margin-top:8px;">Reference image URL (face source — defaults to current image)</div>
    <input class="field-input" data-scene-field="reference" ${sIdxAttr} value="${escapeHtml(refUrl)}" placeholder="https://..." />
    <div class="scene-buttons">
      <button class="btn small primary" data-action="generate-art-submit" ${sIdxAttr}>Generate scene</button>
      <button class="btn small ghost" data-action="generate-art-cancel" ${sIdxAttr}>Cancel</button>
      <span class="scene-cost">~$0.05 · operator-triggered, audit-logged</span>
    </div>
  </div>`;
}

function renderActions(d, isLocked) {
  if (isLocked) {
    return `<div class="card-actions">
      <span style="color:var(--muted2); font-size:11px;">${d.status === 'posted' ? '✓ Posted' : '⛔ Skipped'} · ${formatTimestamp(d.updated_at)}</span>
    </div>`;
  }
  // 🎨 AI scene moved to a corner button on the image preview itself.
  // Twitter cards get the ⇄ Variant swap button when 2 variants exist.
  // 🆕 New text replaces the old "🔄 Regen" — destructive, confirm dialog wired
  // in actionRegenerate. Carousel cards get the per-deck tools (regen all
  // images + ZIP) folded into this row instead of a separate tools strip.
  const variantBtn = (d.platform === 'twitter' && Array.isArray(d.variants) && d.variants.length >= 2)
    ? `<button class="btn small" data-action="swap-variant" title="Swap to alternate variant (meme ↔ news)">⇄ Variant</button>`
    : '';
  const carouselTools = d.platform === 'instagram_carousel'
    ? `<button class="btn small" data-action="regen-all-images" title="Re-render all carousel slide composites with current text + colors + drag positions (~30s)">🔁 Regen images</button>
       <button class="btn small" data-action="download-zip" title="Download all carousel slide JPEGs as a ZIP file">📦 ZIP</button>`
    : '';
  return `<div class="card-actions">
    <button class="btn small" data-action="save">💾 Save</button>
    <button class="btn small danger" data-action="regen" title="Replace the current draft text with a new one (Claude re-prompt)">🆕 New text</button>
    ${variantBtn}
    ${carouselTools}
    <button class="btn small danger" data-action="skip">⛔ Skip</button>
    <button class="btn small success" data-action="approve" style="margin-left:auto;">✓ Approve</button>
  </div>`;
}

function formatTimestamp(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString();
  } catch (_) { return iso; }
}

// ─── Card actions wiring ────────────────────────────────────────────────
function wireCardActions(cardEl) {
  const id = cardEl.dataset.id;

  // Char counters live as you type
  cardEl.querySelectorAll('.editor[data-field=text], .editor[data-field=caption]').forEach((ed) => {
    ed.addEventListener('input', () => {
      const counter = cardEl.querySelector('[data-counter]');
      if (!counter) return;
      const len = ed.value.length;
      const limit = ed.dataset.field === 'text' ? TWITTER_LIMIT : IG_CAPTION_LIMIT;
      counter.querySelector('.len').textContent = len;
      counter.classList.toggle('over', len > limit);
    });
  });

  // Slide switching via the native-style dot row under the carousel image.
  // Re-renders the whole card so the active-slide editor + hero image swap.
  // Special case: data-slide="cta_slot" → opens the CTA editor in the slide
  // panel (not a real slide; "+" tile in the dot row).
  cardEl.querySelectorAll('.ig-dots .dot[data-slide]').forEach((dot) => {
    dot.addEventListener('click', () => {
      const raw = dot.dataset.slide;
      CURRENT_SLIDE[id] = (raw === 'cta_slot') ? 'cta_slot' : Number(raw);
      const draft = DRAFTS.find((x) => x._id === id);
      if (!draft) return;
      const newHtml = renderInstagramCarouselCard(draft);
      const wrapper = document.createElement('div');
      wrapper.innerHTML = newHtml;
      const newCard = wrapper.firstElementChild;
      cardEl.replaceWith(newCard);
      wireCardActions(newCard);
    });
  });

  // Unified contenteditable .post-text: display IS the editor. No toggle.
  // On input, update the char counter live (no re-render — that would jump
  // the cursor). On blur, extract plain text + re-render styled spans + save.
  cardEl.querySelectorAll('.post-text[contenteditable="true"]').forEach((el) => {
    // Live char counter (twitter only — has data-field="text")
    el.addEventListener('input', () => {
      const counter = el.parentElement.querySelector('[data-counter]')
                   || el.closest('.card-body')?.querySelector('[data-counter]')
                   || cardEl.querySelector('[data-counter]');
      if (counter) {
        const len = (el.innerText || '').length;
        const limit = el.dataset.field === 'text' ? TWITTER_LIMIT : IG_CAPTION_LIMIT;
        counter.querySelector('.len').textContent = len;
        counter.classList.toggle('over', len > limit);
      }
    });
    el.addEventListener('blur', async () => {
      const field = el.dataset.field;
      const text = (el.innerText || '').replace(/ /g, ' ').trim();  // normalize NBSPs
      const draft = DRAFTS.find((x) => x._id === id);
      if (!draft) return;
      let savePayload = {};
      if (field === 'text') {
        if (draft.text === text) return;  // no change, skip
        draft.text = text;
        savePayload = { text };
      } else if (field === 'caption_with_tags') {
        // Auto-extract trailing hashtag block. Pattern: split on last \n\n;
        // if the chunk after is all #words, treat it as the hashtags array.
        // Otherwise keep everything in caption.
        const parts = text.split(/\n\n+/);
        const tail = parts[parts.length - 1] || '';
        const tailIsTags = parts.length > 1 && /^[#\w\s]+$/.test(tail) && /#/.test(tail);
        let captionStr, tagsArr;
        if (tailIsTags) {
          captionStr = parts.slice(0, -1).join('\n\n').trim();
          tagsArr = (tail.match(/#[\w]+/g) || []).map((t) => t.replace(/^#/, '').toLowerCase());
        } else {
          captionStr = text;
          tagsArr = [];
        }
        if (draft.caption === captionStr && JSON.stringify(draft.hashtags || []) === JSON.stringify(tagsArr)) {
          return;
        }
        draft.caption = captionStr;
        draft.hashtags = tagsArr;
        savePayload = { caption: captionStr, hashtags: tagsArr };
      }
      // Re-render the contenteditable to clean up any messy span structure
      // typing introduced (operator may have typed inside an .ht span etc.)
      el.innerHTML = renderInlineText(field === 'caption_with_tags'
        ? `${draft.caption || ''}${(draft.hashtags || []).length ? '\n\n' + (draft.hashtags || []).map((t) => '#' + t).join(' ') : ''}`
        : (draft.text || ''));
      // PATCH backend
      try {
        const res = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(savePayload),
        });
        if (!res.ok) throw new Error('save failed');
      } catch (e) {
        toast('Auto-save failed: ' + e.message, 'error');
      }
    });
    // Paste as plain text only — prevents weird HTML from Word/etc. ending up
    // in the contenteditable
    el.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  });

  // Hashtag row edit-on-click — keep edit mode while focused, save on blur
  cardEl.querySelectorAll('[data-hashtag-row]').forEach((row) => {
    if (row.hasAttribute('data-locked')) return;
    const input = row.querySelector('.hashtag-edit-input');
    if (!input) return;
    row.addEventListener('click', (e) => {
      if (row.classList.contains('editing')) return;
      row.classList.add('editing');
      input.focus();
      input.select();
    });
    input.addEventListener('blur', async () => {
      row.classList.remove('editing');
      // Auto-save the hashtag change so operator doesn't need to hit Save explicitly
      try { await actionSave(id, cardEl); } catch (_) {}
    });
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
  });

  // Collapsed-card click-to-expand (posted/skipped cards default to collapsed)
  if (cardEl.classList.contains('collapsed')) {
    const head = cardEl.querySelector('.card-head');
    const preview = cardEl.querySelector('.collapsed-preview');
    [head, preview].filter(Boolean).forEach((el) => {
      el.addEventListener('click', () => cardEl.classList.remove('collapsed'));
    });
  }

  // Action buttons
  cardEl.querySelectorAll('[data-action]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const slideIdx = btn.dataset.slideIndex !== undefined && btn.dataset.slideIndex !== ''
        ? Number(btn.dataset.slideIndex) : null;
      try {
        btn.disabled = true;
        if (action === 'save') await actionSave(id, cardEl);
        else if (action === 'regen') await actionRegenerate(id, { humor_pass: false });
        else if (action === 'regen-slide') await actionRegenerate(id, { slide_index: slideIdx });
        else if (action === 'swap-variant') await actionSwapVariant(id);
        else if (action === 'skip') await actionSkip(id);
        else if (action === 'approve') await actionApprove(id, cardEl);
        else if (action === 'generate-art') toggleScenePanel(cardEl, slideIdx);
        else if (action === 'generate-art-submit') await actionGenerateArt(id, cardEl, slideIdx);
        else if (action === 'generate-art-cancel') closeScenePanel(cardEl, slideIdx);
        else if (action === 'regen-all-images') await actionRegenAllImages(id);
        else if (action === 'download-zip') downloadZip(id);
        else if (action === 'apply-layout') await actionApplyLayout(id, cardEl, slideIdx);
        else if (action === 'add-cta-slide-confirm') await actionAddCtaSlide(id, cardEl);
        else if (action === 'add-cta-slide-cancel') {
          // Switch back to the first real slide
          CURRENT_SLIDE[id] = 0;
          const draft = DRAFTS.find((x) => x._id === id);
          if (draft) {
            const newHtml = renderInstagramCarouselCard(draft);
            const wrapper = document.createElement('div');
            wrapper.innerHTML = newHtml;
            const newCard = wrapper.firstElementChild;
            cardEl.replaceWith(newCard);
            wireCardActions(newCard);
          }
        }
      } catch (e) {
        toast(e.message || 'Action failed', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  });

  // Color swatches — click to set the color picker + the live overlay preview
  cardEl.querySelectorAll('.color-swatch').forEach((sw) => {
    sw.addEventListener('click', (e) => {
      e.preventDefault();
      const color = sw.dataset.color;
      const slideIdx = Number(sw.dataset.slideIndex);
      const panel = cardEl.querySelector(`.slide-panel[data-slide="${slideIdx}"]`);
      if (!panel) return;
      const colorInput = panel.querySelector('input[data-overlay-color]');
      if (colorInput) colorInput.value = color;
      const headline = panel.querySelector('.overlay-headline');
      if (headline) headline.style.color = color;
      panel.querySelectorAll('.color-swatch').forEach((s) => s.classList.toggle('active', s === sw));
    });
  });
  cardEl.querySelectorAll('input[data-overlay-color]').forEach((picker) => {
    picker.addEventListener('input', () => {
      const slideIdx = Number(picker.dataset.slideIndex);
      const panel = cardEl.querySelector(`.slide-panel[data-slide="${slideIdx}"]`);
      const headline = panel?.querySelector('.overlay-headline');
      if (headline) headline.style.color = picker.value;
      panel?.querySelectorAll('.color-swatch').forEach((s) => s.classList.remove('active'));
    });
  });

  // Drag overlay editor — make .overlay-headline draggable within its canvas
  cardEl.querySelectorAll('.overlay-canvas').forEach((canvas) => {
    initOverlayDrag(canvas);
  });
}

// Initialize drag-to-position on a single overlay-canvas. Updates the live
// preview position + the dataset coords; persistence happens via apply-layout.
function initOverlayDrag(canvas) {
  const headline = canvas.querySelector('.overlay-headline.draggable');
  if (!headline) return;
  let dragging = false, startX, startY, startLeftPx, startTopPx, rect;
  const start = (e) => {
    dragging = true;
    headline.classList.add('dragging');
    rect = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    startX = point.clientX;
    startY = point.clientY;
    startLeftPx = (parseFloat(headline.style.left) || 0) / 100 * rect.width;
    startTopPx = (parseFloat(headline.style.top) || 0) / 100 * rect.height;
    e.preventDefault();
  };
  const move = (e) => {
    if (!dragging) return;
    const point = e.touches ? e.touches[0] : e;
    const newLeftPx = startLeftPx + (point.clientX - startX);
    const newTopPx = startTopPx + (point.clientY - startY);
    const xPct = Math.max(0, Math.min(95, (newLeftPx / rect.width) * 100));
    const yPct = Math.max(8, Math.min(98, (newTopPx / rect.height) * 100));
    headline.style.left = xPct + '%';
    headline.style.top = yPct + '%';
    headline.dataset.overlayX = xPct.toFixed(1);
    headline.dataset.overlayY = yPct.toFixed(1);
    e.preventDefault();
  };
  const end = () => {
    if (!dragging) return;
    dragging = false;
    headline.classList.remove('dragging');
  };
  headline.addEventListener('mousedown', start);
  headline.addEventListener('touchstart', start, { passive: false });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', end);
  document.addEventListener('touchend', end);
}

// Locate the scene panel for a card (slideIndex=null) or carousel slide.
// Empty string in the dataset matches null/undefined slide index.
function findScenePanel(cardEl, slideIndex) {
  const key = Number.isInteger(slideIndex) ? String(slideIndex) : '';
  return cardEl.querySelector(`.scene-panel[data-scene-panel="${key}"]`);
}

function toggleScenePanel(cardEl, slideIndex) {
  const panel = findScenePanel(cardEl, slideIndex);
  if (panel) panel.classList.toggle('open');
}

function closeScenePanel(cardEl, slideIndex) {
  const panel = findScenePanel(cardEl, slideIndex);
  if (panel) panel.classList.remove('open');
}

function gatherEdits(cardEl) {
  const out = {};
  cardEl.querySelectorAll('[data-field]').forEach((el) => {
    const f = el.dataset.field;
    // contenteditable .post-text uses innerText; inputs/textareas use value.
    const isEditable = el.isContentEditable || el.classList.contains('post-text');
    const raw = isEditable ? (el.innerText || '') : el.value;
    if (f === 'text') {
      out.text = raw.trim();
    } else if (f === 'caption_with_tags') {
      // Same auto-extraction as the blur handler — split caption from
      // trailing hashtag block.
      const text = raw.trim();
      const parts = text.split(/\n\n+/);
      const tail = parts[parts.length - 1] || '';
      const tailIsTags = parts.length > 1 && /^[#\w\s]+$/.test(tail) && /#/.test(tail);
      if (tailIsTags) {
        out.caption = parts.slice(0, -1).join('\n\n').trim();
        out.hashtags = (tail.match(/#[\w]+/g) || []).map((t) => t.replace(/^#/, '').toLowerCase());
      } else {
        out.caption = text;
        out.hashtags = [];
      }
    } else if (f === 'hashtags') {
      out.hashtags = raw.split(',').map((x) => x.trim()).filter(Boolean);
    } else if (f === 'image_url' && !raw.trim()) {
      // skip empty manual override
    } else {
      out[f] = raw;
    }
  });
  // Carousel slide edits
  const slidesEdit = {};
  cardEl.querySelectorAll('[data-slide-field]').forEach((el) => {
    const idx = Number(el.dataset.slideIndex);
    const field = el.dataset.slideField;
    if (!slidesEdit[idx]) slidesEdit[idx] = {};
    slidesEdit[idx][field] = el.value;
  });
  if (Object.keys(slidesEdit).length > 0) {
    // Merge slide edits into the existing slides array
    const draft = DRAFTS.find((d) => d._id === cardEl.dataset.id);
    if (draft && draft.slides) {
      const newSlides = draft.slides.map((s, i) => ({ ...s, ...(slidesEdit[i] || {}) }));
      out.slides = newSlides;
    }
  }
  return out;
}

async function actionSave(id, cardEl) {
  const body = gatherEdits(cardEl);
  if (Object.keys(body).length === 0) {
    toast('Nothing to save', '');
    return;
  }
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json();
  if (!res.ok || !json.success) throw new Error(json.error || 'PATCH failed');
  toast('Saved', 'success');
  await loadDrafts();
}

async function actionRegenerate(id, opts) {
  // Destructive — rewrites the current draft text. Confirm before nuking
  // anything the operator may have already edited.
  const isSlide = Number.isInteger(opts?.slide_index);
  const what = isSlide ? `slide ${opts.slide_index + 1} headline + body` : 'this draft\'s text';
  if (!confirm(`Replace ${what} with a fresh Claude generation?\n\nAny edits you've made will be lost.`)) return;
  toast('Generating new text — 5-10s…', '');
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}/regenerate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(opts || {}),
  });
  const json = await res.json();
  if (!res.ok || !json.success) throw new Error(json.error || 'regen failed');
  toast('New text generated', 'success');
  await loadDrafts();
}

async function actionSkip(id) {
  const reason = prompt('Skip reason (optional):');
  if (reason === null) return; // user cancelled
  const res = await fetch(`/api/admin/dashboard/post-drafts/${id}/skip`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reason }),
  });
  const json = await res.json();
  if (!res.ok || !json.success) throw new Error(json.error || 'skip failed');
  toast('Skipped', '');
  await loadDrafts();
}

async function actionApplyLayout(id, cardEl, slideIndex) {
  const panel = cardEl.querySelector(`.slide-panel[data-slide="${slideIndex}"]`);
  if (!panel) throw new Error('slide panel not found');
  const headline = panel.querySelector('.overlay-headline');
  const colorInput = panel.querySelector('input[data-overlay-color]');
  if (!headline) throw new Error('headline overlay not found');
  const overlay_x = parseFloat(headline.dataset.overlayX);
  const overlay_y = parseFloat(headline.dataset.overlayY);
  const overlay_color = colorInput?.value || '#FFFFFF';

  const draft = DRAFTS.find((d) => d._id === id);
  if (!draft || !Array.isArray(draft.slides)) throw new Error('draft not found');
  const newSlides = draft.slides.map((s, i) => i === slideIndex
    ? { ...s, overlay_x, overlay_y, overlay_color }
    : s);
  const r1 = await fetch(`/api/admin/dashboard/post-drafts/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slides: newSlides }),
  });
  if (!r1.ok) throw new Error('save coords failed');
  toast('Layout saved — re-rendering image, refresh in ~30s', '');
  // Trigger background re-render of all slides so this slide picks up the new coords
  const r2 = await fetch(`/api/admin/dashboard/post-drafts/${id}/regenerate-all-images`, {
